<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRP SHOPPING | ADMIN PANEL PRO MAX</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }
.sidebar { transition: transform 0.3s ease; }
.sidebar-hidden { transform: translateX(-100%); }
.overlay {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.5);
    display:none;
}
.overlay.active { display:block; }
.section { display:none; }
.section.active { display:block; }
</style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-white">

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="closeSidebar()"></div>

<!-- TOPBAR -->
<div class="flex justify-between items-center bg-blue-900 text-white p-4 shadow">

    <div class="flex items-center gap-4">
        <button onclick="openSidebar()" class="text-2xl">☰</button>
        <h1 class="font-bold text-lg">SRP ADMIN PANEL</h1>
    </div>

    <div class="flex items-center gap-3">
        <button onclick="toggleTheme()" class="bg-gray-800 px-3 py-1 rounded">🌙</button>
        <button onclick="goHome()" class="bg-green-600 px-3 py-1 rounded">Home</button>
        <button onclick="logout()" class="bg-red-600 px-3 py-1 rounded">Logout</button>
    </div>
</div>

<div class="flex">

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar sidebar-hidden fixed z-50 w-64 h-full bg-blue-800 p-4 text-white overflow-y-auto">

    <h2 class="font-bold mb-4">ADMIN MENU</h2>
    <div id="menuContainer"></div>

</div>

<!-- MAIN -->
<div class="flex-1 p-4">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
    <h2 class="text-2xl font-bold">Dashboard</h2>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4">

        <div class="bg-white dark:bg-gray-800 p-4 rounded shadow">
            Users: <span id="usersCount">0</span>
        </div>

        <div class="bg-white dark:bg-gray-800 p-4 rounded shadow">
            Sellers: <span id="sellersCount">0</span>
        </div>

        <div class="bg-white dark:bg-gray-800 p-4 rounded shadow">
            Orders: <span id="ordersCount">0</span>
        </div>

        <div class="bg-white dark:bg-gray-800 p-4 rounded shadow">
            Revenue: ₹<span id="revenueCount">0</span>
        </div>

    </div>
</div>

<!-- ALL OTHER SECTIONS AUTO GENERATED -->
<div id="sectionsContainer"></div>

</div>
</div>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyB2xwVO-c_f4cEn6PjtArta3DU6mqz7yxw",
  authDomain: "srp-shopping-54bbb.firebaseapp.com",
  databaseURL: "https://srp-shopping-54bbb-default-rtdb.firebaseio.com",
  projectId: "srp-shopping-54bbb",
  storageBucket: "srp-shopping-54bbb.appspot.com",
  messagingSenderId: "491906168702",
  appId: "1:491906168702:web:2873565fcd2d561077252f"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

// ================= AUTH SECURITY =================
auth.onAuthStateChanged(user => {
    if (!user) {
        alert("Access Denied");
        window.location.href = "login.html";
    }
});

// ================= MENU CONFIG =================
const menuItems = [
    {id:"products", label:"8.1 Product Management"},
    {id:"orders", label:"8.2 Orders"},
    {id:"withdrawals", label:"8.3 Withdrawals"},
    {id:"promotion", label:"8.4 Promotion"},
    {id:"featured", label:"8.5 Featured"},
    {id:"globalOrders", label:"8.6 Global Orders"},
    {id:"security", label:"8.7 Security"},
    {id:"analytics", label:"8.8 Website Analytics"},
    {id:"sales", label:"8.9 Sales"},
    {id:"income", label:"8.10 Income"},
    {id:"categories", label:"8.11 Categories"},
    {id:"coupons", label:"8.12 Coupons"},
    {id:"banners", label:"8.13 Banners"},
    {id:"reviews", label:"8.14 Reviews"},
    {id:"users", label:"8.15 Users"},
    {id:"sellers", label:"8.16 Sellers"},
    {id:"payments", label:"8.17 Payments"},
    {id:"refunds", label:"8.18 Refunds"},
    {id:"logs", label:"8.19 Logs"},
    {id:"settings", label:"8.20 Settings"},
    {id:"codeChecker", label:"8.21 Code Checker"}
];

// ================= BUILD MENU =================
const menuContainer = document.getElementById("menuContainer");

menuItems.forEach(item => {
    const btn = document.createElement("button");
    btn.innerText = item.label;
    btn.className = "block w-full text-left p-2 hover:bg-blue-600 rounded";
    btn.onclick = () => showSection(item.id);
    menuContainer.appendChild(btn);
});

// ================= BUILD SECTIONS =================
const sectionContainer = document.getElementById("sectionsContainer");

menuItems.forEach(item => {
    const div = document.createElement("div");
    div.id = item.id;
    div.className = "section p-4";
    div.innerHTML = `<h2 class="text-xl font-bold">${item.label}</h2>
                     <div class="mt-3 text-gray-500">Loading module...</div>`;
    sectionContainer.appendChild(div);
});

// ================= NAVIGATION =================
function showSection(id) {
    document.querySelectorAll(".section").forEach(sec => sec.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    closeSidebar();
}

// ================= SIDEBAR =================
function openSidebar() {
    document.getElementById("sidebar").classList.remove("sidebar-hidden");
    document.getElementById("overlay").classList.add("active");
}
function closeSidebar() {
    document.getElementById("sidebar").classList.add("sidebar-hidden");
    document.getElementById("overlay").classList.remove("active");
}

// ================= THEME =================
function toggleTheme() {
    document.body.classList.toggle("dark");
}

// ================= LOGOUT =================
function logout() {
    auth.signOut();
}

// ================= HOME =================
function goHome() {
    window.location.href = "index.html";
}

// ================= DASHBOARD (SCALABLE) =================
function loadStats() {
    db.ref("stats").on("value", snap => {
        const data = snap.val() || {};

        document.getElementById("usersCount").innerText = data.users || 0;
        document.getElementById("sellersCount").innerText = data.sellers || 0;
        document.getElementById("ordersCount").innerText = data.orders || 0;
        document.getElementById("revenueCount").innerText = data.revenue || 0;
    });
}

loadStats();

// ================= NOTIFICATION SYSTEM =================
function notify(msg) {
    alert(msg);
}

// ================= LOADER =================
function showLoader() {
    console.log("Loading...");
}
function hideLoader() {
    console.log("Done");
}

    </script>
