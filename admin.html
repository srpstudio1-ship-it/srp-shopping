<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB2xwVO-c_f4cEn6PjtArta3DU6mqz7yxw",
  authDomain: "srp-shopping-54bbb.firebaseapp.com",
  databaseURL: "https://srp-shopping-54bbb-default-rtdb.firebaseio.com",
  projectId: "srp-shopping-54bbb",
  storageBucket: "srp-shopping-54bbb.appspot.com",
  messagingSenderId: "491906168702",
  appId: "1:491906168702:web:2873565fcd2d561077252f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const storage = firebase.storage();

// SIDEBAR
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("hidden");
}

// THEME
function toggleTheme() {
    document.body.classList.toggle("dark");
}

// HOME BUTTON
function goHome() {
    window.location.href = "index.html";
}

// SECTION SWITCH
function showSection(id) {
    document.querySelectorAll(".section").forEach(sec => {
        sec.classList.add("hidden-section");
    });
    document.getElementById(id).classList.remove("hidden-section");
}

// DASHBOARD DATA
function loadDashboard() {
    db.ref("users").on("value", snap => {
        document.getElementById("totalUsers").innerText = snap.numChildren();
    });

    db.ref("sellers").on("value", snap => {
        document.getElementById("totalSellers").innerText = snap.numChildren();
    });

    db.ref("orders").on("value", snap => {
        document.getElementById("totalOrders").innerText = snap.numChildren();
    });
}

loadDashboard();

</script>
