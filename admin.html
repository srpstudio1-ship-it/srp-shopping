<!DOCTYPE html>
<html lang="en">
<head>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

.sidebar-hidden { transform: translateX(-100%); }

    top:0; left:0;

    display:none;
}
.overlay.active { display:block; }
.section { display:none; }
.section.active { display:block; }
</style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-white">

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="closeSidebar()"></div>

<!-- TOPBAR -->
<div class="flex justify-between items-center bg-blue-900 text-white p-4 shadow">

    <div class="flex items-center gap-4">
        <button onclick="openSidebar()" class="text-2xl">☰</button>
        <h1 class="font-bold text-lg">SRP ADMIN PANEL</h1>
    </div>

    <div class="flex items-center gap-3">
        <button onclick="toggleTheme()" class="bg-gray-800 px-3 py-1 rounded">🌙</button>
        <button onclick="goHome()" class="bg-green-600 px-3 py-1 rounded">Home</button>
        <button onclick="logout()" class="bg-red-600 px-3 py-1 rounded">Logout</button>
    </div>
</div>

<div class="flex">

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar sidebar-hidden fixed z-50 w-64 h-full bg-blue-800 p-4 text-white overflow-y-auto">

    <h2 class="font-bold mb-4">ADMIN MENU</h2>
    <div id="menuContainer"></div>

</div>

<!-- MAIN -->
<div class="flex-1 p-4">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
    <h2 class="text-2xl font-bold">Dashboard</h2>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4">

        <div class="bg-white dark:bg-gray-800 p-4 rounded shadow">
            Users: <span id="usersCount">0</span>
        </div>

        <div class="bg-white dark:bg-gray-800 p-4 rounded shadow">
            Sellers: <span id="sellersCount">0</span>
        </div>

        <div class="bg-white dark:bg-gray-800 p-4 rounded shadow">
            Orders: <span id="ordersCount">0</span>
        </div>

        <div class="bg-white dark:bg-gray-800 p-4 rounded shadow">
            Revenue: ₹<span id="revenueCount">0</span>
        </div>

    </div>
</div>

<!-- ALL OTHER SECTIONS AUTO GENERATED -->
<div id="sectionsContainer"></div>

</div>
</div>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyB2xwVO-c_f4cEn6PjtArta3DU6mqz7yxw",
  authDomain: "srp-shopping-54bbb.firebaseapp.com",
  databaseURL: "https://srp-shopping-54bbb-default-rtdb.firebaseio.com",
  projectId: "srp-shopping-54bbb",
  storageBucket: "srp-shopping-54bbb.appspot.com",
  messagingSenderId: "491906168702",
  appId: "1:491906168702:web:2873565fcd2d561077252f"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

// ================= AUTH SECURITY =================
auth.onAuthStateChanged(user => {
    if (!user) {
        alert("Access Denied");
        window.location.href = "login.html";
    }
});

// ================= MENU CONFIG =================
const menuItems = [
    {id:"products", label:"8.1 Product Management"},
    {id:"orders", label:"8.2 Orders"},
    {id:"withdrawals", label:"8.3 Withdrawals"},
    {id:"promotion", label:"8.4 Promotion"},
    {id:"featured", label:"8.5 Featured"},
    {id:"globalOrders", label:"8.6 Global Orders"},
    {id:"security", label:"8.7 Security"},
    {id:"analytics", label:"8.8 Website Analytics"},
    {id:"sales", label:"8.9 Sales"},
    {id:"income", label:"8.10 Income"},
    {id:"categories", label:"8.11 Categories"},
    {id:"coupons", label:"8.12 Coupons"},
    {id:"banners", label:"8.13 Banners"},
    {id:"reviews", label:"8.14 Reviews"},
    {id:"users", label:"8.15 Users"},
    {id:"sellers", label:"8.16 Sellers"},
    {id:"payments", label:"8.17 Payments"},
    {id:"refunds", label:"8.18 Refunds"},
    {id:"logs", label:"8.19 Logs"},
    {id:"settings", label:"8.20 Settings"},
    {id:"codeChecker", label:"8.21 Code Checker"}
];

// ================= BUILD MENU =================
const menuContainer = document.getElementById("menuContainer");

menuItems.forEach(item => {
    const btn = document.createElement("button");
    btn.innerText = item.label;
    btn.className = "block w-full text-left p-2 hover:bg-blue-600 rounded";
    btn.onclick = () => showSection(item.id);
    menuContainer.appendChild(btn);
});

// ================= BUILD SECTIONS =================
const sectionContainer = document.getElementById("sectionsContainer");

menuItems.forEach(item => {
    const div = document.createElement("div");
    div.id = item.id;
    div.className = "section p-4";
    div.innerHTML = `<h2 class="text-xl font-bold">${item.label}</h2>
                     <div class="mt-3 text-gray-500">Loading module...</div>`;
    sectionContainer.appendChild(div);
});

// ================= NAVIGATION =================
function showSection(id) {
    document.querySelectorAll(".section").forEach(sec => sec.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    closeSidebar();
}

// ================= SIDEBAR =================
function openSidebar() {
    document.getElementById("sidebar").classList.remove("sidebar-hidden");
    document.getElementById("overlay").classList.add("active");
}
function closeSidebar() {
    document.getElementById("sidebar").classList.add("sidebar-hidden");
    document.getElementById("overlay").classList.remove("active");
}

// ================= THEME =================
function toggleTheme() {
    document.body.classList.toggle("dark");
}

// ================= LOGOUT =================
function logout() {
    auth.signOut();
}

// ================= HOME =================
function goHome() {
    window.location.href = "index.html";
}

// ================= DASHBOARD (SCALABLE) =================
function loadStats() {
    db.ref("stats").on("value", snap => {
        const data = snap.val() || {};

        document.getElementById("usersCount").innerText = data.users || 0;
        document.getElementById("sellersCount").innerText = data.sellers || 0;
        document.getElementById("ordersCount").innerText = data.orders || 0;
        document.getElementById("revenueCount").innerText = data.revenue || 0;
    });
}

loadStats();

// ================= NOTIFICATION SYSTEM =================
function notify(msg) {
    alert(msg);
}

// ================= LOADER =================
function showLoader() {
    console.log("Loading...");
}
function hideLoader() {
    console.log("Done");
}
// ==========================
// 8.1 PRODUCT MANAGEMENT
// ==========================

document.getElementById("products").innerHTML = `
<h2 class="text-2xl font-bold mb-4">Product Management</h2>

<div class="grid md:grid-cols-2 gap-4">

<div class="bg-white dark:bg-gray-800 p-4 rounded shadow">
<h3 class="font-bold mb-2">Add Product</h3>

<input id="p_name" placeholder="Product Name" class="w-full p-2 mb-2 border rounded">
<input id="p_mrp" type="number" placeholder="MRP" class="w-full p-2 mb-2 border rounded">
<input id="p_price" type="number" placeholder="Discount Price" class="w-full p-2 mb-2 border rounded">
<input id="p_category" placeholder="Category" class="w-full p-2 mb-2 border rounded">
<input id="p_stock" type="number" placeholder="Stock" class="w-full p-2 mb-2 border rounded">
<input id="p_image" type="file" class="w-full mb-2">
<textarea id="p_desc" placeholder="Description" class="w-full p-2 mb-2 border rounded"></textarea>

<button onclick="addProduct()" class="bg-blue-600 text-white px-4 py-2 rounded w-full">Add Product</button>
</div>

<div class="bg-white dark:bg-gray-800 p-4 rounded shadow">
<h3 class="font-bold mb-2">All Products</h3>
<div id="productList" class="max-h-96 overflow-auto"></div>
</div>

</div>
`;

function addProduct() {
    const id = "P" + Date.now();

    const file = document.getElementById("p_image").files[0];

    if(!file) return alert("Select image");

    const ref = storage.ref("products/" + id);

    ref.put(file).then(() => {
        ref.getDownloadURL().then(url => {

            const data = {
                id,
                name: p_name.value,
                mrp: p_mrp.value,
                price: p_price.value,
                category: p_category.value,
                stock: p_stock.value,
                desc: p_desc.value,
                image: url,
                status: p_stock.value > 0 ? "In Stock" : "Out of Stock",
                created: Date.now()
            };

            db.ref("products/" + id).set(data);

            notify("Product Added");
        });
    });
}

// LOAD PRODUCTS
db.ref("products").on("value", snap => {
    let html = "";
    snap.forEach(s => {
        const p = s.val();

        html += `
        <div class="border p-2 mb-2 rounded">
            <img src="${p.image}" class="w-16 h-16 object-cover">
            <div>${p.name}</div>
            <div>₹${p.price}</div>
            <div>${p.status}</div>

            <button onclick="deleteProduct('${p.id}')" class="bg-red-500 text-white px-2 py-1 mt-1">Delete</button>
            <button onclick="toggleStock('${p.id}', ${p.stock})" class="bg-yellow-500 text-white px-2 py-1 mt-1">Toggle Stock</button>
        </div>`;
    });
    productList.innerHTML = html;
});

function deleteProduct(id) {
    db.ref("products/" + id).remove();
    notify("Deleted");
}

function toggleStock(id, stock) {
    const newStock = stock > 0 ? 0 : 10;
    db.ref("products/" + id + "/stock").set(newStock);
}

// ==========================
// 8.2 ORDERS MANAGEMENT
// ==========================

document.getElementById("orders").innerHTML = `
<h2 class="text-2xl font-bold mb-4">Orders</h2>
<div id="orderList"></div>
`;

db.ref("orders").on("value", snap => {
    let html = "";
    snap.forEach(s => {
        const o = s.val();

        html += `
        <div class="bg-white dark:bg-gray-800 p-3 mb-2 rounded shadow">
            <div><b>Order:</b> ${o.id}</div>
            <div>${o.name} | ${o.phone}</div>
            <div>Status: ${o.status}</div>

            <input placeholder="Tracking ID" id="track_${o.id}" class="border p-1 mt-1">

            <button onclick="updateOrder('${o.id}')" class="bg-blue-600 text-white px-2 py-1 mt-1">Update</button>
        </div>`;
    });
    orderList.innerHTML = html;
});

function updateOrder(id) {
    const tracking = document.getElementById("track_" + id).value;

    db.ref("orders/" + id).update({
        tracking,
        status: "Shipped"
    });

    db.ref("notifications/" + id).push({
        msg: "Your order shipped",
        time: Date.now()
    });

    notify("Order Updated");
}

// ==========================
// 8.3 WITHDRAWALS
// ==========================

document.getElementById("withdrawals").innerHTML = `
<h2 class="text-2xl font-bold mb-4">Withdrawals</h2>
<div id="withdrawList"></div>
`;

db.ref("withdrawals").on("value", snap => {
    let html = "";
    snap.forEach(s => {
        const w = s.val();

        html += `
        <div class="bg-white dark:bg-gray-800 p-3 mb-2 rounded">
            <div>${w.seller}</div>
            <div>₹${w.amount}</div>

            <button onclick="approveWithdraw('${s.key}')" class="bg-green-600 px-2 py-1 text-white">Approve</button>
            <button onclick="rejectWithdraw('${s.key}')" class="bg-red-600 px-2 py-1 text-white">Reject</button>
        </div>`;
    });
    withdrawList.innerHTML = html;
});

function approveWithdraw(id) {
    db.ref("withdrawals/" + id).update({status:"Approved"});
    notify("Approved");
}
function rejectWithdraw(id) {
    db.ref("withdrawals/" + id).update({status:"Rejected"});
    notify("Rejected");
}

// ==========================
// 8.4 PROMOTION PAYMENTS
// ==========================

document.getElementById("promotion").innerHTML = `
<h2 class="text-2xl font-bold mb-4">Promotion Payments</h2>

<input id="promo_name" placeholder="Seller Name" class="border p-2 mb-2 w-full">
<input id="promo_amount" placeholder="Amount" class="border p-2 mb-2 w-full">

<button onclick="addPromo()" class="bg-blue-600 text-white px-3 py-1">Add</button>

<div id="promoList" class="mt-3"></div>
`;

function addPromo() {
    const id = Date.now();

    db.ref("promotion/" + id).set({
        name: promo_name.value,
        amount: promo_amount.value,
        time: Date.now()
    });

    notify("Added");
}

db.ref("promotion").on("value", snap => {
    let html = "";
    snap.forEach(s => {
        const p = s.val();
        html += `<div>${p.name} - ₹${p.amount}</div>`;
    });
    promoList.innerHTML = html;
});
    </script>
