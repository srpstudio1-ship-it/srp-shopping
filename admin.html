<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRP ADMIN PANEL FINAL</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<style>
body { font-family: 'Segoe UI'; }
.sidebar { width:260px; }
</style>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

<!-- SIDEBAR -->
<div class="sidebar bg-blue-900 text-white p-4 overflow-y-auto">
<h1 class="text-2xl font-bold mb-6">SRP ADMIN</h1>

<ul class="space-y-2 text-sm">
<li onclick="openTab('dashboard')" class="p-2 hover:bg-blue-700 cursor-pointer">📊 Dashboard</li>
<li onclick="openTab('users')" class="p-2 hover:bg-blue-700 cursor-pointer">👤 Users</li>
<li onclick="openTab('sellers')" class="p-2 hover:bg-blue-700 cursor-pointer">🏪 Sellers</li>
<li onclick="openTab('products')" class="p-2 hover:bg-blue-700 cursor-pointer">📦 Products</li>
<li onclick="openTab('orders')" class="p-2 hover:bg-blue-700 cursor-pointer">🧾 Orders</li>
<li onclick="openTab('payments')" class="p-2 hover:bg-blue-700 cursor-pointer">💳 Payments</li>
<li onclick="openTab('refunds')" class="p-2 hover:bg-blue-700 cursor-pointer">↩ Refunds</li>
<li onclick="openTab('withdrawals')" class="p-2 hover:bg-blue-700 cursor-pointer">💸 Withdrawals</li>
<li onclick="openTab('coupons')" class="p-2 hover:bg-blue-700 cursor-pointer">🎟 Coupons</li>
<li onclick="openTab('reviews')" class="p-2 hover:bg-blue-700 cursor-pointer">⭐ Reviews</li>
<li onclick="openTab('analytics')" class="p-2 hover:bg-blue-700 cursor-pointer">📈 Analytics</li>
<li onclick="openTab('logs')" class="p-2 hover:bg-blue-700 cursor-pointer">📜 Logs</li>
<li onclick="openTab('settings')" class="p-2 hover:bg-blue-700 cursor-pointer">⚙ Settings</li>
</ul>
</div>

<!-- CONTENT -->
<div class="flex-1 p-6 overflow-y-auto">

<div id="dashboard" class="tab"><h2 class="text-xl font-bold">Dashboard</h2><p>Welcome Admin</p></div>
<div id="users" class="tab hidden"></div>
<div id="sellers" class="tab hidden"></div>
<div id="products" class="tab hidden"></div>
<div id="orders" class="tab hidden"></div>
<div id="payments" class="tab hidden"></div>
<div id="refunds" class="tab hidden"></div>
<div id="withdrawals" class="tab hidden"></div>
<div id="coupons" class="tab hidden"></div>
<div id="reviews" class="tab hidden"></div>
<div id="analytics" class="tab hidden"></div>
<div id="logs" class="tab hidden"></div>
<div id="settings" class="tab hidden"></div>

</div>
</div>

<script>

// FIREBASE
firebase.initializeApp({
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
databaseURL:"YOUR_DB",
projectId:"YOUR_ID",
storageBucket:"YOUR_BUCKET"
});

const db = firebase.database();

// TAB
function openTab(t){
document.querySelectorAll('.tab').forEach(e=>e.classList.add('hidden'));
document.getElementById(t).classList.remove('hidden');

if(t=="users") loadUsers();
if(t=="sellers") loadSellers();
if(t=="payments") loadPayments();
if(t=="refunds") loadRefunds();
if(t=="coupons") loadCoupons();
if(t=="reviews") loadReviews();
if(t=="analytics") loadAnalytics();
if(t=="logs") loadLogs();
if(t=="settings") loadSettings();
}

// USERS
function loadUsers(){
db.ref('users').on('value',snap=>{
let h="<h2 class='text-xl font-bold mb-2'>Users</h2>";
snap.forEach(d=>{
let u=d.val();
h+=`<div class="bg-white p-2 mb-2">${u.name||''} ${u.email||''}</div>`;
});
users.innerHTML=h;
});
}

// SELLERS
function loadSellers(){
db.ref('sellers').on('value',snap=>{
let h="<h2 class='text-xl font-bold mb-2'>Sellers</h2>";
snap.forEach(d=>{
let s=d.val();
h+=`<div class="bg-white p-2 mb-2">
${s.shopName} (${s.status})
<button onclick="updateSeller('${d.key}','Approved')" class="bg-green-500 px-2 text-white">Approve</button>
<button onclick="updateSeller('${d.key}','Blocked')" class="bg-red-500 px-2 text-white">Block</button>
</div>`;
});
sellers.innerHTML=h;
});
}
function updateSeller(id,s){db.ref('sellers/'+id).update({status:s});}

// PAYMENTS
function loadPayments(){
db.ref('payments').on('value',snap=>{
let h="<h2 class='text-xl font-bold'>Payments</h2>";
snap.forEach(d=>{
let p=d.val();
h+=`<div class="bg-white p-2 mb-2">${p.user} ₹${p.amount}</div>`;
});
payments.innerHTML=h;
});
}

// REFUNDS
function loadRefunds(){
db.ref('refunds').on('value',snap=>{
let h="<h2 class='text-xl font-bold'>Refunds</h2>";
snap.forEach(d=>{
let r=d.val();
h+=`<div class="bg-white p-2 mb-2">
${r.orderId} ₹${r.amount}
<button onclick="updateRefund('${d.key}','Approved')" class="bg-green-500 text-white px-2">Approve</button>
</div>`;
});
refunds.innerHTML=h;
});
}
function updateRefund(id,s){db.ref('refunds/'+id).update({status:s});}

// COUPONS
function loadCoupons(){
db.ref('coupons').on('value',snap=>{
let h="<h2 class='text-xl font-bold'>Coupons</h2>";
snap.forEach(d=>{
let c=d.val();
h+=`<div class="bg-white p-2">${c.code} - ${c.discount}%</div>`;
});
coupons.innerHTML=h;
});
}

// REVIEWS
function loadReviews(){
db.ref('reviews').on('value',snap=>{
let h="<h2 class='text-xl font-bold'>Reviews</h2>";
snap.forEach(d=>{
let r=d.val();
h+=`<div class="bg-white p-2">
${r.user} ⭐${r.rating}
<button onclick="deleteReview('${d.key}')" class="bg-red-500 text-white px-2">Delete</button>
</div>`;
});
reviews.innerHTML=h;
});
}
function deleteReview(id){db.ref('reviews/'+id).remove();}

// ANALYTICS
function loadAnalytics(){
db.ref('orders').once('value',snap=>{
let total=0;
snap.forEach(d=> total += d.val().amount||0);
analytics.innerHTML=`<h2 class="text-xl font-bold">Total Revenue ₹${total}</h2>`;
});
}

// LOGS
function loadLogs(){
db.ref('logs').on('value',snap=>{
let h="<h2 class='text-xl font-bold'>Logs</h2>";
snap.forEach(d=>{
h+=`<div class="bg-white p-1">${d.val()}</div>`;
});
logs.innerHTML=h;
});
}

// SETTINGS
function loadSettings(){
settings.innerHTML=`
<h2 class="text-xl font-bold">Settings</h2>
<input placeholder="Commission %" id="commission" class="border p-2">
<button onclick="saveSettings()" class="bg-blue-600 text-white px-3 py-1">Save</button>
`;
}
function saveSettings(){
let v=document.getElementById("commission").value;
db.ref('settings').set({commission:v});
alert("Saved");
}

// INIT
window.onload=()=>{
openTab('dashboard');
};

</script>

</body>
</html>
