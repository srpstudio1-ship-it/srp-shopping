        // Theme Toggle Logic (8.7 Day/Night Mode)
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            }
        }

        // Check local storage for theme preference on load
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
        }

        function initProductManagementLogic() {
            const form = document.getElementById('product-form');
            const fileInput = document.getElementById('prod-image');
            const fileNameDisplay = document.getElementById('file-name-display');
            
            // Show filename on selection
            fileInput.addEventListener('change', function(e) {
                if(e.target.files.length > 0) {
                    fileNameDisplay.textContent = e.target.files[0].name;
                    fileNameDisplay.classList.add('text-primary', 'font-medium');
                }
            });

            // Fetch and display products real-time
            db.ref('products').on('value', (snapshot) => {
                const tbody = document.getElementById('product-table-body');
                if(!tbody) return; // Exit if user navigated away
                
                tbody.innerHTML = '';
                const data = snapshot.val();
                
                if (!data) {
                    tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">No products found. Add your first product above!</td></tr>`;
                    return;
                }

                // Reverse loop to show newest first
                Object.keys(data).reverse().forEach(key => {
                    const prod = data[key];
                    const outOfStock = prod.stock <= 0 || prod.isOutOfStock === true;
                    
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors group";
                    tr.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <div class="h-12 w-12 flex-shrink-0 rounded-md bg-gray-100 overflow-hidden border border-gray-200 dark:border-gray-700">
                                    <img src="${prod.imageUrl || 'https://via.placeholder.com/150'}" alt="" class="h-12 w-12 object-cover">
                                </div>
                                <div class="ml-4">
                                    <div class="text-xs font-mono text-gray-500 dark:text-gray-400">${prod.id}</div>
                                    <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-300 mt-1">
                                        ${prod.category}
                                    </span>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="text-sm font-medium text-gray-900 dark:text-white line-clamp-2">${prod.name}</div>
                            <div class="text-xs text-gray-500 mt-1 line-clamp-1 truncate w-48" title="${prod.description}">${prod.description}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm font-bold text-green-600 dark:text-green-400">₹${prod.price}</div>
                            <div class="text-xs text-gray-500 line-through">₹${prod.mrp}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm text-gray-900 dark:text-white font-medium">${prod.stock} Units</div>
                            <button onclick="toggleStockStatus('${prod.id}', ${prod.isOutOfStock})" class="mt-1 text-xs font-medium ${outOfStock ? 'text-red-500 hover:text-red-700' : 'text-green-500 hover:text-green-700'} focus:outline-none">
                                <i class="fa-solid ${outOfStock ? 'fa-toggle-off' : 'fa-toggle-on'} mr-1"></i> 
                                ${outOfStock ? 'Mark In Stock' : 'Mark Out of Stock'}
                            </button>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button onclick="editProduct('${prod.id}')" class="text-indigo-600 dark:text-indigo-400 hover:text-indigo-900 mr-3 p-2 rounded-full hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-colors" title="Edit">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <button onclick="deleteProduct('${prod.id}')" class="text-red-600 dark:text-red-400 hover:text-red-900 p-2 rounded-full hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors" title="Delete">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            });

            // Handle Form Submit (Add / Edit)
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const btn = document.getElementById('submit-btn');
                const btnText = document.getElementById('submit-text');
                const btnIcon = document.getElementById('submit-icon');
                const originalText = btnText.innerText;
                
                // Loading UI
                btn.disabled = true;
                btn.classList.add('opacity-70', 'cursor-not-allowed');
                btnIcon.className = "fa-solid fa-circle-notch fa-spin mr-2";
                btnText.innerText = "Saving...";

                try {
                    const editId = document.getElementById('edit-product-id').value;
                    const isEdit = editId !== "";
                    
                    // 1. Generate unique ID automatically if new
                    const productId = isEdit ? editId : 'SRP-' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).substring(2, 5).toUpperCase();
                    
                    let imageUrl = "";
                    const file = fileInput.files[0];

                    // 2. Upload Image if exists
                    if (file) {
                        const storageRef = storage.ref('products/' + productId + '_' + file.name);
                        const snapshot = await storageRef.put(file);
                        imageUrl = await snapshot.ref.getDownloadURL();
                    } else if (isEdit) {
                        // Keep old image if editing and no new image uploaded
                        const snapshot = await db.ref('products/' + productId).once('value');
                        imageUrl = snapshot.val().imageUrl;
                    } else {
                        throw new Error("Product Image is mandatory for new products.");
                    }

                    // 3. Build product object
                    const productData = {
                        id: productId,
                        name: document.getElementById('prod-name').value,
                        mrp: Number(document.getElementById('prod-mrp').value),
                        price: Number(document.getElementById('prod-price').value),
                        category: document.getElementById('prod-category').value,
                        stock: Number(document.getElementById('prod-stock').value),
                        description: document.getElementById('prod-desc').value,
                        imageUrl: imageUrl,
                        isOutOfStock: Number(document.getElementById('prod-stock').value) <= 0,
                        updatedAt: firebase.database.ServerValue.TIMESTAMP
                    };

                    if(!isEdit) productData.createdAt = firebase.database.ServerValue.TIMESTAMP;

                    // 4. Save to Firebase Realtime Database
                    await db.ref('products/' + productId).set(productData);
                    
                    alert(isEdit ? "Product Updated Successfully!" : "Product Added Successfully!");
                    resetProductForm();

                } catch (error) {
                    console.error("Error saving product: ", error);
                    alert("Error: " + error.message);
                } finally {
                    // Restore UI
                    btn.disabled = false;
                    btn.classList.remove('opacity-70', 'cursor-not-allowed');
                    btnIcon.className = document.getElementById('edit-product-id').value ? "fa-solid fa-pen mr-2" : "fa-solid fa-plus mr-2";
                    btnText.innerText = originalText;
                }
            });
        }

        // Global functions for inline HTML event handlers
        window.deleteProduct = async function(productId) {
            if(confirm(`Are you absolutely sure you want to delete Product ID: ${productId}? This cannot be undone.`)) {
                try {
                    await db.ref('products/' + productId).remove();
                    // Note: In a production app, you might also want to delete the image from Storage here.
                    alert("Product deleted successfully.");
                } catch(error) {
                    alert("Failed to delete product: " + error.message);
                }
            }
        };

        window.toggleStockStatus = async function(productId, currentStatus) {
            try {
                await db.ref('products/' + productId).update({
                    isOutOfStock: !currentStatus
                });
            } catch(error) {
                alert("Failed to update stock status.");
            }
        };

        window.editProduct = async function(productId) {
            // Scroll to top
            document.getElementById('main-viewport').scrollTo({top: 0, behavior: 'smooth'});
            
            try {
                const snapshot = await db.ref('products/' + productId).once('value');
                const prod = snapshot.val();
                
                if(prod) {
                    document.getElementById('form-title').innerText = "Edit Product: " + productId;
                    document.getElementById('edit-product-id').value = prod.id;
                    
                    document.getElementById('prod-name').value = prod.name;
                    document.getElementById('prod-mrp').value = prod.mrp;
                    document.getElementById('prod-price').value = prod.price;
                    document.getElementById('prod-category').value = prod.category;
                    document.getElementById('prod-stock').value = prod.stock;
                    document.getElementById('prod-desc').value = prod.description;
                    
                    document.getElementById('submit-text').innerText = "Update Product";
                    document.getElementById('submit-icon').className = "fa-solid fa-pen mr-2";
                    document.getElementById('file-name-display').innerText = "(Optional) Upload new image to replace current";
                    document.getElementById('file-name-display').classList.remove('text-primary');
                }
            } catch(error) {
                alert("Error fetching product details.");
            }
        };

        window.resetProductForm = function() {
            document.getElementById('product-form').reset();
            document.getElementById('edit-product-id').value = "";
            document.getElementById('form-title').innerText = "Add New Product";
            document.getElementById('submit-text').innerText = "Save Product";
            document.getElementById('submit-icon').className = "fa-solid fa-plus mr-2";
            document.getElementById('file-name-display').innerText = "PNG, JPG up to 5MB";
            document.getElementById('file-name-display').classList.remove('text-primary');
        };
</script>
