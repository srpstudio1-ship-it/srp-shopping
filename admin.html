<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRP SHOPPING | Enterprise Command Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --brand: #4f46e5;
            --brand-surface: rgba(79, 70, 229, 0.1);
            --bg-deep: #0f172a;
            --bg-surface: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --danger: #ef4444;
            --success: #10b981;
            --border: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }

        .dark-mode {
            --bg-deep: #020617;
            --bg-surface: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-deep); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        /* --- AUTH SHIELD LAYER --- */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep); z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: var(--bg-surface); padding: 40px; border-radius: var(--radius-lg);
            width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        /* --- LAYOUT ARCHITECTURE --- */
        #sidebar {
            width: 280px; background: var(--bg-deep); display: flex; flex-direction: column;
            border-right: 1px solid var(--border); transition: 0.3s;
        }
        .nav-container { flex: 1; overflow-y: auto; padding: 20px; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            color: var(--text-sub); text-decoration: none; border-radius: var(--radius-md);
            margin-bottom: 4px; cursor: pointer; transition: 0.2s; font-weight: 500; font-size: 14px;
        }
        .nav-item:hover, .nav-item.active { background: var(--brand-surface); color: var(--brand); }
        .nav-item.active { background: var(--brand); color: white; }

        .app-canvas { flex: 1; display: flex; flex-direction: column; background: #f8fafc; overflow: hidden; }
        .dark-mode .app-canvas { background: #0f172a; }

        header {
            height: 72px; background: var(--bg-surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 32px;
        }

        /* --- DATA COMPONENTS --- */
        .content-scroll { flex: 1; padding: 32px; overflow-y: auto; }
        .card {
            background: var(--bg-surface); border-radius: var(--radius-lg);
            border: 1px solid var(--border); padding: 24px; margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
        }
        
        .loading-shimmer {
            width: 100%; height: 200px; background: linear-gradient(90deg, var(--border) 25%, var(--bg-deep) 50%, var(--border) 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-md);
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* --- TOAST v2.0 --- */
        #toast-stack { position: fixed; bottom: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .toast-msg {
            padding: 16px 24px; border-radius: var(--radius-md); color: white; font-weight: 600;
            display: flex; align-items: center; gap: 12px; animation: slideUp 0.3s ease-out;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Modern Inputs */
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: var(--text-sub); }
        .form-input { 
            width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px;
            background: transparent; color: var(--text-main); outline: none; transition: 0.2s;
        }
        .form-input:focus { border-color: var(--brand); box-shadow: 0 0 0 4px var(--brand-surface); }

        .btn-core {
            padding: 12px 24px; border-radius: 10px; border: none; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn-brand { background: var(--brand); color: white; }
        .btn-brand:hover { opacity: 0.9; transform: translateY(-1px); }

        .table-ui { width: 100%; border-collapse: collapse; }
        .table-ui th { text-align: left; padding: 16px; border-bottom: 2px solid var(--border); font-size: 12px; color: var(--text-sub); }
        .table-ui td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 14px; }

        #admin-sections > section { display: none; }
        #admin-sections > section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="login-card">
            <h2 style="margin-bottom: 8px;">Admin Login</h2>
            <p style="color: var(--text-sub); font-size: 14px; margin-bottom: 24px;">Enter credentials to manage SRP SHOPPING</p>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="admin-email" class="form-input" placeholder="admin@srpshopping.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="admin-pass" class="form-input" placeholder="••••••••">
            </div>
            <button id="login-btn" class="btn-core btn-brand" style="width: 100%; justify-content: center;">
                <i class="fas fa-lock"></i> Authorize Access
            </button>
        </div>
    </div>

    <aside id="sidebar">
        <div style="padding: 24px; border-bottom: 1px solid var(--border);">
            <h1 style="font-size: 18px; color: white;">SRP COMMAND</h1>
        </div>
        <nav class="nav-container" id="main-nav">
            </nav>
        <div style="padding: 20px; border-top: 1px solid var(--border);">
            <button id="logout-btn" class="nav-item" style="background: none; border: none; width: 100%;">
                <i class="fas fa-sign-out-alt"></i> Logout Session
            </button>
        </div>
    </aside>

    <div class="app-canvas">
        <header>
            <div style="display: flex; align-items: center; gap: 16px;">
                <h2 id="view-title" style="font-size: 20px;">Dashboard</h2>
            </div>
            <div style="display: flex; align-items: center; gap: 16px;">
                <button id="theme-toggle" class="btn-core" style="background: var(--border);"><i class="fas fa-adjust"></i></button>
                <div id="admin-profile" style="display: flex; align-items: center; gap: 10px;">
                    <span id="user-display" style="font-size: 14px; font-weight: 600;">Authenticating...</span>
                </div>
            </div>
        </header>

        <main class="content-scroll">
            <div id="admin-sections">
                <section id="sec-8-1" class="active">
                    <div class="card">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                            <h3>Deploy New Product</h3>
                        </div>
                        <form id="product-deploy-form">
                            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                                <div class="input-group">
                                    <label>Product Title</label>
                                    <input type="text" id="p-title" class="form-input" required>
                                </div>
                                <div class="input-group">
                                    <label>Category</label>
                                    <select id="p-category" class="form-input" required></select>
                                </div>
                                <div class="input-group">
                                    <label>Master Stock</label>
                                    <input type="number" id="p-stock" class="form-input" required>
                                </div>
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                                <div class="input-group">
                                    <label>Product Images (Gallery)</label>
                                    <input type="file" id="p-image-file" class="form-input" accept="image/jpeg,image/png">
                                </div>
                                <div class="input-group">
                                    <label>Price Configuration (MRP / Sale)</label>
                                    <div style="display: flex; gap: 10px;">
                                        <input type="number" id="p-mrp" class="form-input" placeholder="MRP">
                                        <input type="number" id="p-sale" class="form-input" placeholder="Sale">
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="btn-core btn-brand" id="deploy-trigger">
                                <i class="fas fa-cloud-upload-alt"></i> Finalize Deployment
                            </button>
                        </form>
                    </div>

                    <div class="card">
                        <h3>Inventory Ledger</h3>
                        <div id="inventory-loader" class="loading-shimmer" style="display: none;"></div>
                        <table class="table-ui" id="inventory-table">
                            <thead>
                                <tr>
                                    <th>Asset</th>
                                    <th>Product ID</th>
                                    <th>Category</th>
                                    <th>Valuation</th>
                                    <th>Stock</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-body"></tbody>
                        </table>
                    </div>
                </section>

                </div>
        </main>
    </div>

    <div id="toast-stack"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, remove, update, query, limitToLast, off } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // --- ENTERPRISE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyB2xwVO-c_f4cEn6PjtArta3DU6mqz7yxw",
            authDomain: "srp-shopping-54bbb.firebaseapp.com",
            databaseURL: "https://srp-shopping-54bbb-default-rtdb.firebaseio.com",
            projectId: "srp-shopping-54bbb",
            storageBucket: "srp-shopping-54bbb.firebasestorage.app",
            messagingSenderId: "491906168702",
            appId: "1:491906168702:web:2873565fcd2d561077252f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const storage = getStorage(app);

        // --- TOAST v2.0 SYSTEM ---
        const messenger = {
            show(msg, type = 'success') {
                const stack = document.getElementById('toast-stack');
                const t = document.createElement('div');
                t.className = `toast-msg`;
                t.style.background = type === 'success' ? 'var(--success)' : 'var(--danger)';
                t.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check' : 'fa-times'}"></i> ${msg}`;
                stack.appendChild(t);
                setTimeout(() => t.remove(), 4000);
            }
        };

        // --- AUTH GUARD: THE GATEKEEPER ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('user-display').innerText = user.email;
                initAdmin();
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
            }
        });

        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                messenger.show("Session Authorized");
            } catch (e) {
                messenger.show("Unauthorized Access Denied", "error");
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // --- DYNAMIC NAVIGATION (8.0) ---
        const sections = [
            { id: '8-1', label: '8.1 Product Mgmt', icon: 'fa-box' },
            { id: '8-2', label: '8.2 Orders Mgmt', icon: 'fa-shipping-fast' },
            { id: '8-3', label: '8.3 Withdrawals', icon: 'fa-wallet' },
            // ... truncated for Part 1 brevity, full list in Part 2
        ];

        function initAdmin() {
            const nav = document.getElementById('main-nav');
            nav.innerHTML = '';
            sections.forEach(s => {
                const el = document.createElement('div');
                el.className = `nav-item ${s.id === '8-1' ? 'active' : ''}`;
                el.innerHTML = `<i class="fas ${s.icon}"></i> ${s.label}`;
                el.addEventListener('click', () => switchView(s.id, s.label, el));
                nav.appendChild(el);
            });
            loadProducts();
        }

        function switchView(id, label, el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('view-title').innerText = label;
            // logic to hide/show section divs
        }

        // --- 8.1 PRODUCT LOGIC (STRICT VALIDATION) ---
        const pForm = document.getElementById('product-deploy-form');
        pForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('deploy-trigger');
            const file = document.getElementById('p-image-file').files[0];

            // 1. Null Check
            if(!file) return messenger.show("Critical: No Product Image Selected", "error");

            // 2. Strict Type & Size Check
            const validTypes = ['image/jpeg', 'image/png', 'image/webp'];
            if(!validTypes.includes(file.type)) return messenger.show("Invalid Format: Use JPG/PNG", "error");
            if(file.size > 2 * 1024 * 1024) return messenger.show("File Overload: Max 2MB Allowed", "error");

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Processing...`;

            try {
                // Secure Key Generation (ChatGPT's Fix)
                const pKey = push(ref(db, 'products')).key;
                const path = sRef(storage, `products/${pKey}/${file.name}`);
                
                const snap = await uploadBytes(path, file);
                const url = await getDownloadURL(snap.ref);

                await set(ref(db, `products/${pKey}`), {
                    pid: pKey,
                    title: document.getElementById('p-title').value,
                    category: document.getElementById('p-category').value,
                    stock: parseInt(document.getElementById('p-stock').value),
                    mrp: parseFloat(document.getElementById('p-mrp').value),
                    sale: parseFloat(document.getElementById('p-sale').value),
                    image: url,
                    timestamp: Date.now()
                });

                messenger.show("Product Globally Deployed: " + pKey);
                pForm.reset();
            } catch (err) {
                messenger.show("Deployment Failed: " + err.code, "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-cloud-upload-alt"></i> Finalize Deployment`;
            }
        });

        // --- OPTIMIZED REAL-TIME LEDGER ---
        function loadProducts() {
            const loader = document.getElementById('inventory-loader');
            const table = document.getElementById('inventory-body');
            loader.style.display = 'block';

            const pQuery = query(ref(db, 'products'), limitToLast(50));
            onValue(pQuery, (snap) => {
                loader.style.display = 'none';
                table.innerHTML = '';
                snap.forEach(child => {
                    const data = child.val();
                    table.insertAdjacentHTML('afterbegin', `
                        <tr>
                            <td><img src="${data.image}" style="width:40px; height:40px; border-radius:8px; object-fit:cover;"></td>
                            <td><code style="background:var(--brand-surface); color:var(--brand); padding:4px 8px; border-radius:5px;">${data.pid}</code></td>
                            <td>${data.category}</td>
                            <td>₹${data.sale} <small style="text-decoration:line-through; color:var(--text-sub)">₹${data.mrp}</small></td>
                            <td><span style="color: ${data.stock < 10 ? 'var(--danger)' : 'var(--success)'}; font-weight:700;">${data.stock}</span></td>
                            <td>
                                <button class="btn-core" style="padding:6px; color:var(--danger); background:none;" onclick="pRemover('${data.pid}')">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </td>
                        </tr>
                    `);
                });
            }, (err) => {
                messenger.show("Database Sync Error: Access Denied", "error");
            });
        }

        // --- GLOBAL ACTION HANDLERS ---
        window.pRemover = (id) => {
            if(confirm("Confirm deletion of Asset ID: " + id)) {
                remove(ref(db, `products/${id}`))
                    .then(() => messenger.show("Asset Purged Successfully"))
                    .catch(e => messenger.show("Action Blocked: Permission Denied", "error"));
            }
        }
    </script>
</body>
</html>
