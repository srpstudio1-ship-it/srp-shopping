<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRP ADMIN PANEL FINAL</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<style>
body { font-family: Arial; }
.sidebar { width:250px; }
</style>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

<!-- SIDEBAR -->
<div class="sidebar bg-blue-900 text-white p-4">
<h1 class="text-xl font-bold mb-4">SRP ADMIN</h1>

<ul class="space-y-2">
<li onclick="openTab('dashboard')" class="cursor-pointer">Dashboard</li>
<li onclick="openTab('users')" class="cursor-pointer">Users</li>
<li onclick="openTab('sellers')" class="cursor-pointer">Sellers</li>
<li onclick="openTab('products')" class="cursor-pointer">Products</li>
<li onclick="openTab('orders')" class="cursor-pointer">Orders</li>
<li onclick="openTab('withdraw')" class="cursor-pointer">Withdrawals</li>
<li onclick="openTab('coupons')" class="cursor-pointer">Coupons</li>
<li onclick="openTab('reviews')" class="cursor-pointer">Reviews</li>
<li onclick="openTab('analytics')" class="cursor-pointer">Analytics</li>
<li onclick="openTab('settings')" class="cursor-pointer">Settings</li>
</ul>
</div>

<!-- CONTENT -->
<div class="flex-1 p-4 overflow-y-auto">

<div id="dashboard" class="tab">
<h2 class="text-xl font-bold">Dashboard</h2>
</div>

<div id="users" class="tab hidden"></div>
<div id="sellers" class="tab hidden"></div>

<!-- PRODUCTS -->
<div id="products" class="tab hidden">
<input id="pName" placeholder="Name" class="border p-2 w-full mb-2">
<input id="pPrice" placeholder="Price" class="border p-2 w-full mb-2">
<input type="file" id="pImage" class="mb-2">
<button onclick="addProduct()" class="bg-blue-600 text-white px-3 py-1">Save</button>
<div id="productList" class="mt-4 grid grid-cols-2 gap-2"></div>
</div>

<div id="orders" class="tab hidden"></div>
<div id="withdraw" class="tab hidden"></div>
<div id="coupons" class="tab hidden"></div>
<div id="reviews" class="tab hidden"></div>
<div id="analytics" class="tab hidden"></div>
<div id="settings" class="tab hidden"></div>

</div>
</div>

<script>

// FIREBASE
firebase.initializeApp({
  apiKey: "AIzaSyB2xwVO-c_f4cEn6PjtArta3DU6mqz7yxw",
  authDomain: "srp-shopping-54bbb.firebaseapp.com",
  databaseURL: "https://srp-shopping-54bbb-default-rtdb.firebaseio.com",
  projectId: "srp-shopping-54bbb",
  storageBucket: "srp-shopping-54bbb.appspot.com",
});

const db = firebase.database();
const storage = firebase.storage();

// TAB
function openTab(tab){
document.querySelectorAll('.tab').forEach(t=>t.classList.add('hidden'));
document.getElementById(tab).classList.remove('hidden');

if(tab==="users") loadUsers();
if(tab==="sellers") loadSellers();
if(tab==="orders") loadOrders();
if(tab==="withdraw") loadWithdraw();
if(tab==="coupons") loadCoupons();
if(tab==="reviews") loadReviews();
if(tab==="analytics") loadAnalytics();
if(tab==="settings") loadSettings();
}

// USERS
function loadUsers(){
db.ref("users").on("value",snap=>{
let h="<h2 class='text-xl'>Users</h2>";
snap.forEach(d=>{
let u=d.val();
h+=`<div class="bg-white p-2 mb-2">${u.name||''} ${u.email||''}</div>`;
});
users.innerHTML=h;
});
}

// SELLERS
function loadSellers(){
db.ref("sellers").on("value",snap=>{
let h="<h2 class='text-xl'>Sellers</h2>";
snap.forEach(d=>{
let s=d.val();
h+=`<div class="bg-white p-2 mb-2">
${s.shopName||''} (${s.status||'Pending'})
<button onclick="updateSeller('${d.key}','Approved')" class="bg-green-500 text-white px-2">Approve</button>
<button onclick="updateSeller('${d.key}','Blocked')" class="bg-red-500 text-white px-2">Block</button>
</div>`;
});
sellers.innerHTML=h;
});
}
function updateSeller(id,s){db.ref("sellers/"+id).update({status:s});}

// PRODUCTS
function addProduct(){
let file=pImage.files[0];
let id=Date.now();
let ref=storage.ref("products/"+id);

ref.put(file).then(()=>{
ref.getDownloadURL().then(url=>{
db.ref("products/"+id).set({
name:pName.value,
price:pPrice.value,
image:url
});
loadProducts();
});
});
}
function loadProducts(){
db.ref("products").on("value",snap=>{
let h="";
snap.forEach(d=>{
let p=d.val();
h+=`<div class="bg-white p-2">
<img src="${p.image}" class="h-24 w-full">
<p>${p.name}</p>
</div>`;
});
productList.innerHTML=h;
});
}

// ORDERS
function loadOrders(){
db.ref("orders").on("value",snap=>{
let h="<h2 class='text-xl'>Orders</h2>";
snap.forEach(d=>{
let o=d.val();
h+=`<div class="bg-white p-2 mb-2">
${o.name||''} ${o.phone||''}
<button onclick="updateStatus('${d.key}','Delivered')" class="bg-green-500 text-white px-2">Done</button>
</div>`;
});
orders.innerHTML=h;
});
}
function updateStatus(id,s){db.ref("orders/"+id).update({status:s});}

// WITHDRAW
function loadWithdraw(){
db.ref("withdrawals").on("value",snap=>{
let h="<h2>Withdrawals</h2>";
snap.forEach(d=>{
let w=d.val();
h+=`<div class="bg-white p-2 mb-2">
${w.name} ₹${w.amount}
<button onclick="updateWithdraw('${d.key}','Approved')" class="bg-green-500 text-white px-2">Approve</button>
</div>`;
});
withdraw.innerHTML=h;
});
}
function updateWithdraw(id,s){db.ref("withdrawals/"+id).update({status:s});}

// COUPONS
function loadCoupons(){
db.ref("coupons").on("value",snap=>{
let h="<h2>Coupons</h2>";
snap.forEach(d=>{
let c=d.val();
h+=`<div class="bg-white p-2">${c.code} - ${c.discount}%</div>`;
});
coupons.innerHTML=h;
});
}

// REVIEWS
function loadReviews(){
db.ref("reviews").on("value",snap=>{
let h="<h2>Reviews</h2>";
snap.forEach(d=>{
let r=d.val();
h+=`<div class="bg-white p-2">
${r.user} ⭐${r.rating}
<button onclick="deleteReview('${d.key}')" class="bg-red-500 text-white px-2">Delete</button>
</div>`;
});
reviews.innerHTML=h;
});
}
function deleteReview(id){db.ref("reviews/"+id).remove();}

// ANALYTICS
function loadAnalytics(){
db.ref("orders").once("value",snap=>{
let total=0;
snap.forEach(d=> total+=Number(d.val().amount||0));
analytics.innerHTML=`<h2>Total Revenue ₹${total}</h2>`;
});
}

// SETTINGS
function loadSettings(){
settings.innerHTML=`
<h2>Settings</h2>
<input id="commission" placeholder="Commission %" class="border p-2">
<button onclick="saveSettings()" class="bg-blue-600 text-white px-2">Save</button>
`;
}
function saveSettings(){
let v=document.getElementById("commission").value;
db.ref("settings").set({commission:v});
alert("Saved");
}

// INIT
window.onload=()=>{
openTab("dashboard");
loadProducts();
};

</script>

</body>
  </html>
