<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRP ADMIN PANEL</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<style>
body { font-family: Arial; }
.sidebar { width:250px; }
</style>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

<!-- SIDEBAR -->
<div class="sidebar bg-blue-900 text-white p-4">
<h1 class="text-xl font-bold mb-4">SRP ADMIN</h1>

<ul class="space-y-2">
<li onclick="openTab('dashboard')" class="cursor-pointer">Dashboard</li>
<li onclick="openTab('products')" class="cursor-pointer">Products</li>
<li onclick="openTab('category')" class="cursor-pointer">Category</li>
<li onclick="openTab('banner')" class="cursor-pointer">Banner</li>
</ul>
</div>

<!-- CONTENT -->
<div class="flex-1 p-4 overflow-y-auto">

<div id="dashboard" class="tab">
<h2 class="text-xl font-bold mb-4">Dashboard</h2>
<p>Welcome Admin</p>
</div>

<!-- PRODUCTS -->
<div id="products" class="tab hidden">

<h2 class="text-xl mb-2">Add Product</h2>

<input id="pName" placeholder="Name" class="border p-2 w-full mb-2">
<input id="pPrice" placeholder="Price" class="border p-2 w-full mb-2">
<input type="file" id="pImage" class="mb-2">

<button onclick="addProduct()" class="bg-blue-600 text-white px-4 py-2">Save</button>

<div id="productList" class="mt-4 grid grid-cols-2 gap-2"></div>

</div>

<!-- CATEGORY -->
<div id="category" class="tab hidden">
<input id="catName" placeholder="Category" class="border p-2 mb-2">
<button onclick="addCategory()" class="bg-green-600 text-white px-3 py-1">Add</button>
<div id="catList"></div>
</div>

<!-- BANNER -->
<div id="banner" class="tab hidden">
<input type="file" id="bannerImage" class="mb-2">
<button onclick="uploadBanner()" class="bg-purple-600 text-white px-3 py-1">Upload</button>
<div id="bannerList"></div>
</div>

</div>
</div>

<script>

// ✅ YOUR FIREBASE CONFIG (ALREADY SET)
firebase.initializeApp({
  apiKey: "AIzaSyB2xwVO-c_f4cEn6PjtArta3DU6mqz7yxw",
  authDomain: "srp-shopping-54bbb.firebaseapp.com",
  databaseURL: "https://srp-shopping-54bbb-default-rtdb.firebaseio.com",
  projectId: "srp-shopping-54bbb",
  storageBucket: "srp-shopping-54bbb.appspot.com",
});

const db = firebase.database();
const storage = firebase.storage();

// TAB
function openTab(tab){
document.querySelectorAll('.tab').forEach(t=>t.classList.add('hidden'));
document.getElementById(tab).classList.remove('hidden');
}

// ADD PRODUCT
function addProduct(){

let file = document.getElementById("pImage").files[0];
let name = pName.value;
let price = pPrice.value;

if(!file || !name) return alert("Fill all");

let id = Date.now();

let ref = storage.ref("products/"+id);

ref.put(file).then(()=>{

ref.getDownloadURL().then(url=>{

db.ref("products/"+id).set({
name:name,
price:price,
image:url
});

alert("Saved");
loadProducts();

});

});

}

// LOAD PRODUCTS
function loadProducts(){
db.ref("products").on("value",snap=>{

let html="";

snap.forEach(d=>{
let p = d.val();

html+=`
<div class="bg-white p-2">
<img src="${p.image}" class="h-24 w-full object-cover">
<p>${p.name}</p>
<p>₹${p.price}</p>
</div>
`;
});

productList.innerHTML = html;

});
}

// CATEGORY
function addCategory(){
let id = Date.now();
db.ref("categories/"+id).set({name:catName.value});
loadCategories();
}

function loadCategories(){
db.ref("categories").on("value",snap=>{
let h="";
snap.forEach(d=> h+=`<div>${d.val().name}</div>`);
catList.innerHTML=h;
});
}

// BANNER
function uploadBanner(){

let file = bannerImage.files[0];
if(!file) return alert("Select image");

let id = Date.now();
let ref = storage.ref("banners/"+id);

ref.put(file).then(()=>{
ref.getDownloadURL().then(url=>{
db.ref("banners/"+id).set({image:url});
loadBanners();
});
});

}

function loadBanners(){
db.ref("banners").on("value",snap=>{
let h="";
snap.forEach(d=> h+=`<img src="${d.val().image}" class="h-20 mb-2">`);
bannerList.innerHTML=h;
});
}

// INIT
window.onload = ()=>{
openTab("dashboard");
loadProducts();
loadCategories();
loadBanners();
};

</script>

</body>
  </html>
