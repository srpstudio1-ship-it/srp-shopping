    <style>

        .nav-group-label { font-size: 11px; text-transform: uppercase; color: #64748b; font-weight: 800; margin: 20px 0 10px 10px; letter-spacing: 1px; }

        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 12px 15px;
            color: #94a3b8; text-decoration: none; border-radius: 12px;
            margin-bottom: 5px; font-weight: 600; font-size: 14px; transition: var(--transition);
            cursor: pointer;
        }
        .nav-link i { width: 20px; font-size: 18px; text-align: center; }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-link.active { background: var(--srp-primary); color: #fff; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }

        .main-content { flex: 1; padding: 30px; max-width: 1400px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        /* --- ANALYTICS CARDS --- */
        .analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--srp-card); padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: var(--transition); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .card-icon { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; font-size: 20px; }

        .lbl { font-size: 13px; color: #64748b; font-weight: 700; text-transform: uppercase; }

        /* --- UTILS --- */
        .animate-up { animation: fadeInUp 0.5s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) {
            .sidebar { position: fixed; left: -100%; }
            .sidebar.active { left: 0; width: 80%; }
            .main-content { padding: 15px; }
        }
    </style>
</head>

    /* =========================================
       CORE BOOTSTRAP & FIREBASE

        apiKey: "AIzaSyB2xwVO-c_f4cEn6PjtArta3DU6mqz7yxw",
        authDomain: "srp-shopping-54bbb.firebaseapp.com",
        databaseURL: "https://srp-shopping-54bbb-default-rtdb.firebaseio.com",
        projectId: "srp-shopping-54bbb",
        storageBucket: "srp-shopping-54bbb.firebasestorage.app",

    // 1. Module Router
    function loadModule(module) {
        // Update Active State UI
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        const activeLink = document.querySelector(`[onclick="loadModule('${module}')"]`);
        if(activeLink) activeLink.classList.add('active');

        // Route to Function
        switch(module) {
            case 'dashboard': renderDashboard(); break;
            case 'sales': renderSalesAnalytics(); break;
            case 'products': if(typeof renderProducts === 'function') renderProducts(); break;
            // Add other cases as you include Parts 2, 3, etc.
            default: renderDashboard();
        }
    }

    // 2. Dashboard Renderer (8.6)
    function renderDashboard() {
        const view = document.getElementById('app-view');
        view.innerHTML = `
            <header class="header-top animate-up">
                <div>
                    <h1 style="font-weight: 800; font-size: 32px; letter-spacing: -1.5px;">Global Command Center</h1>

                    <span class="val" id="total-orders">0</span>
                </div>
                <div class="card animate-up" style="animation-delay: 0.2s">
                    <div class="card-icon" style="background: #ecfdf5; color: #10b981;"><i class="fas fa-users"></i></div>
                    <span class="lbl">Total Users</span>
                    <span class="val" id="stat-total-users">0</span>
                </div>
                <div class="card animate-up" style="animation-delay: 0.3s">
                    <div class="card-icon" style="background: #fff7ed; color: #f59e0b;"><i class="fas fa-store"></i></div>
                    <span class="lbl">Active Sellers</span>
                    <span class="val" id="total-sellers">0</span>
                </div>
                <div class="card animate-up" style="animation-delay: 0.4s">
                    <div class="card-icon" style="background: #fef2f2; color: #ef4444;"><i class="fas fa-indian-rupee-sign"></i></div>
                    <span class="lbl">Platform Revenue</span>
                    <span class="val" id="total-comm">₹0</span>
                </div>
            </div>

            <div class="card animate-up" style="margin-top:20px;">
                <h3 style="margin-bottom:20px; font-weight:800;">Real-time Sales Velocity</h3>
                <canvas id="velocityChart" style="max-height: 300px;"></canvas>
            </div>
        `;
        initDashboardLogic();
    }

    // 3. Data Intelligence Logic
    async function initDashboardLogic() {
        // Update Session Counts (RDB)
        rdb.ref('admin_sessions').on('value', snap => {
            const count = snap.val() || 0;
            if(document.getElementById('session-count')) document.getElementById('session-count').innerText = count;
        });

        // Sync Users
        db.collection("users").onSnapshot(snap => {
            if(document.getElementById('stat-total-users')) document.getElementById('stat-total-users').innerText = snap.size;
        });

        // Sync Sellers
        db.collection("sellers").onSnapshot(snap => {
            if(document.getElementById('total-sellers')) document.getElementById('total-sellers').innerText = snap.size;
        });

        // Sync Orders & Revenue
        db.collection("orders").onSnapshot(snap => {
            const ordEl = document.getElementById('total-orders');
            if(ordEl) ordEl.innerText = snap.size;
            
            let revenue = 0;
            snap.forEach(doc => {
                if(doc.data().status === "Delivered") revenue += Number(doc.data().totalAmount || 0);
            });
            const revEl = document.getElementById('total-comm');
            if(revEl) revEl.innerText = "₹" + (revenue * 0.10).toFixed(2); // 10% Platform Commission
            
            updateChart(snap);
        });
    }

    // 4. Charting Utility
    let velChart;
    function updateChart(snap) {
        const ctx = document.getElementById('velocityChart');
        if(!ctx) return;

        // Data processing for Chart.js
        const labels = ['Orders']; 
        const data = [snap.size];

        if(velChart) {
            velChart.data.datasets[0].data = data;
            velChart.update();
        } else {
            velChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Live Order Count',
                        data: data,
                        backgroundColor: '#4f46e5',
                        borderRadius: 10
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
    }

    // Startup
    window.onload = () => {
        loadModule('dashboard');
        console.log("%c SRP MASTER V2.0 ONLINE ", "background: #4f46e5; color: #fff; font-weight: 800; padding: 5px;");
    };

    function logAction(actor, event, status) {
        const timestamp = new Date().toLocaleString();
        rdb.ref('system_logs').push({ timestamp, actor, event, status });
    }
</script>

/* --- LOGIC HANDLERS --- */

async function syncCategories() {
    db.collection("categories").onSnapshot(snap => {
        const container = document.getElementById('category-list-display');
        if(!container) return;
        container.innerHTML = "";
        snap.forEach(doc => {
            const cat = doc.data();
            container.innerHTML += `
                <div class="card" style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
                    <span><i class="${cat.icon || 'fas fa-tag'}"></i> ${cat.name}</span>
                    <button onclick="deleteDoc('categories', '${doc.id}')" style="color:#ef4444; border:none; background:none; cursor:pointer;"><i class="fas fa-trash"></i></button>
                </div>
            `;
        });
    });
}

async function syncProducts() {
    db.collection("products").orderBy("timestamp", "desc").onSnapshot(snap => {
        const grid = document.getElementById('product-master-grid');
        if(!grid) return;
        grid.innerHTML = "";
        snap.forEach(doc => {
            const p = doc.data();
            grid.innerHTML += `
                <div class="card animate-up" style="padding:15px;">
                    <img src="${p.imageUrl || 'https://via.placeholder.com/150'}" style="width:100%; height:180px; object-fit:cover; border-radius:12px; margin-bottom:15px;">
                    <h3 style="font-weight:700; font-size:16px;">${p.name}</h3>
                    <p style="color:#64748b; font-size:12px; margin-bottom:10px;">${p.category} | Stock: ${p.stock}</p>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:800; color:var(--srp-primary);">₹${p.salePrice}</span>
                        <div style="display:flex; gap:10px;">
                            <button onclick="editProduct('${doc.id}')" style="background:#eef2ff; color:#4f46e5; border:none; padding:8px; border-radius:8px;"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteDoc('products', '${doc.id}')" style="background:#fef2f2; color:#ef4444; border:none; padding:8px; border-radius:8px;"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `;
        });
    });
}

async function handleProductSubmit(e) {
    e.preventDefault();
    const id = document.getElementById('p-id-field').value;
    const productData = {
        name: document.getElementById('p-name').value,
        category: document.getElementById('p-cat-select').value,
        mrp: Number(document.getElementById('p-mrp').value),
        salePrice: Number(document.getElementById('p-sale').value),
        stock: Number(document.getElementById('p-stock').value),
        description: document.getElementById('p-desc').value,
        imageUrl: document.getElementById('p-img-url').value,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    };

    try {
        if(id) {
            await db.collection("products").doc(id).update(productData);
            logAction("Admin", `Updated Product: ${productData.name}`, "Success");
        } else {
            await db.collection("products").add(productData);
            logAction("Admin", `Added New Product: ${productData.name}`, "Success");
        }
        closePModal();
    } catch (err) {
        alert("Sync Failed: " + err.message);
    }
}

// UI Helpers
function openCatModal() { document.getElementById('cat-modal').style.display = 'flex'; }
function closeCatModal() { document.getElementById('cat-modal').style.display = 'none'; }
function openProductModal() { 
    document.getElementById('p-id-field').value = "";
    document.getElementById('p-form').reset();
    document.getElementById('p-modal').style.display = 'block'; 
}
function closePModal() { document.getElementById('p-modal').style.display = 'none'; }

async function populateCategoryDropdowns() {
    const snap = await db.collection("categories").get();
    const select = document.getElementById('p-cat-select');
    const filter = document.getElementById('p-cat-filter');
    if(!select) return;
    
    let options = `<option value="">Select Category</option>`;
    snap.forEach(doc => { options += `<option value="${doc.data().name}">${doc.data().name}</option>`; });
    select.innerHTML = options;
    if(filter) filter.innerHTML = `<option value="ALL">All Categories</option>` + options;
}

async function deleteDoc(collection, id) {
    if(confirm("Permanently delete this item? This cannot be undone.")) {
        await db.collection(collection).doc(id).delete();
        logAction("Admin", `Deleted from ${collection}: ${id}`, "Warning");
    }
}

async function updateOrderStatus(orderId, newStatus) {

    await db.collection("orders").doc(orderId).update({ status: newStatus });

}

async function updateTracking(orderId, trackingId) {
    await db.collection("orders").doc(orderId).update({ trackingId: trackingId });
    // Potential integration: Send SMS to user via external API here
    logAction("Logistics", `India Post ID updated for ${orderId}`, "Success");
}

async function toggleSellerStatus(sellerId, status) {
    await db.collection("sellers").doc(sellerId).update({ status: status });
    logAction("Admin", `Seller ${sellerId} status changed to ${status}`, "Warning");
}

function getStatusColor(status) {
    switch(status) {
        case 'Pending': return '#f59e0b';
        case 'Shipped': return '#3b82f6';
        case 'Delivered': return '#10b981';
        case 'Cancelled': return '#ef4444';
        default: return '#64748b';
    }
}

async function syncFinanceData() {

/**
 * MANUAL WALLET ADJUSTMENT (8.6)
 * Updates the user's wallet and creates a transaction record simultaneously.
 */
async function adjustWallet() {
    const userEmail = document.getElementById('wallet-user-id').value;
    const amount = Number(document.getElementById('wallet-amount').value);
    const note = document.getElementById('wallet-note').value;

    if(!userEmail || !amount) return alert("User ID and Amount are required.");

    const batch = db.batch();
    const walletRef = db.collection("wallets").doc(userEmail);
    const txRef = db.collection("transactions").doc();

    try {
        // Atomic update: Ensure wallet and transaction log happen together
        batch.set(walletRef, { 
            balance: firebase.firestore.FieldValue.increment(amount),
            lastUpdated: firebase.util.Timestamp.now()
        }, { merge: true });

        batch.set(txRef, {
            type: amount > 0 ? 'credit' : 'debit',
            amount: Math.abs(amount),
            userName: userEmail,
            note: note,
            status: 'completed',
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

        await batch.commit();
        alert("Wallet synchronized successfully.");
        logAction("Finance", `Adjusted wallet for ${userEmail} by ₹${amount}`, "Success");
    } catch (err) {
        alert("Finance Error: " + err.message);
    }
}

async function sendBroadcast() {
    const title = document.getElementById('notif-title').value;
    const body = document.getElementById('notif-body').value;
    const link = document.getElementById('notif-link').value;

    if(!title || !body) return alert("Title and Body are mandatory.");

    try {
        await db.collection("notifications").add({
            title,
            body,
            link: link || null,
            target: 'all',
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        alert("Notification broadcasted successfully.");
        logAction("Marketing", `Broadcast Sent: ${title}`, "Info");
        document.getElementById('notif-title').value = "";
        document.getElementById('notif-body').value = "";
    } catch (err) {
        alert("Broadcast Failed: " + err.message);
    }
}

function syncNotificationHistory() {
    db.collection("notifications").orderBy("timestamp", "desc").limit(10).onSnapshot(snap => {

}

function syncSystemLogs() {
    db.collection("admin_logs").orderBy("timestamp", "desc").limit(50).onSnapshot(snap => {
        const term = document.getElementById('log-terminal');
        if(!term) return;
        term.innerHTML = "";
        
        snap.forEach(doc => {
            const log = doc.data();
            const time = log.timestamp ? new Date(log.timestamp.toDate()).toLocaleTimeString() : '--:--';
            let color = "#10b981"; // Success green
            if(log.level === 'Warning') color = "#f59e0b";
            if(log.level === 'Info') color = "#3b82f6";

            term.innerHTML += `
                <div style="margin-bottom:5px;">
                    <span style="color:#475569;">[${time}]</span> 
                    <span style="color:${color}; font-weight:bold;">${log.level.toUpperCase()}</span>: 
                    <span style="color:#e2e8f0;">${log.message}</span> 
                    <span style="color:#64748b; font-size:11px;">(By ${log.user})</span>
                </div>
            `;
        });
    });
}

async function clearSystemLogs() {
    if(confirm("Are you sure? This will wipe the audit trail.")) {
        // In a real app, you might want to archive these instead of delete
        const snap = await db.collection("admin_logs").get();
        const batch = db.batch();
        snap.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
        logAction("Admin", "System logs cleared manually", "Warning");
    }
}

rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    
    // Helper: Check if the requester is the Admin
    function isAdmin() {
      return request.auth != null && request.auth.token.email == 'subhashrajpurohit10@gmail.com';
    }

    // 8.1 & 8.11: Products & Categories
    match /products/{productId} {
      allow read: if true; // Everyone can see products
      allow write: if isAdmin(); // Only Admin can add/edit/delete
    }
    
    match /categories/{catId} {
      allow read: if true;
      allow write: if isAdmin();
    }

    // 8.2: Orders
    match /orders/{orderId} {
      allow read: if request.auth != null && (resource.data.customerId == request.auth.uid || isAdmin());
      allow create: if request.auth != null; // Any logged-in user can place an order
      allow update, delete: if isAdmin(); // Only Admin can change status or tracking
    }

    // 8.6: Wallets
    match /wallets/{walletId} {
      // Users can only see their own balance
      allow read: if request.auth != null && (request.auth.token.email == walletId || isAdmin());
      // ONLY the Admin (or a Cloud Function) can adjust balances
      allow write: if isAdmin(); 
    }

    // 8.7 & 8.4: Transactions & Payment Logs
    match /transactions/{txId} {
      allow read: if request.auth != null && (resource.data.userName == request.auth.token.email || isAdmin());
      allow write: if isAdmin();
    }
    
    match /payment_logs/{logId} {
      allow read, write: if isAdmin();
    }

    // 8.5: Sellers
    match /sellers/{sellerId} {
      allow read: if true;
      allow create: if request.auth != null; // Anyone can apply to be a seller
      allow update, delete: if isAdmin(); // Only Admin can approve/suspend
    }

    // 8.8 & 8.12: System Logs & Notifications
    match /admin_logs/{logId} {
      allow read, write: if isAdmin();
    }
    
    match /notifications/{notifId} {
      allow read: if true;
      allow write: if isAdmin();
    }
  }
}
