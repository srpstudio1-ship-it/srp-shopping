<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRP SHOPPING | Admin Central Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1e293b;
            --light: #f8fafc;
            --sidebar: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { background: var(--light); display: flex; min-height: 100vh; }

        /* Sidebar Navigation */
        #sidebar {
            width: 260px;
            background: var(--sidebar);
            color: white;
            padding: 20px;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
        }

        .logo-area { font-size: 1.5rem; font-weight: 800; margin-bottom: 30px; color: #60a5fa; border-bottom: 1px solid #334155; padding-bottom: 10px; }

        .nav-item {
            padding: 12px 15px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }
        .nav-item i { margin-right: 12px; width: 20px; }

        /* Main Content */
        #main-content { flex: 1; padding: 30px; max-width: calc(100% - 260px); }

        .section-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 30px;
            display: none;
        }

        .section-card.active { display: block; }

        h2 { margin-bottom: 20px; color: var(--dark); border-left: 4px solid var(--primary); padding-left: 15px; }

        /* Forms & Inputs */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #edf2f7; font-size: 0.85rem; }
        th { background: #f1f5f9; color: var(--secondary); text-transform: uppercase; font-size: 0.75rem; }

        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .status-confirmed { background: #dcfce7; color: #166534; }
        .status-shipped { background: #dbeafe; color: #1e40af; }

        /* 8.19 System Log Visuals */
        .log-entry { font-family: monospace; font-size: 0.8rem; padding: 5px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="logo-area">SRP ADMIN</div>
        <nav>
            <div class="nav-item active" onclick="showSection('prod-mgmt')"><i class="fas fa-box"></i> 8.1 Products</div>
            <div class="nav-item" onclick="showSection('order-mgmt')"><i class="fas fa-shopping-cart"></i> 8.2 Orders</div>
            <div class="nav-item" onclick="showSection('withdrawal-mgmt')"><i class="fas fa-wallet"></i> 8.3 Withdrawals</div>
            <div class="nav-item" onclick="showSection('promo-mgmt')"><i class="fas fa-ad"></i> 8.4 Promotions</div>
            <div class="nav-item" onclick="showSection('featured-mgmt')"><i class="fas fa-star"></i> 8.5 Featured</div>
            <div class="nav-item" onclick="showSection('dashboard-mgmt')"><i class="fas fa-chart-line"></i> 8.6 Global Dashboard</div>
            </nav>
    </aside>

    <main id="main-content">
        
        <section id="prod-mgmt" class="section-card active">
            <h2>8.1 Product Management</h2>
            <div class="form-grid">
                <input type="text" id="p-name" placeholder="Product Name">
                <select id="p-category">
                    <option value="electronics">Electronics</option>
                    <option value="fashion">Fashion</option>
                    <option value="home">Home</option>
                </select>
                <input type="number" id="p-mrp" placeholder="MRP">
                <input type="number" id="p-discount" placeholder="Discount Price">
                <input type="number" id="p-stock" placeholder="Stock Quantity">
                <input type="file" id="p-image" accept="image/*">
            </div>
            <textarea id="p-desc" placeholder="Product Description" rows="3"></textarea>
            <button class="btn btn-primary" onclick="addProduct()">Add Product</button>

            <table id="product-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>MRP</th>
                        <th>Stock</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="product-list-body"></tbody>
            </table>
        </section>

        <section id="order-mgmt" class="section-card">
            <h2>8.2 Order Management</h2>
            <div id="order-filters">
                <input type="text" placeholder="Search by Order ID/Phone..." style="width: 300px; margin-bottom: 15px;">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>User Details</th>
                        <th>Address</th>
                        <th>Status</th>
                        <th>Tracking ID</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="order-list-body"></tbody>
            </table>
        </section>

        <section id="withdrawal-mgmt" class="section-card"><h2>8.3 Seller Withdrawal</h2><div id="withdrawal-content"></div></section>
        <section id="promo-mgmt" class="section-card"><h2>8.4 Promotion System</h2><div id="promo-content"></div></section>

    </main>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB2xwVO-c_f4cEn6PjtArta3DU6mqz7yxw",
            authDomain: "srp-shopping-54bbb.firebaseapp.com",
            databaseURL: "https://srp-shopping-54bbb-default-rtdb.firebaseio.com",
            projectId: "srp-shopping-54bbb",
            storageBucket: "srp-shopping-54bbb.firebasestorage.app",
            messagingSenderId: "491906168702",
            appId: "1:491906168702:web:2873565fcd2d561077252f",
            measurementId: "G-3S7X8V8EFQ"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        // Navigation Function
        function showSection(sectionId) {
            document.querySelectorAll('.section-card').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 8.1 Product Management Functions
        function addProduct() {
            const id = "PROD" + Date.now();
            const productData = {
                id: id,
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-category').value,
                mrp: document.getElementById('p-mrp').value,
                discount: document.getElementById('p-discount').value,
                stock: document.getElementById('p-stock').value,
                desc: document.getElementById('p-desc').value,
                timestamp: Date.now()
            };

            db.ref('products/' + id).set(productData)
                .then(() => {
                    alert("Product Added Successfully! ID: " + id);
                    logAction("Added Product: " + id);
                });
        }

        // 8.2 Order Management Functions
        function loadOrders() {
            db.ref('orders').on('value', (snapshot) => {
                const orders = snapshot.val();
                const tbody = document.getElementById('order-list-body');
                tbody.innerHTML = '';
                for (let key in orders) {
                    const o = orders[key];
                    tbody.innerHTML += `
                        <tr>
                            <td>${o.orderId}</td>
                            <td>${o.userName}<br>${o.phone}</td>
                            <td>${o.address}, ${o.pincode}</td>
                            <td><span class="status-badge status-${o.status}">${o.status}</span></td>
                            <td><input type="text" value="${o.trackingId || ''}" onchange="updateTracking('${key}', this.value)"></td>
                            <td>
                                <button onclick="viewInvoice('${key}')" class="btn btn-primary btn-sm">View</button>
                                <button onclick="updateStatus('${key}', 'shipped')" class="btn btn-success btn-sm">Ship</button>
                            </td>
                        </tr>
                    `;
                }
            });
        }

        function updateTracking(orderId, val) {
            db.ref('orders/' + orderId).update({ trackingId: val });
            alert("Tracking ID Updated");
        }

        // Shared Utility: Log Action (8.19 Preview)
        function logAction(msg) {
            const logId = db.ref('logs/admin').push().key;
            db.ref('logs/admin/' + logId).set({
                action: msg,
                time: new Date().toLocaleString()
            });
        }

        // Initialize Loaders
        window.onload = () => {
            loadOrders();
            // product loader function...
        };
    </script>
