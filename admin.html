<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB2xwVO-c_f4cEn6PjtArta3DU6mqz7yxw",
  authDomain: "srp-shopping-54bbb.firebaseapp.com",
  databaseURL: "https://srp-shopping-54bbb-default-rtdb.firebaseio.com",
  projectId: "srp-shopping-54bbb",
  storageBucket: "srp-shopping-54bbb.firebasestorage.app",
  messagingSenderId: "491906168702",
  appId: "1:491906168702:web:2873565fcd2d561077252f",
  measurementId: "G-3S7X8V8EFQ"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const storage = firebase.storage();

// SECTION SWITCHER
function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// AUTO PRODUCT ID
function generateProductId(){
return "PID"+Date.now();
}

// CODE CHECKER (BASIC)
function runCodeCheck(){
document.getElementById("codeResult").innerHTML="Checking...";
setTimeout(()=>{
document.getElementById("codeResult").innerHTML="No major errors found";
},2000);
}


// ==============================
// 8.1 PRODUCT MANAGEMENT FULL
// ==============================

// LOAD PRODUCT FORM
document.getElementById("productForm").innerHTML = `
<div class="bg-gray-800 p-4 rounded">
<input id="pName" placeholder="Product Name" class="p-2 w-full mb-2 text-black">
<input id="pMRP" placeholder="MRP" class="p-2 w-full mb-2 text-black">
<input id="pDiscount" placeholder="Discount Price" class="p-2 w-full mb-2 text-black">
<input id="pCategory" placeholder="Category" class="p-2 w-full mb-2 text-black">
<input id="pStock" placeholder="Stock Quantity" class="p-2 w-full mb-2 text-black">
<textarea id="pDesc" placeholder="Description" class="p-2 w-full mb-2 text-black"></textarea>
<input type="file" id="pImage" class="mb-2">
<button onclick="addProduct()" class="bg-green-600 p-2 w-full">Add Product</button>
</div>
`;

// ADD PRODUCT
function addProduct(){
const id = generateProductId();
const name = document.getElementById("pName").value;
const mrp = document.getElementById("pMRP").value;
const discount = document.getElementById("pDiscount").value;
const category = document.getElementById("pCategory").value;
const stock = document.getElementById("pStock").value;
const desc = document.getElementById("pDesc").value;
const file = document.getElementById("pImage").files[0];

if(!file){ alert("Select Image"); return; }

const ref = storage.ref("products/"+id);
ref.put(file).then(()=>{
ref.getDownloadURL().then(url=>{

db.ref("products/"+id).set({
id,name,mrp,discount,category,stock,desc,image:url
});

alert("Product Added");
loadProducts();

});
});
}

// LOAD PRODUCTS
function loadProducts(){
db.ref("products").on("value",snap=>{
let html="";
snap.forEach(d=>{
const p = d.val();
html+=`
<div class="bg-gray-700 p-3 mb-2">
<img src="${p.image}" class="w-20">
<p>${p.name}</p>
<p>${p.id}</p>
<button onclick="deleteProduct('${p.id}')" class="bg-red-600 p-1">Delete</button>
<button onclick="editProduct('${p.id}')" class="bg-yellow-600 p-1">Edit</button>
</div>
`;
});
document.getElementById("productList").innerHTML=html;
});
}
loadProducts();

// DELETE PRODUCT
function deleteProduct(id){
db.ref("products/"+id).remove();
alert("Deleted");
}

// EDIT PRODUCT
function editProduct(id){
db.ref("products/"+id).once("value",snap=>{
const p=snap.val();
document.getElementById("pName").value=p.name;
document.getElementById("pMRP").value=p.mrp;
document.getElementById("pDiscount").value=p.discount;
document.getElementById("pCategory").value=p.category;
document.getElementById("pStock").value=p.stock;
document.getElementById("pDesc").value=p.desc;

db.ref("products/"+id).remove();
});
}

// ==============================
// 8.2 ORDERS MANAGEMENT FULL
// ==============================

// LOAD ORDERS
function loadOrders(){
db.ref("orders").on("value",snap=>{
let html="";
snap.forEach(d=>{
const o=d.val();

html+=`
<div class="bg-gray-800 p-3 mb-2">
<p>User: ${o.name}</p>
<p>Phone: ${o.phone}</p>
<p>Email: ${o.email}</p>
<p>Address: ${o.address}</p>
<p>Pincode: ${o.pincode}</p>
<p>Order ID: ${o.orderId}</p>
<p>Status: ${o.status}</p>

<input placeholder="Tracking ID" id="track_${o.orderId}" class="text-black p-1">

<button onclick="updateTracking('${o.orderId}')" class="bg-blue-600 p-1">Update Tracking</button>

<button onclick="updateStatus('${o.orderId}','Confirmed')" class="bg-green-600 p-1">Confirm</button>

<button onclick="updateStatus('${o.orderId}','Shipped')" class="bg-yellow-600 p-1">Ship</button>

<button onclick="updateStatus('${o.orderId}','Delivered')" class="bg-purple-600 p-1">Deliver</button>

<button onclick="viewOrder('${o.orderId}')" class="bg-gray-600 p-1">View</button>

</div>
`;
});
document.getElementById("orderList").innerHTML=html;
});
}
loadOrders();

// UPDATE TRACKING
function updateTracking(id){
const t=document.getElementById("track_"+id).value;
db.ref("orders/"+id+"/tracking").set(t);
alert("Tracking Updated");
}

// UPDATE STATUS + NOTIFICATION
function updateStatus(id,status){
db.ref("orders/"+id+"/status").set(status);

// notification
db.ref("notifications/"+id).push({
msg:"Order "+status,
time:Date.now()
});

alert("Status Updated");
}

// VIEW ORDER DETAILS
function viewOrder(id){
db.ref("orders/"+id).once("value",snap=>{
const o=snap.val();

alert(
"Order ID: "+o.orderId+
"\nProduct ID: "+o.productId+
"\nUser: "+o.name+
"\nDate: "+new Date(o.time)
);
});
}

// ==============================
// 8.3 WITHDRAWAL SYSTEM FULL
// ==============================

function loadWithdrawals(){
db.ref("withdrawals").on("value",snap=>{
let html="";
snap.forEach(d=>{
const w=d.val();

html+=`
<div class="bg-gray-700 p-3 mb-2">
<p>Seller: ${w.seller}</p>
<p>Amount: ${w.amount}</p>
<p>Balance: ${w.balance}</p>

<button onclick="approveWithdraw('${d.key}')" class="bg-green-600 p-1">Approve</button>

<button onclick="rejectWithdraw('${d.key}')" class="bg-red-600 p-1">Reject</button>

<button onclick="markPaid('${d.key}')" class="bg-blue-600 p-1">Mark Paid</button>

</div>
`;
});
document.getElementById("withdrawalList").innerHTML=html;
});
}
loadWithdrawals();

// APPROVE
function approveWithdraw(id){
db.ref("withdrawals/"+id+"/status").set("Approved");

db.ref("notifications/"+id).push({
msg:"Withdrawal Approved",
time:Date.now()
});

alert("Approved");
}

// REJECT
function rejectWithdraw(id){
db.ref("withdrawals/"+id+"/status").set("Rejected");
alert("Rejected");
}

// MARK PAID
function markPaid(id){
db.ref("withdrawals/"+id+"/status").set("Paid");
alert("Marked Paid");
}

</script>
    </script>
