<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRP ADMIN PANEL</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<style>
body { font-family: Arial; }
.sidebar { width:250px; }
</style>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

<!-- SIDEBAR -->
<div class="sidebar bg-blue-900 text-white p-4">
<h1 class="text-xl font-bold mb-4">SRP ADMIN</h1>

<ul class="space-y-2">
<li onclick="openTab('dashboard')" class="cursor-pointer">Dashboard</li>
<li onclick="openTab('products')" class="cursor-pointer">Products</li>
<li onclick="openTab('orders')" class="cursor-pointer">Orders</li>
<li onclick="openTab('withdraw')" class="cursor-pointer">Withdrawals</li>
<li onclick="openTab('category')" class="cursor-pointer">Category</li>
<li onclick="openTab('banner')" class="cursor-pointer">Banner</li>
</ul>
</div>

<!-- CONTENT -->
<div class="flex-1 p-4 overflow-y-auto">

<div id="dashboard" class="tab">
<h2 class="text-xl font-bold">Dashboard</h2>
</div>

<!-- PRODUCTS -->
<div id="products" class="tab hidden">

<input id="pName" placeholder="Name" class="border p-2 w-full mb-2">
<input id="pPrice" placeholder="Price" class="border p-2 w-full mb-2">
<input type="file" id="pImage" class="mb-2">
<button onclick="addProduct()" class="bg-blue-600 text-white px-3 py-1">Save</button>

<div id="productList" class="mt-4 grid grid-cols-2 gap-2"></div>

</div>

<!-- ORDERS -->
<div id="orders" class="tab hidden"></div>

<!-- WITHDRAW -->
<div id="withdraw" class="tab hidden"></div>

<!-- CATEGORY -->
<div id="category" class="tab hidden">
<input id="catName" placeholder="Category" class="border p-2 mb-2">
<button onclick="addCategory()" class="bg-green-600 text-white px-3 py-1">Add</button>
<div id="catList"></div>
</div>

<!-- BANNER -->
<div id="banner" class="tab hidden">
<input type="file" id="bannerImage" class="mb-2">
<button onclick="uploadBanner()" class="bg-purple-600 text-white px-3 py-1">Upload</button>
<div id="bannerList"></div>
</div>

</div>
</div>

<script>

// FIREBASE (YOUR CONFIG)
firebase.initializeApp({
  apiKey: "AIzaSyB2xwVO-c_f4cEn6PjtArta3DU6mqz7yxw",
  authDomain: "srp-shopping-54bbb.firebaseapp.com",
  databaseURL: "https://srp-shopping-54bbb-default-rtdb.firebaseio.com",
  projectId: "srp-shopping-54bbb",
  storageBucket: "srp-shopping-54bbb.appspot.com",
});

const db = firebase.database();
const storage = firebase.storage();

// TAB
function openTab(tab){
document.querySelectorAll('.tab').forEach(t=>t.classList.add('hidden'));
document.getElementById(tab).classList.remove('hidden');

if(tab==="orders") loadOrders();
if(tab==="withdraw") loadWithdraw();
}

// PRODUCT
function addProduct(){
let file=pImage.files[0];
if(!file) return alert("Select image");

let id=Date.now();
let ref=storage.ref("products/"+id);

ref.put(file).then(()=>{
ref.getDownloadURL().then(url=>{
db.ref("products/"+id).set({
name:pName.value,
price:pPrice.value,
image:url
});
loadProducts();
});
});
}

function loadProducts(){
db.ref("products").on("value",snap=>{
let h="";
snap.forEach(d=>{
let p=d.val();
h+=`<div class="bg-white p-2">
<img src="${p.image}" class="h-24 w-full">
<p>${p.name}</p>
<p>₹${p.price}</p>
</div>`;
});
productList.innerHTML=h;
});
}

// ORDERS
function loadOrders(){
db.ref("orders").on("value",snap=>{
let h="<h2 class='text-xl mb-2'>Orders</h2>";
snap.forEach(d=>{
let o=d.val();
h+=`<div class="bg-white p-2 mb-2">
<p>ID: ${d.key}</p>
<p>${o.name||''} ${o.phone||''}</p>
<p>Status: ${o.status||'Pending'}</p>

<input id="t_${d.key}" placeholder="Tracking ID" class="border p-1">

<button onclick="saveTracking('${d.key}')" class="bg-black text-white px-2">Save</button>
<button onclick="updateStatus('${d.key}','Shipped')" class="bg-blue-500 text-white px-2">Ship</button>
<button onclick="updateStatus('${d.key}','Delivered')" class="bg-green-500 text-white px-2">Done</button>
</div>`;
});
orders.innerHTML=h;
});
}

function saveTracking(id){
let val=document.getElementById("t_"+id).value;
db.ref("orders/"+id).update({tracking:val});
}

function updateStatus(id,s){
db.ref("orders/"+id).update({status:s});
}

// WITHDRAW
function loadWithdraw(){
db.ref("withdrawals").on("value",snap=>{
let h="<h2 class='text-xl mb-2'>Withdrawals</h2>";
snap.forEach(d=>{
let w=d.val();
h+=`<div class="bg-white p-2 mb-2">
${w.name} ₹${w.amount} (${w.status||'Pending'})
<button onclick="updateWithdraw('${d.key}','Approved')" class="bg-green-500 text-white px-2">Approve</button>
<button onclick="updateWithdraw('${d.key}','Rejected')" class="bg-red-500 text-white px-2">Reject</button>
</div>`;
});
withdraw.innerHTML=h;
});
}

function updateWithdraw(id,s){
db.ref("withdrawals/"+id).update({status:s});
}

// CATEGORY
function addCategory(){
let id=Date.now();
db.ref("categories/"+id).set({name:catName.value});
loadCategories();
}
function loadCategories(){
db.ref("categories").on("value",snap=>{
let h="";
snap.forEach(d=>h+=`<div>${d.val().name}</div>`);
catList.innerHTML=h;
});
}

// BANNER
function uploadBanner(){
let file=bannerImage.files[0];
let id=Date.now();
let ref=storage.ref("banners/"+id);

ref.put(file).then(()=>{
ref.getDownloadURL().then(url=>{
db.ref("banners/"+id).set({image:url});
loadBanners();
});
});
}
function loadBanners(){
db.ref("banners").on("value",snap=>{
let h="";
snap.forEach(d=>h+=`<img src="${d.val().image}" class="h-20">`);
bannerList.innerHTML=h;
});
}

// INIT
window.onload=()=>{
openTab("dashboard");
loadProducts();
loadCategories();
loadBanners();
};

</script>

</body>
</html>
