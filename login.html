<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRP SHOPPING | Login</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>

    <style>
        :root { --srp-blue: #0047AB; --srp-white: #ffffff; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        input { transition: all 0.3s ease; }
        input:focus { outline: 2px solid #3b82f6; background: rgba(255, 255, 255, 0.15) !important; }
        .loader { border-top-color: #3b82f6; animation: spinner 0.6s linear infinite; display: none; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4">

    <section class="w-full max-w-md">
        <div class="glass-card rounded-2xl p-8 text-white shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-extrabold tracking-tighter">SRP <span class="text-blue-500">SHOPPING</span></h1>
                <p class="text-gray-400 text-sm mt-2" id="auth-subtitle">Welcome back, please login</p>
            </div>

            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Email Address</label>
                    <input type="email" id="email" class="w-full mt-1 px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white" placeholder="name@example.com" required>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Password</label>
                    <input type="password" id="password" class="w-full mt-1 px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white" placeholder="••••••••" required>
                </div>
                
                <button type="submit" id="main-submit" class="w-full py-3 mt-2 rounded-lg bg-blue-600 hover:bg-blue-700 transition-all font-bold uppercase tracking-wider flex justify-center items-center gap-2">
                    <div id="btn-spinner" class="loader w-5 h-5 border-2 border-white rounded-full"></div>
                    <span id="btn-text">Sign In</span>
                </button>
            </form>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#0f0f0f] px-2 text-gray-500">Secure Access</span></div>
            </div>

            <button id="google-btn" class="w-full py-3 rounded-lg bg-white text-black font-bold flex items-center justify-center gap-3 hover:bg-gray-100 transition-colors">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> 
                Google Login
            </button>

            <p class="mt-8 text-center text-sm text-gray-400">
                <span id="toggle-text">New here?</span> 
                <a href="#" id="toggle-auth" class="text-blue-400 font-bold ml-1 hover:underline">Create Account</a>
            </p>
        </div>
    </section>

    <script>
        // 1. SUPABASE CONNECTION
        const SB_URL = "https://cmxlfxqtrguuzpqdgcxv.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNteGxmeHF0cmd1dXpwcWRnY3h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzE0NDYsImV4cCI6MjA5MDAwNzQ0Nn0.Hl0S5yJnJEqvrxXSFt_YMjrKUKerNjUHb2ZvI7LfOC0";
        
        const { createClient } = window.supabase;
        const supabase = createClient(SB_URL, SB_KEY);

        // 2. Auth Toggle Logic
        let isLoginMode = true;
        const toggleBtn = document.getElementById('toggle-auth');
        const btnText = document.getElementById('btn-text');
        const authSubtitle = document.getElementById('auth-subtitle');
        const toggleText = document.getElementById('toggle-text');

        toggleBtn.onclick = (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            btnText.innerText = isLoginMode ? 'Sign In' : 'Create Account';
            authSubtitle.innerText = isLoginMode ? 'Welcome back, please login' : 'Start your journey with us';
            toggleText.innerText = isLoginMode ? "New here?" : "Joined before?";
            toggleBtn.innerText = isLoginMode ? 'Create Account' : 'Sign In';
        };

        // 3. Execution Logic
        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const spinner = document.getElementById('btn-spinner');

            // Start Loading
            spinner.style.display = 'block';
            document.getElementById('main-submit').disabled = true;

            try {
                if (isLoginMode) {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    window.location.href = 'index.html';
                } else {
                    const { data, error } = await supabase.auth.signUp({ 
                        email, 
                        password,
                        options: { emailRedirectTo: window.location.origin + '/index.html' }
                    });
                    if (error) throw error;
                    alert("Success! Now check your email or try logging in (if confirmation is off).");
                }
            } catch (err) {
                console.error("Auth Failure:", err);
                alert("Error: " + err.message);
            } finally {
                spinner.style.display = 'none';
                document.getElementById('main-submit').disabled = false;
            }
        };

        // 4. Google Login
        document.getElementById('google-btn').onclick = async () => {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/index.html' }
            });
            if (error) alert(error.message);
        };
    </script>
</body>
</html>
