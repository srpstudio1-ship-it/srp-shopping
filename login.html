<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <!-- Firebase JS SDK -->
    <script src="https://www.gstatic.com/firebasejs/7.20.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/7.20.0/firebase-auth.js"></script>
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB2xwVO-c_f4cEn6PjtArta3DU6mqz7yxw",
            authDomain: "srp-shopping-54bbb.firebaseapp.com",
            databaseURL: "https://srp-shopping-54bbb-default-rtdb.firebaseio.com",
            projectId: "srp-shopping-54bbb",
            storageBucket: "srp-shopping-54bbb.appspot.com",
            // measurementId: "G-XXXXXXX" // Optional
        };
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
    </script>
    <!-- You can add some CSS styling here -->
</head>
<body>
    <h2>Login</h2>
    <div>
        <input type="email" id="email" placeholder="Email" required><br>
        <input type="password" id="password" placeholder="Password" required><br>
        <button onclick="login()">Login</button><br>
        <button onclick="googleSignIn()">Login with Google</button><br>
        <button onclick="createAccount()">Create Account</button>
    </div>

    <script>
        // Login with Email and Password
        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    alert("Login successful!");
                    // Redirect or handle user info
                })
                .catch((error) => {
                    alert(error.message);
                });
        }

        // Google Sign-In
        function googleSignIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider)
                .then((result) => {
                    alert("Google login successful!");
                    // Redirect or handle user info
                })
                .catch((error) => {
                    alert(error.message);
                });
        }

        // Create Account
        function createAccount() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    alert("Account created successfully!");
                    // Redirect or handle user info
                })
                .catch((error) => {
                    alert(error.message);
                });
        }
    </script>
</body>
</html>
