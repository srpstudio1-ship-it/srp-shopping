<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRP SHOPPING | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: rgba(255,255,255,0.05); padding: 2rem; border-radius: 1rem; width: 100%; max-width: 380px; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 0.8rem; margin: 0.5rem 0; border-radius: 0.5rem; background: #1a1a1a; border: 1px solid #333; color: white; }
    </style>
</head>
<body>

    <div class="card">
        <h1 class="text-2xl font-bold text-center mb-6">SRP <span class="text-blue-500">SHOPPING</span></h1>
        
        <form id="login-form">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="pass" placeholder="Password" required>
            <button type="submit" id="submit-btn" class="w-full bg-blue-600 py-3 rounded-lg font-bold mt-2">SIGN IN</button>
        </form>

        <button id="google-btn" class="w-full bg-white text-black py-3 rounded-lg font-bold mt-4 flex items-center justify-center gap-2">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="16"> Google Login
        </button>

        <p class="text-center mt-6 text-sm">
            <span id="label">New here?</span> 
            <a href="#" id="toggle" class="text-blue-400 font-bold ml-1">Create Account</a>
        </p>
    </div>

    <script>
        const SB_URL = "https://cmxlfxqtrguuzpqdgcxv.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNteGxmeHF0cmd1dXpwcWRnY3h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzE0NDYsImV4cCI6MjA5MDAwNzQ0Nn0.Hl0S5yJnJEqvrxXSFt_YMjrKUKerNjUHb2ZvI7LfOC0";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        let isLogin = true;

        // Toggle Logic
        document.getElementById('toggle').onclick = (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            document.getElementById('submit-btn').innerText = isLogin ? 'SIGN IN' : 'CREATE ACCOUNT';
            document.getElementById('label').innerText = isLogin ? 'New here?' : 'Have account?';
            document.getElementById('toggle').innerText = isLogin ? 'Create Account' : 'Sign In';
        };

        // Auth Logic
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;

            try {
                if (isLogin) {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error; // THIS WILL TRIGGER THE ALERT BELOW
                    window.location.href = 'index.html';
                } else {
                    const { data, error } = await supabase.auth.signUp({ email, password });
                    if (error) throw error;
                    alert("Account Created Successfully!");
                }
            } catch (err) {
                alert("AUTH ERROR: " + err.message); // This will show "Invalid login credentials"
            }
        };

        // Google Logic
        document.getElementById('google-btn').onclick = async () => {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/index.html' }
            });
            if (error) alert("GOOGLE ERROR: " + error.message);
        };
    </script>
</body>
</html>
