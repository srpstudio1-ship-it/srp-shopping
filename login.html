<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supabase Auth - SRP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    width: 350px;
    padding: 25px;
    background: #1e293b;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}
h2 { text-align: center; }

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 6px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

.google {
    background: #ef4444;
}

.switch {
    text-align: center;
    margin-top: 10px;
    cursor: pointer;
    color: #60a5fa;
}
</style>
</head>
<body>

<div class="container">
    <h2 id="title">Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="signup()">Create Account</button>

    <button class="google" onclick="googleLogin()">Login with Google</button>

    <div class="switch" onclick="logout()">Logout</div>

    <p id="msg"></p>
</div>

<script>
const supabase = window.supabase.createClient(
    "https://cmxlfxqtrguuzpqdgcxv.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNteGxmeHF0cmd1dXpwcWRnY3h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzE0NDYsImV4cCI6MjA5MDAwNzQ0Nn0.Hl0S5yJnJEqvrxXSFt_YMjrKUKerNjUHb2ZvI7LfOC0"
);

// Signup
async function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await supabase.auth.signUp({
        email,
        password
    });

    showMsg(error ? error.message : "Account Created!");
}

// Login
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
    });

    showMsg(error ? error.message : "Login Successful!");
}

// Google Login
async function googleLogin() {
    await supabase.auth.signInWithOAuth({
        provider: 'google'
    });
}

// Logout
async function logout() {
    await supabase.auth.signOut();
    showMsg("Logged out!");
}

// Session check
supabase.auth.getSession().then(({ data }) => {
    if (data.session) {
        showMsg("Already Logged In");
    }
});

function showMsg(text) {
    document.getElementById("msg").innerText = text;
}
</script>

</body>
</html>
