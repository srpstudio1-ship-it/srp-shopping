<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRP Auth Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ===== GLOBAL STYLES ===== */
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
}.container{ width:400px; background:#111827; padding:30px; border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,0.6); }

h2{ text-align:center; margin-bottom:20px; }

input{ width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none; background:#1f2937; color:#fff; }

button{ width:100%; padding:12px; margin-top:10px; border:none; border-radius:8px; background:#3b82f6; color:white; cursor:pointer; font-weight:bold; }

button:hover{ opacity:0.9; }

.google{ background:#ef4444; }

.link{ text-align:center; margin-top:10px; cursor:pointer; color:#60a5fa; }

.msg{ margin-top:10px; text-align:center; font-size:14px; }

.hidden{display:none} </style>

</head>
<body><div class="container">
    <h2 id="formTitle">Login</h2><input type="text" id="name" placeholder="Full Name" class="hidden">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()" id="loginBtn">Login</button>
<button onclick="signup()" id="signupBtn" class="hidden">Create Account</button>

<button class="google" onclick="googleLogin()">Continue with Google</button>

<div class="link" onclick="toggleMode()" id="toggleText">Don't have account? Sign up</div>
<div class="link" onclick="logout()">Logout</div>

<div class="msg" id="msg"></div>

</div><script>
// ===== SUPABASE INIT =====
const supabase = window.supabase.createClient(
"https://cmxlfxqtrguuzpqdgcxv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNteGxmeHF0cmd1dXpwcWRnY3h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzE0NDYsImV4cCI6MjA5MDAwNzQ0Nn0.Hl0S5yJnJEqvrxXSFt_YMjrKUKerNjUHb2ZvI7LfOC0"
);

let isLogin=true;

function showMsg(text,color="white"){
    const el=document.getElementById("msg");
    el.innerText=text;
    el.style.color=color;
}

function toggleMode(){
    isLogin=!isLogin;

    document.getElementById("formTitle").innerText=isLogin?"Login":"Signup";
    document.getElementById("loginBtn").classList.toggle("hidden");
    document.getElementById("signupBtn").classList.toggle("hidden");
    document.getElementById("name").classList.toggle("hidden");

    document.getElementById("toggleText").innerText=
        isLogin?"Don't have account? Sign up":"Already have account? Login";
}

// ===== SIGNUP =====
async function signup(){
    const email=document.getElementById("email").value;
    const password=document.getElementById("password").value;
    const name=document.getElementById("name").value;

    if(!email || !password){
        showMsg("Fill all fields","red");
        return;
    }

    const {data,error}=await supabase.auth.signUp({
        email,
        password,
        options:{
            data:{full_name:name}
        }
    });

    if(error){
        showMsg(error.message,"red");
    }else{
        showMsg("Signup successful! Check email.","green");
    }
}

// ===== LOGIN =====
async function login(){
    const email=document.getElementById("email").value;
    const password=document.getElementById("password").value;

    const {data,error}=await supabase.auth.signInWithPassword({
        email,password
    });

    if(error){
        showMsg(error.message,"red");
    }else{
        showMsg("Login success","green");
        redirectUser();
    }
}

// ===== GOOGLE =====
async function googleLogin(){
    const {error}=await supabase.auth.signInWithOAuth({
        provider:'google',
        options:{
            redirectTo: window.location.href
        }
    });

    if(error){
        showMsg(error.message,"red");
    }
}

// ===== LOGOUT =====
async function logout(){
    await supabase.auth.signOut();
    showMsg("Logged out","yellow");
}

// ===== SESSION =====
supabase.auth.getSession().then(({data})=>{
    if(data.session){
        showMsg("Already logged in","green");
        redirectUser();
    }
});

// ===== REDIRECT =====
function redirectUser(){
    setTimeout(()=>{
        window.location.href="dashboard.html";
    },1500);
}

// ===== EXTRA UX FEATURES (for length + pro feel) =====

// Password visibility toggle
const passInput=document.getElementById("password");
passInput.addEventListener("dblclick",()=>{
    passInput.type=passInput.type==="password"?"text":"password";
});

// Enter key submit
document.addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){
        isLogin?login():signup();
    }
});

// Fake loading animation
function fakeLoader(){
    let i=0;
    const interval=setInterval(()=>{
        showMsg("Loading"+".".repeat(i%4));
        i++;
    },300);
    setTimeout(()=>clearInterval(interval),1500);
}

</script></body>
</html>
