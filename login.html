<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRP SHOPPING | Login</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        body { 
            background: #000;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 2rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 400px;
        }
        input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); width: 100%; padding: 0.75rem; margin-top: 0.5rem; border-radius: 0.5rem; color: white; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold">SRP <span class="text-blue-500">SHOPPING</span></h1>
            <p id="status-msg" class="text-xs text-yellow-500 mt-2 italic">Connecting to Supabase...</p>
        </div>

        <form id="auth-form" class="space-y-4">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="submit-btn" class="w-full bg-blue-600 py-3 rounded-lg font-bold uppercase hover:bg-blue-700">Sign In</button>
        </form>

        <button id="google-btn" class="w-full bg-white text-black py-3 rounded-lg font-bold mt-4 flex items-center justify-center gap-2">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Google Login
        </button>

        <p class="text-center mt-6 text-sm text-gray-400">
            <span id="toggle-text">New here?</span> 
            <a href="#" id="toggle-auth" class="text-blue-400 font-bold ml-1">Create Account</a>
        </p>
    </div>

    <script>
        // YOUR CREDENTIALS
        const SB_URL = "https://cmxlfxqtrguuzpqdgcxv.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNteGxmeHF0cmd1dXpwcWRnY3h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzE0NDYsImV4cCI6MjA5MDAwNzQ0Nn0.Hl0S5yJnJEqvrxXSFt_YMjrKUKerNjUHb2ZvI7LfOC0";
        
        let supabase;
        const statusMsg = document.getElementById('status-msg');

        // INITIALIZE & TEST CONNECTION
        try {
            supabase = window.supabase.createClient(SB_URL, SB_KEY);
            statusMsg.innerText = "System Online ✅";
            statusMsg.classList.replace('text-yellow-500', 'text-green-500');
        } catch (e) {
            statusMsg.innerText = "Connection Failed ❌";
            alert("Library Load Error: Check your internet connection.");
        }

        let isLogin = true;

        // TOGGLE LOGIC
        document.getElementById('toggle-auth').onclick = (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            document.getElementById('submit-btn').innerText = isLogin ? 'Sign In' : 'Create Account';
            document.getElementById('toggle-text').innerText = isLogin ? "New here?" : "Have account?";
            document.getElementById('toggle-auth').innerText = isLogin ? 'Create Account' : 'Sign In';
        };

        // FORM SUBMISSION
        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                if (isLogin) {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    window.location.href = 'index.html';
                } else {
                    const { data, error } = await supabase.auth.signUp({ email, password });
                    if (error) throw error;
                    alert("Account Created! If it doesn't log in, go to Supabase Dashboard and turn OFF 'Confirm Email'.");
                }
            } catch (err) {
                alert("Error: " + err.message);
            }
        };

        // GOOGLE LOGIN
        document.getElementById('google-btn').onclick = async () => {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + window.location.pathname.replace('login.html', 'index.html') }
            });
            if (error) alert(error.message);
        };
    </script>
</body>
</html>
