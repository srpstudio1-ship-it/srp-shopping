<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRP Auth + Profile System</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:sans-serif;
    background:#0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    width:420px;
    background:#1e293b;
    padding:25px;
    border-radius:12px;
}
input,button{
    width:100%;padding:10px;margin:8px 0;border-radius:6px;border:none;
}
button{background:#3b82f6;color:white;cursor:pointer}
.google{background:#ef4444}
.hidden{display:none}
.msg{text-align:center;margin-top:10px}
</style>
</head>
<body><div class="container" id="authBox">
<h2 id="title">Login</h2>
<input id="name" placeholder="Full Name" class="hidden">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password"><button onclick="login()">Login</button> <button onclick="signup()" id="signupBtn" class="hidden">Signup</button> <button class="google" onclick="googleLogin()">Google Login</button>

<div onclick="toggle()" style="cursor:pointer;text-align:center">Switch</div>
<div class="msg" id="msg"></div>
</div><div class="container hidden" id="dashboard">
<h2>Dashboard</h2>
<p id="userInfo"></p>
<button onclick="logout()">Logout</button>
</div><script>
const supabase = window.supabase.createClient(
"https://cmxlfxqtrguuzpqdgcxv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNteGxmeHF0cmd1dXpwcWRnY3h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzE0NDYsImV4cCI6MjA5MDAwNzQ0Nn0.Hl0S5yJnJEqvrxXSFt_YMjrKUKerNjUHb2ZvI7LfOC0"
);

let isLogin=true;

function msg(t,c="white"){
 let m=document.getElementById("msg");
 m.innerText=t;m.style.color=c;
}

function toggle(){
 isLogin=!isLogin;
 document.getElementById("name").classList.toggle("hidden");
 document.getElementById("signupBtn").classList.toggle("hidden");
 document.getElementById("title").innerText=isLogin?"Login":"Signup";
}

// ===== PROFILE AUTO CREATE =====
async function createProfile(user,name){
 await supabase.from("profiles").insert([
 {
   id:user.id,
   email:user.email,
   full_name:name || "User"
 }
 ]);
}

// ===== SIGNUP =====
async function signup(){
 let email=emailEl().value;
 let password=passEl().value;
 let name=nameEl().value;

 let {data,error}=await supabase.auth.signUp({
   email,password
 });

 if(error){msg(error.message,"red");return}

 await createProfile(data.user,name);
 msg("Signup success","green");
}

// ===== LOGIN =====
async function login(){
 let {data,error}=await supabase.auth.signInWithPassword({
   email:emailEl().value,
   password:passEl().value
 });

 if(error){msg(error.message,"red");return}

 loadDashboard(data.user);
}

// ===== GOOGLE =====
async function googleLogin(){
 await supabase.auth.signInWithOAuth({provider:'google'});
}

// ===== DASHBOARD =====
async function loadDashboard(user){
 document.getElementById("authBox").classList.add("hidden");
 document.getElementById("dashboard").classList.remove("hidden");

 let {data}=await supabase
   .from("profiles")
   .select("*")
   .eq("id",user.id)
   .single();

 document.getElementById("userInfo").innerText=
 `Name: ${data.full_name}\nEmail: ${data.email}`;
}

// ===== LOGOUT =====
async function logout(){
 await supabase.auth.signOut();
 location.reload();
}

// ===== SESSION =====
supabase.auth.getSession().then(({data})=>{
 if(data.session){
   loadDashboard(data.session.user);
 }
});

function emailEl(){return document.getElementById("email")}
function passEl(){return document.getElementById("password")}
function nameEl(){return document.getElementById("name")}
</script></body>
</html>
