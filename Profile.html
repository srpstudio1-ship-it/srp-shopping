<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>SRP Account</title>
    <style>
        /* 7.3: Day/Night Mode Transitions */
        .dark-mode { background-color: #0f172a; color: #f8fafc; }
        .dark-mode .card { background-color: #1e293b; border-color: #334155; }
        .dark-mode .text-gray-600 { color: #94a3b8; }
        .transition-theme { transition: all 0.3s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body id="main-body" class="bg-gray-50 pb-24 transition-theme">

    <header class="bg-[#0047AB] text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-lg">
        <h1 class="text-lg font-bold">My Account</h1>
        <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center">
            <i id="theme-icon" class="fas fa-moon"></i>
        </button>
    </header>

    <main class="p-4 space-y-4">
        
        <section class="card bg-white p-5 rounded-2xl border shadow-sm">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-tight">SRP Wallet Balance</p>
                    <h2 class="text-3xl font-black text-blue-700">₹<span id="wallet-amt">450.00</span></h2>
                </div>
                <button onclick="rechargeWallet()" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold text-xs uppercase">
                    + Recharge
                </button>
            </div>
            <p class="text-[10px] text-gray-400 mt-2">All refunds are instantly credited here.</p>
        </section>

        <div class="grid grid-cols-4 gap-2 text-center">
            <button onclick="showSection('orders')" class="card bg-white p-3 rounded-xl border flex flex-col items-center">
                <i class="fas fa-box text-blue-600 mb-1"></i>
                <span class="text-[9px] font-bold">Orders</span>
            </button>
            <button onclick="showSection('wishlist')" class="card bg-white p-3 rounded-xl border flex flex-col items-center">
                <i class="fas fa-heart text-red-500 mb-1"></i>
                <span class="text-[9px] font-bold">Wishlist</span>
            </button>
            <button onclick="showSection('coupons')" class="card bg-white p-3 rounded-xl border flex flex-col items-center">
                <i class="fas fa-ticket-alt text-yellow-500 mb-1"></i>
                <span class="text-[9px] font-bold">Coupons</span>
            </button>
            <button onclick="showSection('support')" class="card bg-white p-3 rounded-xl border flex flex-col items-center">
                <i class="fas fa-headset text-purple-600 mb-1"></i>
                <span class="text-[9px] font-bold">Help</span>
            </button>
        </div>

        <section id="orders-section" class="space-y-3">
            <h3 class="font-bold text-sm px-1">Recent Orders</h3>
            <div class="card bg-white p-4 rounded-xl border shadow-sm">
                <div class="flex justify-between text-[10px] mb-2 font-bold">
                    <span class="text-blue-700">ID: SRP882100</span>
                    <span class="text-orange-600 uppercase">Shipped</span>
                </div>
                <div class="flex gap-3 mb-3">
                    <div class="w-12 h-12 bg-gray-100 rounded"></div>
                    <div>
                        <h4 class="text-xs font-bold">Premium Wireless Earbuds</h4>
                        <p class="text-[10px] text-gray-500">Qty: 1 | ₹1,299</p>
                    </div>
                </div>
                <div class="bg-gray-50 p-2 rounded text-[10px] flex justify-between items-center border">
                    <span>Track: <b class="text-black">IN123456789IN</b></span>
                    <a href="https://www.indiapost.gov.in/_layouts/15/dop.portal.tracking/trackconsignment.aspx" 
                       target="_blank" class="text-blue-600 font-bold underline">India Post Link</a>
                </div>
            </div>
        </section>

        <section class="card bg-white p-4 rounded-xl border">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-sm">Saved Addresses</h3>
                <button onclick="addNewAddress()" class="text-blue-600 text-xs font-bold">+ Add New</button>
            </div>
            <div id="address-list" class="space-y-2">
                <div class="p-3 border rounded-lg bg-blue-50/50 relative">
                    <span class="absolute top-2 right-2 text-[8px] bg-blue-700 text-white px-1 rounded">DEFAULT</span>
                    <p class="text-xs font-bold">Subhash Rajpurohit</p>
                    <p class="text-[10px] text-gray-600">123, SRP Studio, Jaipur, Rajasthan, 302001</p>
                    <div class="mt-2 flex gap-3 text-[10px] text-blue-600 font-bold">
                        <button>Edit</button>
                        <button class="text-red-500">Delete</button>
                    </div>
                </div>
            </div>
        </section>

        <div class="pt-4 space-y-2">
            <button class="w-full bg-white border p-3 rounded-xl text-left text-xs font-bold flex justify-between">
                <span>Change Password</span> <i class="fas fa-chevron-right opacity-30"></i>
            </button>
            <button onclick="logout()" class="w-full bg-red-50 text-red-600 border border-red-100 p-3 rounded-xl text-center text-xs font-black uppercase">
                Logout from All Devices
            </button>
        </div>

    </main>

    <nav class="fixed bottom-0 w-full h-16 bg-white border-t flex items-center justify-around z-50">
        <button class="flex flex-col items-center text-gray-400"><i class="fas fa-home text-lg"></i><span class="text-[9px]">Home</span></button>
        <button class="flex flex-col items-center text-gray-400"><i class="fas fa-store text-lg"></i><span class="text-[9px]">Seller</span></button>
        <button class="flex flex-col items-center text-blue-700"><i class="fas fa-user text-lg"></i><span class="text-[9px] font-bold">Profile</span></button>
        <button class="flex flex-col items-center text-blue-400"><i class="fas fa-robot text-lg"></i><span class="text-[9px]">AI Help</span></button>
    </nav>

    <script>
        // 7.3: Day/Night Mode Logic
        function toggleDarkMode() {
            const body = document.getElementById('main-body');
            const icon = document.getElementById('theme-icon');
            body.classList.toggle('dark-mode');
            
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        // Load Preference on startup
        if(localStorage.getItem('theme') === 'dark') {
            toggleDarkMode();
        }

        // 7.4: Wallet Logic
        function rechargeWallet() {
            let amount = prompt("Enter amount to add to SRP Wallet (₹):");
            if(amount) {
                let current = parseFloat(document.getElementById('wallet-amt').innerText);
                let total = current + parseFloat(amount);
                document.getElementById('wallet-amt').innerText = total.toFixed(2);
                alert("₹" + amount + " added successfully via UPI!");
            }
        }

        // 7.2: Address Management Placeholder
        function addNewAddress() {
            alert("Opening Address Form Modal...");
        }

        function logout() {
            if(confirm("Are you sure you want to logout?")) {
                location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
