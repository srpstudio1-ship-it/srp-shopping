<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SRP SHOPPING</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#f1f5f9;
}

header{
background:#004aad;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
padding:15px;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#004aad;
color:white;
}

input{
padding:10px;
margin:5px 0;
width:100%;
}

.card{
background:#fff;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

.dark-mode{
background:#111;
color:#fff;
}

</style>
</head>
<body>

<header>
<h2>SRP SHOPPING</h2>
<div id="cart-badge">0</div>
</header>

<div class="container">

<div id="auth-section">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>

<div id="home-section" style="display:none;">
<h3>Products</h3>
<div id="products"></div>
</div>

<div id="cart-section">
<h3>Cart</h3>
<div id="cart-items"></div>
<div id="cart-total"></div>
<button onclick="checkout()">Checkout</button>
</div>

<div id="wishlist">
<h3>Wishlist</h3>
</div>

<div id="user-orders"></div>

<div id="address-list"></div>

<div id="notifications"></div>

<div id="wallet-balance"></div>

</div>

<script>

const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_ID",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "YOUR_MSG",
appId: "YOUR_APP"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let cartItems = [];

function showToast(msg){
alert(msg);
}

function login(){
const email = document.getElementById("email").value;
const pass = document.getElementById("password").value;

auth.signInWithEmailAndPassword(email, pass)
.then(()=>showToast("Login Success"))
.catch(e=>showToast(e.message));
}

function register(){
const email = document.getElementById("email").value;
const pass = document.getElementById("password").value;

auth.createUserWithEmailAndPassword(email, pass)
.then(()=>showToast("Registered"))
.catch(e=>showToast(e.message));
}

auth.onAuthStateChanged(user=>{
if(user){
currentUser = user;
document.getElementById("auth-section").style.display="none";
document.getElementById("home-section").style.display="block";
loadProducts();
}
});

function loadProducts(){
db.collection("products").get().then(snap=>{
const box = document.getElementById("products");
box.innerHTML="";

snap.forEach(doc=>{
const p = doc.data();

box.innerHTML += `
<div class="card">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<button onclick="addToCart('${doc.id}')">Add</button>
</div>`;
});
});
}

function addToCart(id){
cartItems.push(id);
document.getElementById("cart-badge").innerText = cartItems.length;
showToast("Added");
}

function checkout(){
showToast("Order placed");
}

function toggleMode(){
document.body.classList.toggle("dark-mode");
}

</script>
</body>
</html>
