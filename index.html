<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRP SHOPPING | Home</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --srp-blue: #0047AB; --srp-white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Auth Styles */
        #auth-screen { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%); 
            display: flex; 
        }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Main UI Styles */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #e2e8f0; z-index: 50; }
        #product-detail-view { display: none; z-index: 100; }
        .banner-gradient { background: linear-gradient(90deg, #0047AB 0%, #007FFF 100%); }
    </style>
</head>
<body class="pb-20">

    <section id="auth-screen" class="fixed inset-0 z-[200] items-center justify-center p-4">
        <div class="glass-card w-full max-w-md rounded-2xl p-8 text-white">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-extrabold tracking-tighter">SRP <span class="text-blue-500">SHOPPING</span></h1>
                <p class="text-gray-400 text-sm mt-2" id="auth-subtitle">Welcome back, please login</p>
            </div>
            <form id="auth-form" class="space-y-4">
                <input type="email" id="email" class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white" placeholder="Email" required>
                <input type="password" id="password" class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white" placeholder="Password" required>
                <button type="submit" id="main-submit" class="w-full py-3 rounded-lg bg-blue-600 font-bold uppercase">Sign In</button>
            </form>
            <div class="relative my-6 text-center text-xs text-gray-500">OR CONTINUE WITH</div>
            <button id="google-btn" class="w-full py-3 rounded-lg bg-white text-black font-semibold flex items-center justify-center gap-3">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Sign in with Google
            </button>
            <p class="mt-6 text-center text-sm text-gray-400">
                <span id="toggle-text">New here?</span> <a href="#" id="toggle-auth" class="text-blue-400 font-bold ml-1">Create Account</a>
            </p>
        </div>
    </section>

    <div id="main-storefront" style="display:none;">
        <header class="sticky top-0 bg-[#0047AB] text-white p-3 z-50 shadow-md">
            <div class="flex justify-between items-center mb-3">
                <button onclick="handleLogoTap()" class="text-xl font-bold tracking-tighter">SRP SHOPPING</button>
                <div class="flex items-center gap-3">
                    <button class="text-[10px] opacity-80">Privacy Policy</button>
                    <div class="bg-white/20 px-3 py-1 rounded-full flex items-center gap-2 text-sm">
                        <i class="fas fa-wallet text-yellow-400"></i> ₹<span id="header-wallet">450</span>
                    </div>
                </div>
            </div>
            <div class="relative mb-2">
                <input type="text" id="search-input" onkeyup="searchProducts()" placeholder="Search products..." class="w-full py-2 px-4 rounded text-black outline-none">
            </div>
            <div class="flex gap-4 overflow-x-auto no-scrollbar py-1 text-xs whitespace-nowrap border-t border-white/20">
                <button onclick="filterCategory('all')" class="font-bold">All</button>
                <button onclick="filterCategory('Electronics')">Electronics</button>
                <button onclick="filterCategory('Fashion')">Fashion</button>
                <button onclick="filterCategory('Mobiles')">Mobiles</button>
            </div>
        </header>

        <main class="p-3">
            <section class="banner-gradient rounded-xl p-6 text-white mb-6 shadow-lg flex justify-between items-center">
                <div>
                    <h2 class="text-2xl font-black italic">SRP EXCLUSIVE</h2>
                    <p class="text-sm opacity-90">MEGA SALE: UP TO 70% OFF</p>
                </div>
                <i class="fas fa-shopping-bag text-5xl opacity-20"></i>
            </section>

            <div id="product-grid" class="grid grid-cols-2 gap-3"></div>
        </main>
    </div>

    <div id="product-detail-view" class="fixed inset-0 bg-white overflow-y-auto">
        <nav class="p-4 flex items-center gap-4 border-b sticky top-0 bg-white">
            <button onclick="closeDetail()" class="fas fa-arrow-left text-xl"></button>
            <span class="font-bold truncate" id="detail-title-top">Product Details</span>
        </nav>
        <div class="flex overflow-x-auto no-scrollbar h-72 bg-gray-50 border-b">
            <img id="detail-img-1" class="w-full h-full object-contain flex-shrink-0">
            <img id="detail-img-2" class="w-full h-full object-contain flex-shrink-0">
        </div>
        <div class="p-4">
            <h2 id="detail-name" class="text-xl font-bold"></h2>
            <div class="text-green-700 font-bold my-2">4.5 ★ <span class="text-gray-400 font-normal text-sm ml-2">(1,240 Ratings)</span></div>
            <div class="flex items-center gap-2 text-2xl mb-4">
                <span id="detail-discount" class="text-red-600 font-light"></span>
                <span class="font-bold">₹<span id="detail-price"></span></span>
                <span id="detail-mrp" class="text-sm line-through text-gray-400"></span>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div><label class="text-xs font-bold block mb-1">Color</label>
                    <div class="flex gap-2"><div class="w-6 h-6 rounded-full bg-black border"></div><div class="w-6 h-6 rounded-full bg-blue-500 border"></div></div>
                </div>
                <div><label class="text-xs font-bold block mb-1">Quantity</label>
                    <select class="w-full p-1 border rounded text-sm"><option>1</option><option>2</option></select>
                </div>
            </div>
            <p class="text-sm text-gray-500 mb-6"><i class="fas fa-truck mr-2"></i>Delivery: 7 to 15 days</p>
            <div class="flex flex-col gap-2">
                <button onclick="alert('Added!')" class="w-full py-3 bg-yellow-400 rounded-full font-bold">Add to Cart</button>
                <button class="w-full py-3 bg-orange-500 text-white rounded-full font-bold">Buy Now</button>
            </div>
            <div class="mt-8">
                <h3 class="font-bold border-b pb-2 mb-2">Description</h3>
                <p id="detail-desc" class="text-sm text-gray-600 leading-relaxed"></p>
            </div>
        </div>
    </div>

    <nav class="bottom-nav h-16 flex items-center justify-around">
        <button onclick="location.reload()" class="flex flex-col items-center text-blue-700"><i class="fas fa-home"></i><span class="text-[10px] font-bold">Home</span></button>
        <button onclick="window.location.href='profile.html'" class="flex flex-col items-center text-gray-400"><i class="fas fa-user"></i><span class="text-[10px]">Account</span></button>
        <button onclick="window.location.href='profile.html#wallet'" class="flex flex-col items-center text-gray-400"><i class="fas fa-wallet"></i><span class="text-[10px]">Wallet</span></button>
        <button onclick="window.location.href='seller.html'" class="flex flex-col items-center text-gray-400"><i class="fas fa-store"></i><span class="text-[10px]">Seller</span></button>
        <button onclick="window.location.href='cart.html'" class="flex flex-col items-center text-gray-400"><i class="fas fa-shopping-cart"></i><span class="text-[10px]">Cart</span></button>
    </nav>

    <script>
        // FIREBASE CONFIG (Part 9)
        const firebaseConfig = {
            apiKey: "AIzaSyB2xwVO-c_f4cEn6PjtArta3DU6mqz7yxw",
            authDomain: "srp-shopping-54bbb.firebaseapp.com",
            databaseURL: "https://srp-shopping-54bbb-default-rtdb.firebaseio.com",
            projectId: "srp-shopping-54bbb",
            storageBucket: "srp-shopping-54bbb"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const ADMIN_EMAILS = ["Srpstudio1@gmail.com", "subhashrajpurohit10@gmail.com"];

        // 1. Auth Toggle Logic
        let isLoginMode = true;
        document.getElementById('toggle-auth').onclick = (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            document.getElementById('main-submit').innerText = isLoginMode ? 'Sign In' : 'Create Account';
            document.getElementById('auth-subtitle').innerText = isLoginMode ? 'Welcome back, please login' : 'Start your journey';
            document.getElementById('toggle-text').innerText = isLoginMode ? "New here?" : "Joined before?";
            document.getElementById('toggle-auth').innerText = isLoginMode ? 'Create Account' : 'Sign In';
        };

        // 2. Auth Execution
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-storefront').style.display = 'block';
            }
        });

        document.getElementById('auth-form').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(isLoginMode) auth.signInWithEmailAndPassword(email, pass).catch(err => alert(err.message));
            else auth.createUserWithEmailAndPassword(email, pass).catch(err => alert(err.message));
        };

        document.getElementById('google-btn').onclick = () => {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(err => alert(err.message));
        };

        // 3. Admin Redirect Logic
        function handleLogoTap() {
            const user = auth.currentUser;
            if (user && ADMIN_EMAILS.includes(user.email)) {
                const pin = prompt("Admin Security PIN:");
                if (pin === "1234") window.location.href = "admin.html";
            } else { location.reload(); }
        }

        // 4. Product Data & Display
        const products = Array.from({ length: 20 }, (_, i) => ({
            id: i,
            name: `SRP Premium Product ${i + 1}`,
            cat: i % 2 === 0 ? 'Electronics' : 'Fashion',
            price: 499 + (i * 100), mrp: 999 + (i * 100),
            img: `https://picsum.photos/400/400?random=${i}`,
            desc: "This is a premium product from SRP SHOPPING. ".repeat(100)
        }));

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map(p => `
                <div onclick="openDetail(${p.id})" class="bg-white p-2 rounded shadow-sm border border-gray-100">
                    <img src="${p.img}" class="w-full h-36 object-contain mb-2">
                    <h3 class="text-xs font-medium truncate">${p.name}</h3>
                    <div class="flex items-center gap-1 mt-1">
                        <span class="text-sm font-bold">₹${p.price}</span>
                        <span class="text-[8px] line-through text-gray-400">₹${p.mrp}</span>
                    </div>
                    <p class="text-[10px] text-green-600 font-bold">50% OFF</p>
                </div>
            `).join('');
        }

        function openDetail(id) {
            const p = products[id];
            document.getElementById('detail-name').innerText = p.name;
            document.getElementById('detail-price').innerText = p.price;
            document.getElementById('detail-mrp').innerText = `₹${p.mrp}`;
            document.getElementById('detail-discount').innerText = "-50%";
            document.getElementById('detail-desc').innerText = p.desc;
            document.getElementById('detail-img-1').src = p.img;
            document.getElementById('detail-img-2').src = p.img;
            document.getElementById('product-detail-view').style.display = 'block';
        }

        function closeDetail() { document.getElementById('product-detail-view').style.display = 'none'; }
        
        function filterCategory(cat) {
            if(cat === 'all') renderProducts(products);
            else renderProducts(products.filter(p => p.cat === cat));
        }

        function searchProducts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            renderProducts(products.filter(p => p.name.toLowerCase().includes(query)));
        }

        renderProducts(products);
    </script>
</body>
</html>
