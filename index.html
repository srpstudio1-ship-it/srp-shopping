    <style>
        /* SRP ENTERPRISE DESIGN SYSTEM (SDS) 5.0 */
        :root {
            --srp-blue: #004aad;
            --srp-blue-dark: #003580;
            --srp-blue-light: #eef5ff;
            --srp-white: #ffffff;
            --bg-canvas: #f0f2f5;
            --text-primary: #2d3436;
            --text-secondary: #636e72;
            --danger: #d63031;
            --success: #00b894;
            --radius-md: 20px;
            --shadow-hard: 0 12px 30px rgba(0,0,0,0.1);
            --nav-height: 70px;
        }

        /* Dark Mode Toggle Implementation */
        body.dark-mode {
            --bg-canvas: #0b0e14;
            --srp-white: #1a1f26;
            --text-primary: #f1f2f6;
            --text-secondary: #a4b0be;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-canvas); color: var(--text-primary); overflow-x: hidden; padding-bottom: var(--nav-height); }
        h1, h2, .brand-font { font-family: 'Poppins', sans-serif; font-weight: 800; }

        /* AUTHENTICATION PORTAL */
        #auth-portal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-canvas);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            padding: 30px;
            justify-content: center;
        }

        .auth-card {
            background: var(--srp-white);
            padding: 30px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-hard);
            max-width: 450px;
            margin: 0 auto;
            width: 100%;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 8px; color: var(--srp-blue); }
        .input-field {
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #eee;
            background: #f9f9f9; font-weight: 600; outline: none; transition: 0.3s;
        }
        .input-field:focus { border-color: var(--srp-blue); background: #fff; }

        /* BUTTONS */
        .srp-btn {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            font-weight: 800; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary { background: var(--srp-blue); color: #fff; }
        .btn-google { background: #fff; border: 1px solid #ddd; color: #333; margin-top: 15px; }

        /* MASTER LAYOUT */
        .srp-header {
            position: sticky; top: 0; z-index: 900;
            background: var(--srp-white); height: 70px;
            padding: 0 20px; display: flex; align-items: center;
            justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .header-search {
            flex: 1; margin: 0 15px; position: relative;
        }
        .header-search input {
            width: 100%; padding: 10px 15px 10px 40px; border-radius: 50px;
            border: 1px solid #eee; background: var(--bg-canvas);
        }
        .header-search i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }

        /* BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            height: var(--nav-height); background: var(--srp-white);
            display: flex; border-top: 1px solid rgba(0,0,0,0.05); z-index: 1000;
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--text-secondary); text-decoration: none; font-size: 0.65rem; font-weight: 700;
        }
        .nav-item.active { color: var(--srp-blue); }
        .nav-item i { font-size: 1.4rem; margin-bottom: 4px; }
        .nav-ai-btn {
            background: linear-gradient(135deg, #6c5ce7, var(--srp-blue));
            width: 55px; height: 55px; border-radius: 50%;
            color: #fff !important; margin-top: -30px; border: 5px solid var(--bg-canvas);
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
        }

        /* PAGE ENGINE */
        .page { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* WALLET BADGE */
        .wallet-pill {
            background: var(--srp-blue-light); color: var(--srp-blue);
            padding: 6px 12px; border-radius: 50px; font-weight: 900; font-size: 0.8rem;
        }

        /* BANNER SYSTEM */
        .hero-banner {
            width: 100%; height: 180px; border-radius: 20px;
            background: linear-gradient(45deg, var(--srp-blue), var(--srp-blue-dark));
            margin-bottom: 25px; display: flex; align-items: center; padding: 30px; color: #fff;
            position: relative; overflow: hidden;
        }

        /* PRODUCT GRID */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card {
            background: var(--srp-white); border-radius: 15px; padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); position: relative;
        }
        .product-img { width: 100%; height: 150px; object-fit: contain; border-radius: 10px; }
        .price-tag { color: var(--srp-blue); font-weight: 800; font-size: 1.1rem; }
        .mrp-tag { text-decoration: line-through; color: var(--text-secondary); font-size: 0.75rem; }
        .discount-badge {
            position: absolute; top: 10px; left: 10px;
            background: var(--danger); color: #fff; padding: 2px 8px;
            border-radius: 5px; font-size: 0.6rem; font-weight: 900;
        }

        /* TOAST NOTIFICATIONS */
        #srp-toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 11000; width: 90%; max-width: 400px;
        }
        .toast {
            background: #333; color: #fff; padding: 15px; border-radius: 10px;
            margin-bottom: 10px; font-weight: 600; font-size: 0.85rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); animation: slideDown 0.3s ease;
        }
        @keyframes slideDown { from { top: -50px; } to { top: 20px; } }
    </style>
</head>
<body>

    <div id="srp-toast"></div>

    <div id="auth-portal">

            <h1 style="color:var(--srp-blue); font-size: 2.2rem;">SRP SHOPPING</h1>

            <div class="input-group">

    </div>

    <div id="app-shell" style="display: none;">
        <header class="srp-header">
            <div class="brand-font" style="color: var(--srp-blue); cursor: pointer;" onclick="handleBrandTap()">SRP SHOPPING</div>
            
            <div class="header-search">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search spares, gadgets..." oninput="searchProducts(this.value)">

            <div class="wallet-pill" onclick="switchPage('wallet')">
                <i class="fas fa-wallet"></i> ₹<span id="global-wallet-bal">0.00</span>

        </header>

        <div style="padding: 10px 20px; background: #fff; border-bottom: 1px solid #eee; display: flex; justify-content: space-between;">
            <span onclick="openPrivacy()" style="font-size: 0.65rem; font-weight: 800; color: var(--text-secondary);">PRIVACY POLICY</span>
            <span id="admin-badge" style="display:none; font-size: 0.6rem; background: var(--danger); color:#fff; padding: 2px 6px; border-radius: 4px;">SYSTEM ADMIN</span>
        </div>

        <main id="main-content">
            <section id="page-home" class="page active">
                <div class="hero-banner">
                    <div>
                        <h2 style="font-size: 1.8rem;">MEGA SALE</h2>
                        <p style="font-weight: 600;">UP TO 80% OFF ON ALL SPARES</p>
                        <button class="srp-btn btn-primary" style="width: auto; padding: 8px 20px; margin-top: 15px; font-size: 0.7rem;">SHOP NOW</button>
                    </div>
                </div>

                <div id="category-scroller" style="display:flex; gap:15px; overflow-x:auto; margin-bottom:25px; padding-bottom: 10px;">
                    </div>

                <div class="product-grid" id="home-product-grid">
                    </div>
            </section>
<section id="page-admin" class="page"></section>
            <section id="page-cart" class="page"></section>
            <section id="page-wallet" class="page"></section>
            <section id="page-seller" class="page"></section>
            <section id="page-account" class="page"></section>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchPage('home', this)"><i class="fas fa-home"></i><span>HOME</span></div>
            <div class="nav-item" onclick="switchPage('account', this)"><i class="fas fa-user-circle"></i><span>ACCOUNT</span></div>
            <div class="nav-item nav-ai-btn" onclick="openAI()"><i class="fas fa-robot"></i></div>
            <div class="nav-item" onclick="switchPage('wallet', this)"><i class="fas fa-wallet"></i><span>WALLET</span></div>
            <div class="nav-item" onclick="switchPage('seller', this)"><i class="fas fa-store"></i><span>SELLER</span></div>
            <div class="nav-item" onclick="switchPage('cart', this)" style="position:relative;">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-badge" style="position:absolute; top:10px; right:15px; background:var(--danger); color:#fff; font-size:0.5rem; padding:2px 5px; border-radius:10px;">0</span>
                <span>CART</span>
            </div>
        </nav>
    </div>

<script>
// ==========================================

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ==========================================
// CORE STATE MANAGEMENT
// ==========================================
let currentUser = null;
let isLoginMode = true;
let isAdmin = false;

// AUTH OBSERVER
auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
        isAdmin = ADMIN_EMAILS.includes(user.email);
        document.getElementById('auth-portal').style.display = 'none';
        document.getElementById('app-shell').style.display = 'block';
        if (isAdmin) document.getElementById('admin-badge').style.display = 'block';
        
        loadHomeData();
        syncUserWallet();
    } else {
        document.getElementById('auth-portal').style.display = 'flex';
        document.getElementById('app-shell').style.display = 'none';
    }
});

// ==========================================
// UI ENGINE FUNCTIONS
// ==========================================
function toggleAuth(mode) {
    isLoginMode = mode;
    document.getElementById('tab-login').style.background = mode ? '#fff' : 'transparent';
    document.getElementById('tab-signup').style.background = mode ? 'transparent' : '#fff';
    document.getElementById('main-auth-btn').innerText = mode ? 'SECURE ACCESS' : 'CREATE ACCOUNT';
}


function showToast(msg, type = "info") {
    const box = document.getElementById('srp-toast');
    const t = document.createElement('div');
    
    let bg = "#333";
    if(type === "success") bg = "var(--success)";
    if(type === "danger") bg = "var(--danger)";

    t.className = 'toast';
    t.style.background = bg;
    t.innerText = msg;

    box.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}
function switchPage(pageId, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    
    document.getElementById(`page-${pageId}`).classList.add('active');
    if(el) el.classList.add('active');
    
    // Lazy Load specific logic
    if(pageId === 'cart') renderCart();
    if(pageId === 'seller') initSellerDashboard();
}

function handleBrandTap() {
    if (isAdmin) {
        let pin = prompt("Admin Secure Pin:");
        if (pin === "2026") switchPage('admin'); // Admin module in Part 2
    } else {
        location.reload();
    }
}

// ==========================================
// AUTHENTICATION LOGIC
// ==========================================
async function handleAuth() {
    const email = document.getElementById('auth-email').value;
    const pass = document.getElementById('auth-pass').value;

    if (!email || !pass) return showToast("Enter credentials");

    try {
        if (isLoginMode) {
            await auth.signInWithEmailAndPassword(email, pass);
            showToast("Welcome Back!");
        } else {
            const res = await auth.createUserWithEmailAndPassword(email, pass);
            await db.collection('users').doc(res.user.uid).set({
                email, wallet: 0, createdAt: new Date(), isVendor: false
            });
            showToast("Account Created!");
        }
    } catch (e) {
        showToast(e.message);
    }
}

async function signInWithGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
        await auth.signInWithPopup(provider);
    } catch (e) {
        showToast("Google Auth Failed");
    }
}

// ==========================================

    const grid = document.getElementById('home-product-grid');
    // For demo purposes in Part 1 - Part 2 will fetch 20 real products from Firestore
    grid.innerHTML = `

            <div class="discount-badge">80% OFF</div>

            <div class="mrp-tag">₹12,000</div>
            <div class="price-tag">₹2,400</div>
            <button class="srp-btn btn-primary" style="padding:8px; font-size:0.6rem; margin-top:10px;">VIEW DETAIL</button>
        </div>
    `;
}

function syncUserWallet() {
    db.collection('users').doc(auth.currentUser.uid).onSnapshot(doc => {
        if(doc.exists) document.getElementById('global-wallet-bal').innerText = (doc.data().wallet || 0).toFixed(2);
    });
}

// 2. PRODUCT DETAIL MODAL SYSTEM (AMAZON STYLE)

                </select>

        document.documentElement.setAttribute('data-theme', this.current);
        localStorage.setItem('srp_theme', this.current);
        this.apply();

    apply() {
        const root = document.documentElement.style;
        if (this.current === 'dark') {
            root.setProperty('--srp-white', '#121212');
            root.setProperty('--text-main', '#ffffff');
            root.setProperty('--text-secondary', '#aaaaaa');
            root.setProperty('--bg-light', '#1e1e1e');

            root.setProperty('--text-secondary', '#666666');

// 4. TRANSACTION & WALLET SETTLEMENT
async function processVendorPayout(vendorId, amount) {
    const vRef = db.collection('users').doc(vendorId);
    
    return db.runTransaction(async (transaction) => {
        const vDoc = await transaction.get(vRef);
        const newBalance = (vDoc.data().vendorBalance || 0) - amount;
        
        if (newBalance < 0) throw "Insufficient Balance";
        
        transaction.update(vRef, { vendorBalance: newBalance });
        // Log transaction to 'payouts' collection
        transaction.set(db.collection('payouts').doc(), {
            vendorId,
            amount,
            timestamp: new Date(),
            status: 'Completed'
        });
    }).then(() => showToast("Payout Successful")).catch(e => showToast(e));
}

    // APPLY COUPON
function applyCoupon(code, cartTotal) {
    const coupon = SRP_COUPONS.find(c => c.code === code.toUpperCase());

    if (!coupon) return showToast("Invalid Coupon", "danger");
    if (cartTotal < coupon.minOrder) return showToast(`Min ₹${coupon.minOrder}`, "danger");

    let discount = 0;

    if (coupon.type === 'flat') discount = coupon.discount;
    if (coupon.type === 'percentage') discount = (cartTotal * coupon.discount) / 100;

    const newTotal = Math.max(cartTotal - discount, 0);

    showToast(`Coupon Applied! Saved ₹${discount}`, "success");

    return { discount, newTotal };
}

    const account = document.getElementById('w-account').value;

    if (!amount || amount < 500) return showToast("Min ₹500", "danger");
    if (amount > maxBalance) return showToast("Insufficient Balance", "danger");
    if (!account) return showToast("Enter UPI/Bank", "danger");

    try {
        await db.runTransaction(async (tx) => {
            const ref = db.collection("users").doc(auth.currentUser.uid);
            const doc = await tx.get(ref);

            const currentBal = doc.data().vendorBalance || 0;

            if (amount > currentBal) throw "Balance changed";

            tx.update(ref, {
                vendorBalance: currentBal - amount
            });

            tx.set(db.collection("withdrawals").doc(), {
                vendorId: auth.currentUser.uid,
                amount,
                account,
                status: "pending",
                createdAt: new Date()
            });
        });

        showToast("Withdrawal Requested", "success");
        location.reload();

    } catch (e) {
        showToast("Failed: " + e, "danger");
    }
    }
    function monitorNetworkStrength() {
    window.addEventListener('online', () => {
        showToast("Back Online 🚀", "success");
        processOfflineQueue();
    });

    window.addEventListener('offline', () => {
        showToast("Offline Mode Activated", "danger");
    });
    }
    async function saveCheckoutProgress(cartData) {
    const db = await openDB();
    const tx = db.transaction('pending_orders', 'readwrite');
    const store = tx.objectStore('pending_orders');

    store.put({
        id: "checkout",
        data: cartData,
        time: Date.now()
    });
    }
    async function processOfflineQueue() {
    const db = await openDB();
    const tx = db.transaction('pending_orders', 'readwrite');
    const store = tx.objectStore('pending_orders');

    const data = await store.get("checkout");

    if (!data) return;

    if (Date.now() - data.time < 3600000) {
        showToast("Restoring Order...", "info");

        completeOrder(data.data); // your existing function
        store.delete("checkout");
    }
    }
    function updateSignalUI() {
    const el = document.getElementById('srp-signal-status');
    if (!el) return;

    const conn = navigator.connection;

    if (!conn) return;

    let status = "Excellent";
    let color = "green";

    if (conn.rtt > 200) { status = "Weak"; color = "orange"; }
    if (conn.rtt > 500) { status = "Poor"; color = "red"; }

    el.innerHTML = `📶 <span style="color:${color}">${status}</span>`;
    }
</script>
