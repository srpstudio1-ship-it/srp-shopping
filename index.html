<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SRP SHOPPING | ALL-IN-ONE MASTER</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        :root {
            --srp-blue: #0047AB;
            --srp-red: #ff0000;
            --srp-dark-red: #8b0000;
        }

        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* AUTH STYLES (Feature 1) */
        #auth-view {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 0, 0, 0.1);
        }
        .red-gradient-btn { background: linear-gradient(90deg, var(--srp-dark-red) 0%, var(--srp-red) 100%); }

        /* HOME STYLES (Feature 2 & 3) */
        #home-view { background-color: #f4f7f6; display: none; }
        .banner-gradient { background: linear-gradient(90deg, #0047AB 0%, #007FFF 100%); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #e2e8f0; z-index: 1000; }

        /* DETAIL VIEW STYLES (Feature 4) */
        #product-detail-view { display: none; position: fixed; inset: 0; bg: white; z-index: 2000; overflow-y: auto; background: white; }
        .product-slider { scroll-snap-type: x mandatory; display: flex; overflow-x: auto; height: 320px; }
        .product-slider img { scroll-snap-align: start; width: 100%; flex-shrink: 0; object-fit: contain; background: #f9f9f9; }

        /* ANIMATIONS */
        .slide-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-20">

    <section id="auth-view">
        <div class="glass-card w-full max-w-md rounded-2xl p-8 m-4">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-extrabold text-white tracking-tighter">SRP <span class="text-red-600">SHOPPING</span></h1>
                <p class="text-gray-400 text-sm mt-2" id="auth-subtitle">Welcome back, please login</p>
            </div>
            <form id="auth-form" class="space-y-5">
                <input type="email" id="email" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-gray-800 text-white outline-none focus:border-red-600" placeholder="Email" required>
                <input type="password" id="password" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-gray-800 text-white outline-none focus:border-red-600" placeholder="Password" required>
                <button type="submit" id="main-submit" class="red-gradient-btn w-full py-3 rounded-lg text-white font-bold uppercase tracking-wide active:scale-95 transition-transform">Sign In</button>
            </form>
            <button id="google-btn" class="w-full py-3 px-4 rounded-lg bg-white text-black font-semibold flex items-center justify-center gap-3 mt-4 hover:bg-gray-200">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20"> Sign in with Google
            </button>
            <div class="mt-8 text-center">
                <p class="text-gray-400 text-sm">
                    <span id="toggle-text">Don't have an account?</span>
                    <button id="toggle-auth" class="text-red-500 font-bold ml-1">Create Account</button>
                </p>
            </div>
        </div>
    </section>

    <section id="home-view" class="min-h-screen">
        <header class="sticky top-0 bg-[#0047AB] text-white p-3 z-50 shadow-md">
            <div class="flex justify-between items-center mb-2">
                <button onclick="handleLogoTap()" class="text-xl font-bold tracking-tighter">SRP SHOPPING</button>
                <div class="flex items-center gap-3">
                    <div class="bg-white/20 px-3 py-1 rounded-full text-xs">
                        <i class="fas fa-wallet text-yellow-400 mr-1"></i> ₹<span id="wallet-balance">0</span>
                    </div>
                </div>
            </div>
            <input type="text" id="search-bar" onkeyup="searchProducts()" placeholder="Search products..." class="w-full py-2 px-4 rounded text-black outline-none text-sm">
            <div class="flex gap-4 overflow-x-auto no-scrollbar py-2 text-[10px] font-bold uppercase tracking-widest border-t border-blue-400 mt-2">
                <button onclick="filterCategory('all')" class="border-b-2 border-white pb-1">All</button>
                <button onclick="filterCategory('Electronics')">Electronics</button>
                <button onclick="filterCategory('Fashion')">Fashion</button>
                <button onclick="filterCategory('Mobiles')">Mobiles</button>
            </div>
        </header>

        <main class="p-3">
            <div class="banner-gradient rounded-xl p-5 text-white mb-6 shadow-lg">
                <h2 class="text-xl font-black italic">SRP EXCLUSIVE MEGA SALE</h2>
                <p class="text-xs opacity-90">UP TO 70% OFF ON ALL ITEMS</p>
            </div>
            <div id="product-grid" class="grid grid-cols-2 gap-3">
                </div>
        </main>

        <nav class="bottom-nav h-16 flex items-center justify-around">
            <button class="flex flex-col items-center text-[#0047AB]"><i class="fas fa-home"></i><span class="text-[9px] font-bold">Home</span></button>
            <button class="flex flex-col items-center text-gray-400"><i class="fas fa-wallet"></i><span class="text-[9px] font-bold">Wallet</span></button>
            <button class="flex flex-col items-center text-gray-400"><i class="fas fa-store"></i><span class="text-[9px] font-bold">Seller</span></button>
            <button class="flex flex-col items-center text-gray-400"><i class="fas fa-shopping-cart"></i><span class="text-[9px] font-bold">Cart</span></button>
            <button onclick="auth.signOut()" class="flex flex-col items-center text-red-400"><i class="fas fa-power-off"></i><span class="text-[9px] font-bold">Exit</span></button>
        </nav>
    </section>

    <section id="product-detail-view" class="slide-up">
        <nav class="p-4 flex items-center gap-4 border-b sticky top-0 bg-white z-50">
            <button onclick="closeDetail()" class="fas fa-arrow-left text-xl"></button>
            <span class="font-bold truncate text-sm" id="detail-title-top">Product Details</span>
        </nav>
        <div class="product-slider no-scrollbar">
            <img id="detail-img-1" src="">
            <img id="detail-img-2" src="">
        </div>
        <div class="p-5">
            <h2 id="detail-name" class="text-xl font-bold text-gray-800"></h2>
            <div class="flex items-center gap-2 my-2">
                <span class="bg-green-700 text-white text-[10px] px-2 py-0.5 rounded">4.8 ★</span>
                <span class="text-blue-600 text-xs">Premium Choice</span>
            </div>
            <div class="my-4">
                <div class="flex items-center gap-2">
                    <span id="detail-discount" class="text-red-600 text-2xl font-light">-50%</span>
                    <span class="text-3xl font-bold">₹<span id="detail-price"></span></span>
                </div>
                <p class="text-gray-400 text-sm line-through">M.R.P.: ₹<span id="detail-mrp"></span></p>
            </div>
            <div class="bg-blue-50 p-3 rounded-lg text-xs text-blue-800 font-medium mb-6">
                <i class="fas fa-truck mr-2"></i> Free Express Delivery in 5-7 days.
            </div>
            <div class="flex gap-3 mb-8">
                <button onclick="alert('Added to Cart')" class="flex-1 py-4 bg-yellow-400 rounded-xl font-bold uppercase text-xs">Add to Cart</button>
                <button class="flex-1 py-4 bg-orange-500 text-white rounded-xl font-bold uppercase text-xs">Buy Now</button>
            </div>
            <h3 class="font-bold border-b pb-2 mb-2 uppercase text-xs">Description</h3>
            <p id="detail-desc" class="text-sm text-gray-600 leading-relaxed"></p>
        </div>
    </section>

    <script>
        // FIREBASE INITIALIZATION
        const firebaseConfig = {
            apiKey: "AIzaSyB2xwVO-c_f4cEn6PjtArta3DU6mqz7yxw",
            authDomain: "srp-shopping-54bbb.firebaseapp.com",
            databaseURL: "https://srp-shopping-54bbb-default-rtdb.firebaseio.com",
            projectId: "srp-shopping-54bbb",
            storageBucket: "srp-shopping-54bbb.appspot.com",
            messagingSenderId: "491906168702",
            appId: "1:491906168702:web:2873565fcd2d561077252f"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // APP STATE
        const ADMIN_EMAILS = ["Srpstudio1@gmail.com", "subhashrajpurohit10@gmail.com"];
        let products = [];
        let isLoginMode = true;

        // AUTH LISTENER
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-view').style.display = 'none';
                document.getElementById('home-view').style.display = 'block';
                loadUserData(user);
                loadProducts();
            } else {
                document.getElementById('auth-view').style.display = 'flex';
                document.getElementById('home-view').style.display = 'none';
            }
        });

        // AUTH LOGIC
        document.getElementById('toggle-auth').onclick = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('main-submit').innerText = isLoginMode ? 'Sign In' : 'Create Account';
            document.getElementById('auth-subtitle').innerText = isLoginMode ? 'Welcome back, please login' : 'Start your journey';
            document.getElementById('toggle-text').innerText = isLoginMode ? "Don't have an account?" : "Already have an account?";
            document.getElementById('toggle-auth').innerText = isLoginMode ? 'Create Account' : 'Sign In';
        };

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                if(isLoginMode) await auth.signInWithEmailAndPassword(email, pass);
                else await auth.createUserWithEmailAndPassword(email, pass);
            } catch(err) { alert(err.message); }
        };

        document.getElementById('google-btn').onclick = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert(err.message));
        };

        // DATA LOGIC
        function loadUserData(user) {
            db.collection("users").doc(user.uid).onSnapshot(doc => {
                const bal = doc.exists ? doc.data().walletBalance : 0;
                document.getElementById('wallet-balance').innerText = bal.toLocaleString();
            });
        }

        function loadProducts() {
            // Generate 20 products for the demo
            products = Array.from({ length: 20 }, (_, i) => ({
                id: i,
                name: `SRP Elite Gadget ${i + 1}`,
                category: i % 2 === 0 ? 'Electronics' : 'Fashion',
                price: 999 + (i * 150),
                mrp: 2999 + (i * 150),
                image: `https://picsum.photos/400/400?random=${i}`,
                desc: "Official high-performance product engineered by SRP SHOPPING. ".repeat(150)
            }));
            renderGrid(products);
        }

        function renderGrid(items) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = items.map(p => `
                <div onclick="openDetail(${p.id})" class="bg-white p-2 rounded-xl shadow-sm border border-gray-100 active:scale-95 transition-transform">
                    <img src="${p.image}" class="w-full h-32 object-contain mb-2 rounded-lg">
                    <h3 class="text-[10px] font-bold text-gray-800 truncate uppercase">${p.name}</h3>
                    <div class="flex items-center gap-1 mt-1">
                        <span class="text-sm font-black text-blue-700">₹${p.price}</span>
                        <span class="text-[8px] line-through text-gray-400">₹${p.mrp}</span>
                    </div>
                    <p class="text-[9px] text-green-600 font-bold">50% OFF</p>
                </div>
            `).join('');
        }

        // NAVIGATION & UI
        function openDetail(id) {
            const p = products[id];
            document.getElementById('detail-name').innerText = p.name;
            document.getElementById('detail-price').innerText = p.price;
            document.getElementById('detail-mrp').innerText = p.mrp;
            document.getElementById('detail-desc').innerText = p.desc;
            document.getElementById('detail-img-1').src = p.image;
            document.getElementById('detail-img-2').src = `https://picsum.photos/400/400?random=${id+100}`;
            document.getElementById('product-detail-view').style.display = 'block';
        }

        function closeDetail() { document.getElementById('product-detail-view').style.display = 'none'; }

        function filterCategory(cat) {
            if(cat === 'all') renderGrid(products);
            else renderGrid(products.filter(p => p.category === cat));
        }

        function handleLogoTap() {
            const user = auth.currentUser;
            if (user && ADMIN_EMAILS.includes(user.email)) {
                const pin = prompt("ADMIN PIN REQUIRED:");
                if (pin === "1234") alert("Redirecting to Master Console...");
                else alert("Unauthorized!");
            } else {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
