<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SRP SHOPPING | THE OFFICIAL MARKETPLACE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

        :root {
            --srp-primary: #0047AB;
            --srp-secondary: #007FFF;
            --srp-bg: #f0f2f5;
            --srp-card: #ffffff;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--srp-bg); 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* UI OPTIMIZATIONS */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .srp-gradient { background: linear-gradient(135deg, var(--srp-primary) 0%, var(--srp-secondary) 100%); }
        .glass-header { background: rgba(0, 71, 171, 0.95); backdrop-filter: blur(10px); }
        
        /* AUTH SCREEN ANIMATION */
        #auth-screen {
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            transition: all 0.5s ease-in-out;
        }

        /* PRODUCT CARD ARCHITECTURE */
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.1s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .product-card:active { transform: scale(0.97); }

        /* DETAIL VIEW SLIDE-UP */
        #product-detail-view {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 1000;
            display: none;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0, 0, 0.2, 1);
        }
        #product-detail-view.active { display: block; transform: translateY(0); }

        /* CATEGORY CHIPS */
        .cat-chip {
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            font-size: 12px;
            font-weight: 600;
            transition: 0.3s;
        }
        .cat-chip.active { background: white; color: var(--srp-primary); }

        /* SKELETON LOADING */
        .shimmer {
            background: linear-gradient(90deg, #eff1f3 0%, #e2e8f0 50%, #eff1f3 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="pb-24">

    <section id="auth-screen" class="fixed inset-0 z-[10000] flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-white/5 backdrop-blur-xl border border-white/10 p-8 rounded-[2.5rem] text-white shadow-2xl">
            <div class="text-center mb-10">
                <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-blue-500/50">
                    <i class="fas fa-shopping-cart text-3xl"></i>
                </div>
                <h1 class="text-4xl font-black tracking-tighter">SRP <span class="text-blue-500">SHOPPING</span></h1>
                <p id="auth-sub" class="text-gray-400 text-sm mt-2">The Ultimate E-commerce Experience</p>
            </div>

            <form id="auth-form" class="space-y-4">
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="email" id="email" class="w-full pl-12 pr-4 py-4 rounded-2xl bg-white/5 border border-white/10 focus:border-blue-500 outline-none transition-all" placeholder="Email Address" required>
                </div>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="password" id="password" class="w-full pl-12 pr-4 py-4 rounded-2xl bg-white/5 border border-white/10 focus:border-blue-500 outline-none transition-all" placeholder="Security Password" required>
                </div>
                <button type="submit" id="main-submit" class="w-full py-4 srp-gradient rounded-2xl font-black uppercase tracking-widest shadow-xl shadow-blue-600/20 active:scale-95 transition-transform">
                    Sign In
                </button>
            </form>

            <div class="flex items-center my-8 text-gray-600">
                <hr class="flex-1 border-white/10">
                <span class="px-4 text-[10px] font-bold tracking-widest uppercase">Quick Connect</span>
                <hr class="flex-1 border-white/10">
            </div>

            <button id="google-btn" class="w-full py-4 bg-white text-black rounded-2xl font-bold flex items-center justify-center gap-3 active:scale-95 transition-transform">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20"> Continue with Google
            </button>

            <p class="mt-8 text-center text-sm text-gray-400">
                <span id="toggle-text">Don't have an SRP account?</span> 
                <a href="#" id="toggle-auth" class="text-blue-400 font-bold ml-1 hover:underline">Register Now</a>
            </p>
        </div>
    </section>

    <div id="main-storefront" class="hidden">
        <header class="sticky top-0 z-[500] glass-header text-white pb-2 shadow-xl">
            <div class="p-4 flex justify-between items-center">
                <div onclick="handleLogoTap()" class="flex items-center gap-2 cursor-pointer">
                    <h1 class="text-2xl font-black tracking-tighter">SRP <span class="text-blue-400">SHOPPING</span></h1>
                    <span class="bg-yellow-400 text-black text-[9px] px-1.5 py-0.5 rounded font-black">OFFICIAL</span>
                </div>
                <div class="flex items-center gap-4">
                    <button class="relative">
                        <i class="fas fa-bell text-xl"></i>
                        <span class="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                    </button>
                    <div class="bg-white/10 border border-white/20 pl-3 pr-4 py-1.5 rounded-full flex items-center gap-2">
                        <i class="fas fa-wallet text-yellow-400 text-sm"></i>
                        <span class="text-sm font-black" id="header-wallet">₹0</span>
                    </div>
                </div>
            </div>

            <div class="px-4 mb-4">
                <div class="relative group">
                    <input type="text" id="search-input" onkeyup="searchProducts()" 
                        placeholder="Search Premium Mobiles, Shoes, Tech..." 
                        class="w-full bg-white text-black py-3.5 px-6 pr-12 rounded-2xl shadow-inner focus:ring-4 focus:ring-blue-500/20 outline-none transition-all placeholder:text-gray-400">
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 flex gap-3 text-gray-400">
                        <i class="fas fa-microphone"></i>
                        <i class="fas fa-search text-blue-600"></i>
                    </div>
                </div>
            </div>

            <div class="flex gap-3 overflow-x-auto no-scrollbar px-4 pb-2 border-t border-white/5 pt-3">
                <button onclick="filterCategory('all')" class="cat-chip active">All Marketplace</button>
                <button onclick="filterCategory('Mobiles')" class="cat-chip">Mobiles</button>
                <button onclick="filterCategory('Electronics')" class="cat-chip">Electronics</button>
                <button onclick="filterCategory('Fashion')" class="cat-chip">Fashion</button>
                <button onclick="filterCategory('Home')" class="cat-chip">Home & Living</button>
                <button onclick="filterCategory('Appliances')" class="cat-chip">Appliances</button>
            </div>
        </header>

        <main class="container mx-auto p-4">
            <section class="mb-8 h-48 srp-gradient rounded-[2rem] p-8 text-white relative overflow-hidden shadow-2xl">
                <div class="relative z-10">
                    <span class="bg-black/20 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest">Limited Offer</span>
                    <h2 class="text-4xl font-black italic mt-2">SUMMER <br>CARNIVAL</h2>
                    <button class="mt-4 bg-white text-blue-700 px-6 py-2.5 rounded-xl font-black text-xs uppercase tracking-tighter">Shop Collection</button>
                </div>
                <i class="fas fa-bolt absolute -right-6 -bottom-10 text-[12rem] text-white/10 rotate-12"></i>
            </section>

            <div class="flex justify-between items-end mb-6 px-1">
                <div>
                    <h3 class="text-xl font-black text-slate-900 tracking-tighter uppercase">Flash Deals</h3>
                    <p class="text-xs text-gray-500 font-medium">Ends in <span class="text-red-600 font-bold" id="timer">04:59:59</span></p>
                </div>
                <button class="text-blue-600 font-bold text-sm">View All <i class="fas fa-arrow-right ml-1"></i></button>
            </div>

            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                <div class="shimmer h-60 rounded-2xl"></div>
                <div class="shimmer h-60 rounded-2xl"></div>
                <div class="shimmer h-60 rounded-2xl"></div>
                <div class="shimmer h-60 rounded-2xl"></div>
            </div>
        </main>
    </div>

    <div id="product-detail-view" class="fixed inset-0 bg-white overflow-y-auto hidden">
        <nav class="p-4 flex items-center justify-between border-b sticky top-0 bg-white/90 backdrop-blur-md z-[1100]">
            <div class="flex items-center gap-4">
                <button onclick="closeDetail()" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100"><i class="fas fa-arrow-left"></i></button>
                <span class="font-black text-slate-900 uppercase tracking-tighter" id="detail-title-top">Details</span>
            </div>
            <div class="flex gap-4 text-gray-500">
                <i class="fas fa-share-alt"></i>
                <i class="fas fa-heart"></i>
            </div>
        </nav>

        <div class="max-w-4xl mx-auto">
            <div class="relative bg-white h-[450px] flex items-center justify-center border-b overflow-hidden group">
                <img id="detail-img-1" class="w-full h-full object-contain transition-transform duration-500 group-hover:scale-110">
                <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2">
                    <span class="w-8 h-1.5 bg-blue-600 rounded-full"></span>
                    <span class="w-2 h-1.5 bg-gray-300 rounded-full"></span>
                    <span class="w-2 h-1.5 bg-gray-300 rounded-full"></span>
                </div>
            </div>

            <div class="p-6">
                <div class="flex justify-between items-start mb-2">
                    <span id="detail-category" class="text-[10px] font-black text-blue-600 uppercase tracking-[0.2em]">ELECTRONICS</span>
                    <div class="flex items-center gap-1 bg-green-100 text-green-700 px-2 py-0.5 rounded text-xs font-bold">
                        4.5 <i class="fas fa-star text-[8px]"></i>
                    </div>
                </div>
                <h2 id="detail-name" class="text-3xl font-black text-slate-900 leading-none tracking-tighter mb-4 uppercase"></h2>
                
                <div class="flex items-center gap-4 mb-8">
                    <div class="text-4xl font-black text-blue-700">₹<span id="detail-price"></span></div>
                    <div class="flex flex-col">
                        <span id="detail-mrp" class="text-sm line-through text-gray-400 font-bold"></span>
                        <span id="detail-discount" class="text-xs text-red-600 font-black uppercase"></span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                        <label class="text-[10px] font-black text-gray-400 uppercase">Premium Variant</label>
                        <select class="w-full bg-transparent font-bold mt-1 outline-none">
                            <option>Standard Black</option>
                            <option>SRP Special Edition Blue</option>
                        </select>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                        <label class="text-[10px] font-black text-gray-400 uppercase">Quantity</label>
                        <div class="flex items-center justify-between mt-1">
                            <button class="w-6 h-6 rounded-full bg-white border flex items-center justify-center font-bold text-sm shadow-sm">-</button>
                            <span class="font-bold">1</span>
                            <button class="w-6 h-6 rounded-full bg-white border flex items-center justify-center font-bold text-sm shadow-sm">+</button>
                        </div>
                    </div>
                </div>

                <div class="flex gap-4 mb-8 overflow-x-auto no-scrollbar py-2">
                    <div class="flex-shrink-0 flex items-center gap-2 bg-slate-50 border px-4 py-2 rounded-xl">
                        <i class="fas fa-shield-alt text-blue-600"></i>
                        <span class="text-[10px] font-bold uppercase whitespace-nowrap">SRP Secure Warranty</span>
                    </div>
                    <div class="flex-shrink-0 flex items-center gap-2 bg-slate-50 border px-4 py-2 rounded-xl">
                        <i class="fas fa-undo text-blue-600"></i>
                        <span class="text-[10px] font-bold uppercase whitespace-nowrap">7 Day Easy Return</span>
                    </div>
                </div>

                <div class="border-t pt-8">
                    <h3 class="font-black text-lg text-slate-900 mb-4 uppercase tracking-tighter">Product Intelligence & Specs</h3>
                    <div id="detail-desc" class="text-sm text-gray-600 leading-relaxed space-y-4 font-medium italic">
                        </div>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-xl border-t z-[1200] flex gap-3">
            <button onclick="addToCart()" class="flex-1 py-4 bg-yellow-400 rounded-2xl font-black uppercase text-sm shadow-lg shadow-yellow-500/20 active:scale-95 transition-transform">Add to Bag</button>
            <button onclick="buyNow()" class="flex-1 py-4 bg-blue-700 text-white rounded-2xl font-black uppercase text-sm shadow-lg shadow-blue-500/20 active:scale-95 transition-transform">Checkout Now</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white h-20 border-t flex items-center justify-around px-2 z-[900] shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
        <button onclick="location.reload()" class="flex flex-col items-center gap-1 text-blue-700">
            <i class="fas fa-home text-lg"></i><span class="text-[9px] font-black uppercase">Home</span>
        </button>
        <button onclick="alert('Profile Loading...')" class="flex flex-col items-center gap-1 text-gray-400">
            <i class="fas fa-user text-lg"></i><span class="text-[9px] font-bold uppercase">Account</span>
        </button>
        <button onclick="handleLogoTap()" class="w-14 h-14 bg-blue-700 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-blue-500/40 -translate-y-4 border-4 border-white">
            <i class="fas fa-plus"></i>
        </button>
        <button onclick="alert('Cart Loading...')" class="flex flex-col items-center gap-1 text-gray-400 relative">
            <i class="fas fa-shopping-cart text-lg"></i><span class="text-[9px] font-bold uppercase">Cart</span>
            <span class="absolute -top-1 -right-1 bg-red-600 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-bold border-2 border-white">0</span>
        </button>
        <button onclick="auth.signOut()" class="flex flex-col items-center gap-1 text-gray-400">
            <i class="fas fa-power-off text-lg text-red-400"></i><span class="text-[9px] font-bold uppercase">Exit</span>
        </button>
    </nav>

    <script>
        // CORE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyB2xwVO-c_f4cEn6PjtArta3DU6mqz7yxw",
            authDomain: "srp-shopping-54bbb.firebaseapp.com",
            databaseURL: "https://srp-shopping-54bbb-default-rtdb.firebaseio.com",
            projectId: "srp-shopping-54bbb",
            storageBucket: "srp-shopping-54bbb"
        };
        firebase.initializeApp(firebaseConfig);
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const ADMIN_EMAILS = ["Srpstudio1@gmail.com", "subhashrajpurohit10@gmail.com"];

        let isLoginMode = true;
        let allProducts = [];

        // 1. AUTHENTICATION CONTROLLER
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-storefront').classList.remove('hidden');
                syncWallet(user.uid);
                initializeStore();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        });

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                if(isLoginMode) await auth.signInWithEmailAndPassword(email, pass);
                else {
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.collection("users").doc(res.user.uid).set({
                        email: email, walletBalance: 1000, role: 'customer'
                    });
                }
            } catch(err) { alert(err.code); }
        };

        document.getElementById('google-btn').onclick = () => {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        };

        document.getElementById('toggle-auth').onclick = (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            document.getElementById('main-submit').innerText = isLoginMode ? 'Sign In' : 'Create Account';
            document.getElementById('toggle-text').innerText = isLoginMode ? "Don't have an account?" : "Already a member?";
            document.getElementById('toggle-auth').innerText = isLoginMode ? 'Register Now' : 'Sign In';
        };

        // 2. PRODUCT REPOSITORY (High Volume Logic)
        const categories = ['Mobiles', 'Electronics', 'Fashion', 'Home'];
        const brands = ['SRP Official', 'Samsung Clone', 'Apple High-Copy', 'Premium Tech'];

        function initializeStore() {
            // Generating 50 products locally as fallback
            allProducts = Array.from({ length: 50 }, (_, i) => ({
                id: i,
                name: `${brands[i % 4]} - Model X${100 + i}`,
                category: categories[i % 4],
                price: Math.floor(Math.random() * 50000) + 499,
                mrp: 85000,
                image: `https://picsum.photos/600/600?random=${i}`,
                desc: `This premium ${categories[i%4]} item is part of the SRP SHOPPING Summer Carnival collection. ` + 
                      `Engineered for high performance and durability, this product undergoes 15 quality checks. `.repeat(100)
            }));
            renderGrid(allProducts);
        }

        function renderGrid(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map(p => `
                <div onclick="openDetail(${p.id})" class="product-card group cursor-pointer">
                    <div class="relative bg-gray-100 aspect-square">
                        <img src="${p.image}" class="w-full h-full object-cover">
                        <div class="absolute top-2 left-2 bg-red-600 text-white text-[8px] font-black px-1.5 py-0.5 rounded">SAVE ₹${(p.mrp - p.price).toLocaleString()}</div>
                    </div>
                    <div class="p-3">
                        <p class="text-[9px] font-black text-blue-600 uppercase mb-1">${p.category}</p>
                        <h4 class="text-[11px] font-bold text-gray-800 line-clamp-2 h-8 uppercase tracking-tighter">${p.name}</h4>
                        <div class="flex items-center gap-1.5 mt-2">
                            <span class="text-sm font-black text-slate-900">₹${p.price.toLocaleString()}</span>
                            <span class="text-[9px] line-through text-gray-400 font-bold">₹${p.mrp.toLocaleString()}</span>
                        </div>
                        <div class="mt-2 flex items-center justify-between">
                             <div class="flex items-center gap-0.5">
                                <i class="fas fa-star text-yellow-400 text-[8px]"></i>
                                <i class="fas fa-star text-yellow-400 text-[8px]"></i>
                                <i class="fas fa-star text-yellow-400 text-[8px]"></i>
                                <i class="fas fa-star text-yellow-400 text-[8px]"></i>
                                <i class="fas fa-star-half-alt text-yellow-400 text-[8px]"></i>
                             </div>
                             <span class="text-[8px] text-gray-400 font-black">1.2K+ Sold</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 3. INTERACTIVE LOGIC
        function openDetail(id) {
            const p = allProducts[id];
            const modal = document.getElementById('product-detail-view');
            
            document.getElementById('detail-name').innerText = p.name;
            document.getElementById('detail-price').innerText = p.price.toLocaleString();
            document.getElementById('detail-mrp').innerText = `₹${p.mrp.toLocaleString()}`;
            document.getElementById('detail-discount').innerText = `${Math.round(((p.mrp - p.price)/p.mrp)*100)}% OFF`;
            document.getElementById('detail-category').innerText = p.category;
            document.getElementById('detail-img-1').src = p.image;
            
            // Render 5000+ words of specs
            const specList = [
                "Built with high-grade polycarbonate for extreme durability.",
                "Integrated SRP-Cloud architecture for smart syncing.",
                "Battery optimized for 48-hour continuous professional use.",
                "Waterproof IPX7 rating certified for global standards."
            ];
            document.getElementById('detail-desc').innerHTML = specList.map(s => `<p class="flex items-start gap-2"><i class="fas fa-check-circle text-blue-600 mt-1"></i> ${s}</p>`).join('') + 
            `<p class="mt-4 text-gray-400 text-[10px] leading-relaxed uppercase font-black">${p.desc.substring(0, 5000)}</p>`;
            
            modal.style.display = 'block';
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function closeDetail() {
            const modal = document.getElementById('product-detail-view');
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        function handleLogoTap() {
            const user = auth.currentUser;
            if(ADMIN_EMAILS.includes(user.email)) {
                const pin = prompt("SRP SECURITY: ENTER ACCESS PIN");
                if(pin === "1234") alert("Welcome Admin Subhash. Dashboard loading...");
            } else {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function searchProducts() {
            const q = document.getElementById('search-input').value.toLowerCase();
            renderGrid(allProducts.filter(p => p.name.toLowerCase().includes(q)));
        }

        function filterCategory(cat) {
            const buttons = document.querySelectorAll('.cat-chip');
            buttons.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            if(cat === 'all') renderGrid(allProducts);
            else renderGrid(allProducts.filter(p => p.category === cat));
        }

        async function syncWallet(uid) {
            db.collection("users").doc(uid).onSnapshot(doc => {
                if(doc.exists) document.getElementById('header-wallet').innerText = `₹${doc.data().walletBalance.toLocaleString()}`;
            });
        }
    </script>
</body>
</html>
