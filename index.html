<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SRP SHOPPING | ALL-IN-ONE MASTER</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --srp-blue: #0047AB; --srp-white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* AUTHENTICATION LAYER */
        #auth-screen { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%); 
            display: flex; 
        }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* MAIN UI LAYER */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e2e8f0; z-index: 50; }
        .banner-gradient { background: linear-gradient(90deg, #0047AB 0%, #007FFF 100%); }
        
        /* DETAIL VIEW LAYER */
        #product-detail-view { display: none; position: fixed; inset: 0; background: white; z-index: 100; overflow-y: auto; padding-bottom: 80px; }
        .product-slider { scroll-snap-type: x mandatory; }
        .product-slider img { scroll-snap-align: start; }
        
        /* UTILITIES */
        .srp-active-scale:active { transform: scale(0.96); transition: transform 0.1s; }
    </style>
</head>
<body class="pb-20">

    <section id="auth-screen" class="fixed inset-0 z-[200] items-center justify-center p-4">
        <div class="glass-card w-full max-w-md rounded-2xl p-8 text-white shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-extrabold tracking-tighter">SRP <span class="text-blue-500">SHOPPING</span></h1>
                <p class="text-gray-400 text-sm mt-2" id="auth-subtitle">Welcome back, please login</p>
            </div>
            
            <form id="auth-form" class="space-y-4">
                <input type="email" id="email" class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white outline-none focus:border-blue-500 transition-colors" placeholder="Email Address" required>
                <input type="password" id="password" class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white outline-none focus:border-blue-500 transition-colors" placeholder="Password" required>
                <button type="submit" id="main-submit" class="w-full py-3 rounded-lg bg-blue-600 font-bold uppercase tracking-widest srp-active-scale">Sign In</button>
            </form>
            
            <div class="relative my-6 text-center text-xs text-gray-500">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-700"></div></div>
                <span class="bg-[#111] px-2 relative">OR CONTINUE WITH</span>
            </div>
            
            <button id="google-btn" class="w-full py-3 rounded-lg bg-white text-black font-semibold flex items-center justify-center gap-3 srp-active-scale">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18" alt="Google"> Sign in with Google
            </button>
            
            <p class="mt-6 text-center text-sm text-gray-400">
                <span id="toggle-text">New here?</span> 
                <button id="toggle-auth" class="text-blue-400 font-bold ml-1">Create Account</button>
            </p>
        </div>
    </section>

    <div id="main-storefront" style="display:none;">
        <header class="sticky top-0 bg-[#0047AB] text-white p-3 z-40 shadow-md">
            <div class="flex justify-between items-center mb-3">
                <button onclick="handleLogoTap()" class="text-xl font-bold tracking-tighter srp-active-scale">
                    SRP SHOPPING
                </button>
                <div class="flex items-center gap-3">
                    <button class="text-[10px] opacity-80 hover:opacity-100">Privacy Policy</button>
                    <div class="bg-white/20 px-3 py-1 rounded-full flex items-center gap-2 text-sm srp-active-scale shadow-inner">
                        <i class="fas fa-wallet text-yellow-400"></i> ₹<span id="header-wallet">0.00</span>
                    </div>
                </div>
            </div>
            
            <div class="relative mb-2">
                <input type="text" id="search-input" onkeyup="searchProducts()" placeholder="Search products, brands..." class="w-full py-2.5 px-4 pr-10 rounded text-black outline-none shadow-sm text-sm">
                <i class="fas fa-search absolute right-3 top-3 text-gray-400"></i>
            </div>
            
            <div class="flex gap-4 overflow-x-auto no-scrollbar py-1 text-xs whitespace-nowrap border-t border-white/20 pt-2">
                <button onclick="filterCategory('all')" class="font-bold border-b-2 border-white pb-1">All</button>
                <button onclick="filterCategory('Electronics')" class="opacity-80 hover:opacity-100">Electronics</button>
                <button onclick="filterCategory('Fashion')" class="opacity-80 hover:opacity-100">Fashion</button>
                <button onclick="filterCategory('Mobiles')" class="opacity-80 hover:opacity-100">Mobiles</button>
            </div>
        </header>

        <main class="p-3">
            <section class="banner-gradient rounded-xl p-6 text-white mb-6 shadow-lg flex justify-between items-center relative overflow-hidden">
                <div class="z-10">
                    <h2 class="text-2xl font-black italic tracking-tight">SRP EXCLUSIVE</h2>
                    <p class="text-sm opacity-90 font-medium">MEGA SALE: UP TO 70% OFF</p>
                    <button class="mt-3 bg-white text-[#0047AB] px-4 py-1.5 rounded text-xs font-bold shadow-md srp-active-scale">SHOP NOW</button>
                </div>
                <i class="fas fa-shopping-bag text-7xl opacity-10 absolute right-4 -bottom-2 z-0"></i>
            </section>

            <div id="product-grid" class="grid grid-cols-2 gap-3">
                </div>
        </main>
    </div>

    <div id="product-detail-view">
        <nav class="p-4 flex items-center gap-4 border-b sticky top-0 bg-white/90 backdrop-blur z-50">
            <button onclick="closeDetail()" class="fas fa-arrow-left text-xl text-gray-700 srp-active-scale"></button>
            <span class="font-bold truncate text-gray-800" id="detail-title-top">Product Details</span>
        </nav>
        
        <div class="flex overflow-x-auto product-slider no-scrollbar h-80 bg-gray-50 border-b">
            <img id="detail-img-1" class="w-full h-full object-contain flex-shrink-0 p-4">
            <img id="detail-img-2" class="w-full h-full object-contain flex-shrink-0 p-4">
        </div>
        
        <div class="p-4">
            <h2 id="detail-name" class="text-xl font-black text-gray-800 tracking-tight"></h2>
            
            <div class="flex items-center mt-2 mb-4">
                <span class="bg-green-700 text-white text-[10px] px-2 py-0.5 rounded font-bold">4.8 ★</span>
                <span class="text-blue-600 text-xs font-bold ml-2">SRP Assured</span>
                <span class="text-gray-400 text-xs ml-2">(2,140 Reviews)</span>
            </div>
            
            <div class="flex items-center gap-2 mb-6 border-b pb-4">
                <span id="detail-discount" class="text-red-600 font-light text-2xl"></span>
                <span class="font-black text-3xl text-gray-900">₹<span id="detail-price"></span></span>
                <span class="text-sm line-through text-gray-400 mt-2">M.R.P: ₹<span id="detail-mrp"></span></span>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="text-xs font-bold block mb-2 text-gray-600 uppercase">Select Color</label>
                    <div class="flex gap-2">
                        <div class="w-8 h-8 rounded-full bg-black border-2 border-blue-500 cursor-pointer shadow-sm"></div>
                        <div class="w-8 h-8 rounded-full bg-gray-200 border border-gray-300 cursor-pointer shadow-sm"></div>
                    </div>
                </div>
                <div>
                    <label class="text-xs font-bold block mb-2 text-gray-600 uppercase">Quantity</label>
                    <select class="w-full p-2 border border-gray-300 rounded-lg text-sm bg-gray-50 outline-none focus:border-blue-500">
                        <option>1 Unit</option>
                        <option>2 Units</option>
                        <option>3 Units</option>
                    </select>
                </div>
            </div>
            
            <div class="bg-blue-50 p-3 rounded-lg border border-blue-100 mb-6">
                <p class="text-xs text-blue-800 font-medium"><i class="fas fa-truck mr-2"></i>Free Standard Delivery by SRP Logistics. Expected in 7-15 days.</p>
            </div>
            
            <div class="mb-8">
                <h3 class="font-black border-b pb-2 mb-3 text-sm uppercase tracking-widest text-gray-800">Technical Description</h3>
                <p id="detail-desc" class="text-xs text-gray-600 leading-relaxed font-medium text-justify"></p>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 p-3 bg-white border-t flex gap-3 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-50">
            <button onclick="alert('Added to Cart Successfully!')" class="flex-1 py-3.5 bg-yellow-400 rounded-xl font-black uppercase text-xs tracking-wider srp-active-scale shadow-sm text-gray-900">Add to Cart</button>
            <button onclick="alert('Initiating Checkout Sequence...')" class="flex-1 py-3.5 bg-[#FF6100] text-white rounded-xl font-black uppercase text-xs tracking-wider srp-active-scale shadow-sm">Buy Now</button>
        </div>
    </div>

    <nav class="bottom-nav h-16 flex items-center justify-around shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <button onclick="location.reload()" class="flex flex-col items-center text-[#0047AB] w-16 srp-active-scale">
            <i class="fas fa-home text-xl mb-1"></i><span class="text-[9px] font-bold">Home</span>
        </button>
        <button onclick="alert('Routing to Profile Module...')" class="flex flex-col items-center text-gray-400 w-16 srp-active-scale hover:text-gray-600">
            <i class="fas fa-user text-xl mb-1"></i><span class="text-[9px] font-medium">Account</span>
        </button>
        <button onclick="alert('Routing to Razorpay Wallet Module...')" class="flex flex-col items-center text-gray-400 w-16 srp-active-scale hover:text-gray-600 relative">
            <i class="fas fa-wallet text-xl mb-1"></i><span class="text-[9px] font-medium">Wallet</span>
        </button>
        <button onclick="alert('Routing to Multi-Vendor Dashboard...')" class="flex flex-col items-center text-gray-400 w-16 srp-active-scale hover:text-gray-600">
            <i class="fas fa-store text-xl mb-1"></i><span class="text-[9px] font-medium">Seller</span>
        </button>
        <button onclick="alert('Routing to Checkout Cart...')" class="flex flex-col items-center text-gray-400 w-16 srp-active-scale hover:text-gray-600 relative">
            <i class="fas fa-shopping-cart text-xl mb-1"></i><span class="text-[9px] font-medium">Cart</span>
            <span class="absolute top-0 right-2 bg-red-500 text-white text-[8px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white">2</span>
        </button>
    </nav>

    <script>
        // --- A. FIREBASE INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyB2xwVO-c_f4cEn6PjtArta3DU6mqz7yxw",
            authDomain: "srp-shopping-54bbb.firebaseapp.com",
            databaseURL: "https://srp-shopping-54bbb-default-rtdb.firebaseio.com",
            projectId: "srp-shopping-54bbb",
            storageBucket: "srp-shopping-54bbb.appspot.com"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // Security Array for Master Console
        const ADMIN_EMAILS = ["Srpstudio1@gmail.com", "subhashrajpurohit10@gmail.com"];

        // --- B. AUTHENTICATION LOGIC ---
        let isLoginMode = true;
        
        // UI Toggle
        document.getElementById('toggle-auth').onclick = (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            document.getElementById('main-submit').innerText = isLoginMode ? 'Sign In' : 'Create Account';
            document.getElementById('auth-subtitle').innerText = isLoginMode ? 'Welcome back, please login' : 'Start your secure journey';
            document.getElementById('toggle-text').innerText = isLoginMode ? "New here?" : "Already registered?";
            document.getElementById('toggle-auth').innerText = isLoginMode ? 'Create Account' : 'Sign In';
        };

        // State Listener
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-storefront').style.display = 'block';
                // Fetch Wallet Balance dynamically if document exists
                db.collection("users").doc(user.uid).get().then(doc => {
                    if(doc.exists && doc.data().walletBalance) {
                        document.getElementById('header-wallet').innerText = doc.data().walletBalance.toLocaleString();
                    } else {
                        document.getElementById('header-wallet').innerText = "0.00"; // Default
                    }
                }).catch(err => console.log("Wallet fetch error, using default."));
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('main-storefront').style.display = 'none';
            }
        });

        // Form Submit
        document.getElementById('auth-form').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(isLoginMode) {
                auth.signInWithEmailAndPassword(email, pass).catch(err => alert("SRP Auth Error: " + err.message));
            } else {
                auth.createUserWithEmailAndPassword(email, pass).catch(err => alert("SRP Registry Error: " + err.message));
            }
        };

        // Google SignIn
        document.getElementById('google-btn').onclick = () => {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(err => alert("Google Auth Error: " + err.message));
        };

        // --- C. ADMIN SECURITY LOGIC ---
        function handleLogoTap() {
            const user = auth.currentUser;
            if (user && ADMIN_EMAILS.includes(user.email)) {
                const pin = prompt("SRP Master Console Restricted Access. Enter PIN:");
                if (pin === "406") {
                    alert("Authentication Verified. Routing to Admin Panel...");
                    window.location.href = "admin.html"; // Route to established admin logic
                } else {
                    alert("Security Alert: Invalid PIN.");
                }
            } else { 
                window.scrollTo({top: 0, behavior: 'smooth'}); 
            }
        }

        // --- D. PRODUCT DATA ENGINE ---
        // Generating 20 high-fidelity dummy items
        const masterProducts = Array.from({ length: 20 }, (_, i) => {
            const price = 499 + (i * 250);
            const mrp = price * 2; // 50% discount logic
            return {
                id: i,
                name: `SRP Premium Edition ${i % 2 === 0 ? 'Device' : 'Apparel'} v${i + 1}`,
                cat: i % 2 === 0 ? 'Electronics' : 'Fashion',
                price: price,
                mrp: mrp,
                img: `https://picsum.photos/400/400?random=${i}`,
                desc: "This is a premium, rigorous-tested product curated exclusively for the SRP SHOPPING ecosystem. Engineered with superior materials to ensure longevity and maximum user satisfaction. ".repeat(15)
            };
        });

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            if(list.length === 0) {
                grid.innerHTML = `<div class="col-span-2 text-center text-gray-400 py-10 font-bold">No products found in this category.</div>`;
                return;
            }
            grid.innerHTML = list.map(p => `
                <div onclick="openDetail(${p.id})" class="bg-white p-2.5 rounded-xl shadow-sm border border-gray-100 srp-active-scale relative">
                    <div class="absolute top-2 left-2 bg-red-500 text-white text-[8px] font-black px-1.5 py-0.5 rounded shadow-sm z-10">50% OFF</div>
                    <img src="${p.img}" class="w-full h-36 object-contain mb-3 rounded-lg bg-gray-50 mix-blend-multiply p-2">
                    <h3 class="text-[11px] font-bold text-gray-800 truncate uppercase tracking-tight">${p.name}</h3>
                    <div class="flex items-center gap-1.5 mt-1.5">
                        <span class="text-sm font-black text-gray-900">₹${p.price.toLocaleString()}</span>
                        <span class="text-[9px] line-through text-gray-400">₹${p.mrp.toLocaleString()}</span>
                    </div>
                    <div class="text-[9px] text-green-600 font-bold mt-1"><i class="fas fa-tag mr-1"></i>SRP Assured</div>
                </div>
            `).join('');
        }

        // --- E. DETAIL VIEW ENGINE ---
        function openDetail(id) {
            const p = masterProducts[id];
            document.getElementById('detail-name').innerText = p.name;
            document.getElementById('detail-price').innerText = p.price.toLocaleString();
            document.getElementById('detail-mrp').innerText = p.mrp.toLocaleString();
            document.getElementById('detail-discount').innerText = "-50%";
            document.getElementById('detail-desc').innerText = p.desc;
            
            // Set two images for the slider
            document.getElementById('detail-img-1').src = p.img;
            document.getElementById('detail-img-2').src = `https://picsum.photos/400/400?random=${id + 100}`;
            
            // UI Toggle
            document.getElementById('product-detail-view').style.display = 'block';
            document.body.style.overflow = 'hidden'; // Lock background scrolling
        }

        function closeDetail() { 
            document.getElementById('product-detail-view').style.display = 'none'; 
            document.body.style.overflow = 'auto'; // Unlock background scrolling
        }
        
        // --- F. SEARCH & FILTER ENGINE ---
        function filterCategory(cat) {
            if(cat === 'all') renderProducts(masterProducts);
            else renderProducts(masterProducts.filter(p => p.cat === cat));
            
            // Visual update for category buttons
            const buttons = document.querySelectorAll('header .overflow-x-auto button');
            buttons.forEach(btn => {
                if(btn.innerText.toLowerCase() === cat.toLowerCase()) {
                    btn.classList.add('border-b-2', 'border-white', 'pb-1', 'opacity-100');
                    btn.classList.remove('opacity-80');
                } else {
                    btn.classList.remove('border-b-2', 'border-white', 'pb-1', 'opacity-100');
                    btn.classList.add('opacity-80');
                }
            });
        }

        function searchProducts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            renderProducts(masterProducts.filter(p => p.name.toLowerCase().includes(query) || p.cat.toLowerCase().includes(query)));
        }

        // Initial Boot
        renderProducts(masterProducts);
    </script>
</body>
</html>
