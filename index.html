    <script>
/* ================= PRODUCT PAGE ================= */
function openProduct(id){
    hideAll();
    document.getElementById("product-page").classList.remove("hidden");
    let p = ALL_PRODUCTS.find(x=>x.id===id);
    if(!p) return;

    document.getElementById("p-name").innerText = p.name;
    document.getElementById("p-desc").innerText = p.desc;
    document.getElementById("priceBox").innerHTML = `<span class="line-through text-gray-400">₹${p.mrp}</span> <span class="text-blue-700 font-bold">₹${p.price}</span>`;
    document.getElementById("qty").value = 1;
    document.getElementById("slider").innerHTML = p.img.map(img=>`<img src="${img}" class="h-40 w-40 object-cover rounded mr-2">`).join("");
    document.getElementById("p-rating").innerText = `⭐ ${p.rating}`;
}

/* ================= CART / WISHLIST ================= */
let CART = JSON.parse(localStorage.getItem("cart")||"[]");
let WISHLIST = JSON.parse(localStorage.getItem("wishlist")||"[]");

function addToCart(){
    let pName = document.getElementById("p-name").innerText;
    let qty = parseInt(document.getElementById("qty").value) || 1;
    let product = ALL_PRODUCTS.find(x=>x.name===pName);
    if(!product) return;

    let cartItem = CART.find(x=>x.id===product.id);
    if(cartItem){
        cartItem.qty += qty;
    }else{
        CART.push({id:product.id,name:product.name,price:product.price,qty:qty});
    }
    localStorage.setItem("cart",JSON.stringify(CART));
    alert("Added to cart!");
}

function addToWishlist(){
    let pName = document.getElementById("p-name").innerText;
    let product = ALL_PRODUCTS.find(x=>x.name===pName);
    if(!product) return;

    if(!WISHLIST.find(x=>x.id===product.id)){
        WISHLIST.push({id:product.id,name:product.name,price:product.price});
        localStorage.setItem("wishlist",JSON.stringify(WISHLIST));
        alert("Added to wishlist!");
    }else{
        alert("Already in wishlist");
    }
}

function buyNow(){
    addToCart();
    showCart();
}

function renderCart(){
    let container = document.getElementById("cart-page");
    container.innerHTML = "<h2 class='text-xl font-bold mb-2'>Your Cart</h2>";
    if(CART.length===0){
        container.innerHTML += "<p>Cart is empty</p>";
        return;
    }
    CART.forEach(item=>{
        container.innerHTML += `
        <div class="flex justify-between items-center border p-2 mb-2">
            <div>${item.name} x ${item.qty}</div>
            <div>₹${item.price*item.qty}</div>
            <button onclick="removeFromCart('${item.id}')" class="bg-red-500 p-1 rounded text-white">Remove</button>
        </div>
        `;
    });
    container.innerHTML += `<button onclick="checkout()" class="btn w-full mt-2 bg-green-600">Checkout</button>`;
}

function removeFromCart(id){
    CART = CART.filter(x=>x.id!==id);
    localStorage.setItem("cart",JSON.stringify(CART));
    renderCart();
}

/* ================= ADDRESS BOOK ================= */
let ADDRESSES = JSON.parse(localStorage.getItem("addresses")||"[]");
function addAddress(addr){
    ADDRESSES.push(addr);
    localStorage.setItem("addresses",JSON.stringify(ADDRESSES));
}

function editAddress(index, addr){
    ADDRESSES[index]=addr;
    localStorage.setItem("addresses",JSON.stringify(ADDRESSES));
}

function deleteAddress(index){
    ADDRESSES.splice(index,1);
    localStorage.setItem("addresses",JSON.stringify(ADDRESSES));
}

/* ================= ORDERS ================= */
let ORDERS = JSON.parse(localStorage.getItem("orders")||"[]");
function placeOrder(cartItems){
    ORDERS.push({items:cartItems,date:new Date().toLocaleString(),status:"Processing"});
    localStorage.setItem("orders",JSON.stringify(ORDERS));
    CART=[];
    localStorage.setItem("cart",JSON.stringify(CART));
    alert("Order Placed!");
}

        renderAddresses();

}

    let addr = ADDRESSES[index];
    let name = prompt("Name:", addr.name);
    let street = prompt("Street:", addr.street);
    let city = prompt("City:", addr.city);
    let state = prompt("State:", addr.state);
    let pincode = prompt("Pincode:", addr.pincode);
    let phone = prompt("Phone:", addr.phone);

        editAddress(index, {name,street,city,state,pincode,phone});
        renderAddresses();
    }
}

/* ================= WALLET & TRANSACTIONS ================= */
let USERS = [];

function loadWallet(){
    let user = auth.currentUser;
    if(!user) return;
    let u = USERS.find(u=>u.email===user.email);
    if(!u){ USERS.push({email:user.email,wallet:0,transactions:[]}); u = USERS[USERS.length-1]; }
    document.getElementById("wallet-amt").innerText = `₹${u.wallet}`;
}

function addToWallet(amount){
    let user = auth.currentUser;
    if(!user) return;
    let u = USERS.find(u=>u.email===user.email);
    u.wallet += amount;
    u.transactions.push({type:"Credit",amount,date:new Date().toLocaleString()});
    loadWallet();
    showNotification(`₹${amount} added to wallet`);
}

function deductFromWallet(amount){
    let user = auth.currentUser;
    if(!user) return false;
    let u = USERS.find(u=>u.email===user.email);
    if(u.wallet<amount){ alert("Insufficient Balance"); return false; }
    u.wallet -= amount;
    u.transactions.push({type:"Debit",amount,date:new Date().toLocaleString()});
    loadWallet();
    return true;
}

    let existing = CART.find(c=>c.id===product.id);
    if(existing) existing.qty += qty; else CART.push({...product,qty});
    showNotification(`${product.name} x ${qty} added to cart`);
}

function renderCart(){
    let container = document.getElementById("cart-page");
    if(CART.length===0){ container.innerHTML="<p>Your cart is empty</p>"; return; }
    container.innerHTML = CART.map((c,i)=>`
        <div class="border p-2 mb-2 rounded flex justify-between items-center">
            <div>${c.name} x ${c.qty} - ₹${c.price*c.qty}</div>
            <div>
                <button onclick="removeCartItem(${i})" class="btn p-1 bg-red-500">Remove</button>
            </div>
        </div>
    `).join("") + `<button onclick="checkout()" class="btn bg-green-600 w-full mt-2">Checkout</button>`;
}

function removeCartItem(index){
    CART.splice(index,1);
    renderCart();
}

function checkout(){
    let total = CART.reduce((s,c)=>s+c.price*c.qty,0);
    if(!deductFromWallet(total)) return;
    ORDERS.push({items:[...CART],date:new Date().toLocaleString(),status:"Processing"});
    CART = [];
    renderCart();
    showNotification("Order placed successfully!");
}

/* ================= AI CHAT / RECOMMENDATION ================= */
function showAI(){
    hideAll();
    if(!document.getElementById("ai-page")){
        let div = document.createElement("div");
        div.id = "ai-page";
        div.className = "p-3 bg-white h-screen overflow-y-auto";
        document.body.appendChild(div);
    }
    document.getElementById("ai-page").classList.remove("hidden");
    renderAI();
}

function renderAI(){
    let container = document.getElementById("ai-page");
    container.innerHTML = `
        <h2 class='text-xl font-bold mb-2'>AI Shopping Assistant</h2>
        <input id="ai-input" placeholder="Ask me anything" class="border p-1 w-full mb-1"/>
        <button onclick="aiRespond()" class="btn w-full mb-2">Ask</button>
        <div id="ai-response" class="border p-2 rounded"></div>
    `;
}

function aiRespond(){
    let query = document.getElementById("ai-input").value.toLowerCase();
    let resp = "I don't have an answer for that.";
    if(query.includes("recommend")) resp = `We recommend: ${ALL_PRODUCTS.slice(0,3).map(p=>p.name).join(", ")}`;
    document.getElementById("ai-response").innerText = resp;
}

/* ================= LIVE CHAT / SUPPORT ================= */
let CHAT_LOG = [];

function openSupportChat(){
    if(!auth.currentUser){ alert("Login to access support"); return; }
    if(document.getElementById("support-chat")) return;
    let chatDiv = document.createElement("div");
    chatDiv.id = "support-chat";
    chatDiv.style.cssText = "position:fixed;bottom:0;right:20px;width:300px;height:400px;background:white;border:1px solid #ccc;border-radius:6px;overflow:hidden;z-index:999;";
    chatDiv.innerHTML = `
        <div style="background:#004aad;color:white;padding:5px;font-weight:bold;">Support Chat <button onclick="closeSupportChat()" style="float:right;">✖</button></div>
        <div id="chat-messages" style="height:320px;overflow-y:auto;padding:5px;"></div>
        <input id="chat-input" placeholder="Type message" style="width:80%;padding:5px;border:1px solid #ccc;"/>
        <button onclick="sendChat()" style="width:20%;background:#004aad;color:white;">Send</button>
    `;
    document.body.appendChild(chatDiv);
}

function closeSupportChat(){ document.getElementById("support-chat").remove(); }

function sendChat(){
    let input = document.getElementById("chat-input");
    if(!input.value) return;
    CHAT_LOG.push({user:auth.currentUser.email,msg:input.value,date:new Date().toLocaleString()});
    renderChat();
    input.value = "";
}

function renderChat(){
    let div = document.getElementById("chat-messages");
    if(!div) return;
    div.innerHTML = CHAT_LOG.map(c=>`<div><b>${c.user}:</b> ${c.msg}</div>`).join("");
    div.scrollTop = div.scrollHeight;
}

/* ================= EXPORT / DOWNLOAD DATA ================= */
function exportOrdersCSV(){
    let csv = "Order ID,Items,Date,Status\n";
    ORDERS.forEach((o,i)=>{
        let items = o.items.map(it=>`${it.name} x ${it.qty}`).join("|");
        csv += `${i+1},${items},${o.date},${o.status}\n`;
    });
    let blob = new Blob([csv],{type:"text/csv"});
    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = "orders.csv";
    a.click();
    URL.revokeObjectURL(url);
}

/* ================= USER MANAGEMENT ================= */
function showUsers(){
    hideAll();
    if(!document.getElementById("user-page")){
        let div = document.createElement("div");
        div.id = "user-page";
        div.className = "p-3 bg-white h-screen overflow-y-auto";
        document.body.appendChild(div);
    }
    document.getElementById("user-page").classList.remove("hidden");
    renderUsers();
}

function renderUsers(){
    let container = document.getElementById("user-page");
    container.innerHTML = USERS.map(u=>`
        <div class="border p-2 mb-1 rounded flex justify-between items-center">
            <div>${u.email} - Wallet: ₹${u.wallet}</div>
            <button onclick="resetWallet('${u.email}')" class="btn p-1 bg-yellow-500">Reset Wallet</button>
            <button onclick="deleteUser('${u.email}')" class="btn p-1 bg-red-500">Delete User</button>
        </div>
    `).join("");
}

function resetWallet(email){
    let u = USERS.find(u=>u.email===email);
    if(u) u.wallet = 0;
    renderUsers();
    showNotification(`Wallet reset for ${email}`);
}

function deleteUser(email){
    USERS = USERS.filter(u=>u.email!==email);
    renderUsers();
    showNotification(`User ${email} deleted`);
}
