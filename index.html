<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SRP SHOPPING | PRO EDITION</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --srp-main: #0047AB; --srp-dark: #001f4d; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; -webkit-user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Loading Screen */
        #srp-loader { position: fixed; inset: 0; background: white; z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--srp-main); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Detail View Animation */
        #detail-view { position: fixed; inset: 0; background: white; z-index: 5000; transform: translateY(100%); transition: 0.4s cubic-bezier(0, 0, 0.2, 1); overflow-y: auto; }
        #detail-view.show { transform: translateY(0); }

        .srp-btn { transition: all 0.2s; }
        .srp-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="pb-24">

    <div id="srp-loader"><div class="spinner"></div></div>

    <section id="auth-screen" class="fixed inset-0 z-[10000] hidden flex items-center justify-center bg-slate-900 p-6">
        <div class="w-full max-w-md bg-white rounded-[2.5rem] p-10 shadow-2xl">
            <h1 class="text-3xl font-black text-center mb-2">SRP <span class="text-blue-600">SHOPPING</span></h1>
            <p class="text-center text-gray-400 text-sm mb-8">Official Portal Access</p>
            
            <form id="login-form" class="space-y-4">
                <input type="email" id="user-email" placeholder="Email" class="w-full p-4 rounded-2xl bg-gray-100 outline-none border focus:border-blue-600" required>
                <input type="password" id="user-pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-gray-100 outline-none border focus:border-blue-600" required>
                <button type="submit" class="w-full py-4 bg-blue-700 text-white rounded-2xl font-black uppercase tracking-widest srp-btn">Sign In</button>
            </form>
        </div>
    </section>

    <div id="main-app" class="hidden">
        <header class="sticky top-0 bg-white border-b p-4 z-[1000]">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-black tracking-tighter">SRP <span class="text-blue-600">SHOP</span></h1>
                <div class="flex items-center gap-3">
                    <div class="bg-blue-50 px-4 py-2 rounded-full border border-blue-100">
                        <i class="fas fa-wallet text-blue-600 mr-2"></i><span id="wallet-val" class="font-bold">₹0</span>
                    </div>
                </div>
            </div>
            <input type="text" id="search-bar" onkeyup="filterNow()" placeholder="Search Products..." class="w-full bg-gray-100 p-3 rounded-xl outline-none border-2 border-transparent focus:border-blue-200">
        </header>

        <main class="p-4 grid grid-cols-2 gap-4" id="product-grid">
            </main>
    </div>

    <div id="detail-view">
        <nav class="sticky top-0 bg-white/90 backdrop-blur p-4 border-b flex items-center justify-between">
            <button onclick="closeDetail()" class="w-10 h-10 rounded-full bg-gray-100"><i class="fas fa-arrow-left"></i></button>
            <span class="font-black text-xs uppercase tracking-widest">Product Details</span>
            <i class="fas fa-share-alt text-gray-400"></i>
        </nav>
        <div id="detail-body"></div>
        <div class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t flex gap-4">
            <button onclick="addCart()" class="flex-1 py-4 bg-yellow-400 rounded-2xl font-black uppercase text-xs srp-btn">Add to Cart</button>
            <button onclick="buyNow()" class="flex-1 py-4 bg-blue-700 text-white rounded-2xl font-black uppercase text-xs srp-btn">Buy Now</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-white border-t flex items-center justify-around z-[2000]">
        <button onclick="location.reload()" class="text-blue-600 flex flex-col items-center"><i class="fas fa-home"></i><span class="text-[9px] font-bold">HOME</span></button>
        <button class="text-gray-400 flex flex-col items-center"><i class="fas fa-shopping-cart"></i><span class="text-[9px] font-bold">CART</span></button>
        <button id="admin-btn" style="display:none" onclick="alert('Admin Panel Opening...')" class="w-14 h-14 bg-red-600 -translate-y-4 rounded-2xl text-white shadow-xl border-4 border-white"><i class="fas fa-lock"></i></button>
        <button class="text-gray-400 flex flex-col items-center"><i class="fas fa-wallet"></i><span class="text-[9px] font-bold">WALLET</span></button>
        <button onclick="auth.signOut()" class="text-red-400 flex flex-col items-center"><i class="fas fa-power-off"></i><span class="text-[9px] font-bold">EXIT</span></button>
    </nav>

    <script>
        // FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "AIzaSyB2xwVO-c_f4cEn6PjtArta3DU6mqz7yxw",
            authDomain: "srp-shopping-54bbb.firebaseapp.com",
            projectId: "srp-shopping-54bbb",
            storageBucket: "srp-shopping-54bbb",
            messagingSenderId: "338927907577",
            appId: "1:338927907577:web:2f8a846f4889c2be0b4712"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 1. SESSION MANAGEMENT
        auth.onAuthStateChanged(user => {
            document.getElementById('srp-loader').style.display = 'none';
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                loadProducts();
                if(user.email === 'admin1@srp.com') document.getElementById('admin-btn').style.display = 'block';
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        // 2. AUTH LOGIC
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            auth.signInWithEmailAndPassword(document.getElementById('user-email').value, document.getElementById('user-pass').value)
                .catch(err => alert(err.message));
        };

        // 3. PRODUCT ENGINE
        let products = [];
        async function loadProducts() {
            // Seeding 20 products
            products = Array.from({length: 20}, (_, i) => ({
                id: i,
                name: `SRP Premium Gear v${i+1}`,
                price: 499 + (i * 200),
                mrp: 1999 + (i * 200),
                image: `https://picsum.photos/400/400?random=${i}`,
                desc: "Official SRP Quality Product. ".repeat(200)
            }));
            renderGrid(products);
        }

        function renderGrid(list) {
            document.getElementById('product-grid').innerHTML = list.map(p => `
                <div onclick="showDetail(${p.id})" class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 srp-btn">
                    <img src="${p.image}" class="w-full aspect-square object-cover rounded-xl mb-3">
                    <h3 class="text-xs font-bold truncate">${p.name}</h3>
                    <p class="text-blue-700 font-black">₹${p.price}</p>
                    <p class="text-[9px] line-through text-gray-400">₹${p.mrp}</p>
                </div>
            `).join('');
        }

        // 4. DETAIL ENGINE
        function showDetail(id) {
            const p = products[id];
            document.getElementById('detail-body').innerHTML = `
                <img src="${p.image}" class="w-full h-80 object-contain bg-gray-50 border-b">
                <div class="p-6">
                    <h2 class="text-2xl font-black uppercase tracking-tighter">${p.name}</h2>
                    <div class="flex items-center gap-4 my-4">
                        <span class="text-3xl font-black text-blue-700">₹${p.price}</span>
                        <span class="text-sm line-through text-gray-400">₹${p.mrp}</span>
                    </div>
                    <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 mb-6">
                        <p class="text-[10px] font-black text-blue-600 uppercase">SRP Intelligence Engine</p>
                        <p class="text-xs font-medium mt-1">This product features 15-stage quality certification.</p>
                    </div>
                    <h3 class="font-black text-sm uppercase mb-2">Detailed Specifications</h3>
                    <p class="text-xs text-gray-500 leading-relaxed font-medium">${p.desc}</p>
                </div>
            `;
            document.getElementById('detail-view').classList.add('show');
        }

        function closeDetail() { document.getElementById('detail-view').classList.remove('show'); }

        function filterNow() {
            const q = document.getElementById('search-bar').value.toLowerCase();
            renderGrid(products.filter(p => p.name.toLowerCase().includes(q)));
        }
    </script>
</body>
</html>
