<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRP SHOPPING | Home</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --srp-blue: #0047AB; --srp-white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        #auth-screen { background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%); display: flex; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #e2e8f0; z-index: 50; }
        
        /* Modals */
        #product-detail-view, #cart-view { display: none; position: fixed; inset: 0; background: white; z-index: 100; overflow-y: auto; }
        .banner-gradient { background: linear-gradient(90deg, #0047AB 0%, #007FFF 100%); }
    </style>
</head>
<body class="pb-20">

    <section id="auth-screen" class="fixed inset-0 z-[200] items-center justify-center p-4">
        <div class="glass-card w-full max-w-md rounded-2xl p-8 text-white">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-extrabold tracking-tighter">SRP <span class="text-blue-500">SHOPPING</span></h1>
                <p class="text-gray-400 text-sm mt-2" id="auth-subtitle">Welcome back, please login</p>
            </div>
            <form id="auth-form" class="space-y-4">
                <input type="email" id="email" class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white" placeholder="Email" required>
                <input type="password" id="password" class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white" placeholder="Password" required>
                <button type="submit" id="main-submit" class="w-full py-3 rounded-lg bg-blue-600 font-bold uppercase">Sign In</button>
            </form>
            <div class="relative my-6 text-center text-xs text-gray-500">OR CONTINUE WITH</div>
            <button id="google-btn" class="w-full py-3 rounded-lg bg-white text-black font-semibold flex items-center justify-center gap-3">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Sign in with Google
            </button>
            <p class="mt-6 text-center text-sm text-gray-400">
                <span id="toggle-text">New here?</span> <a href="#" id="toggle-auth" class="text-blue-400 font-bold ml-1">Create Account</a>
            </p>
        </div>
    </section>

    <div id="main-storefront" style="display:none;">
        <header class="sticky top-0 bg-[#0047AB] text-white p-3 z-50 shadow-md">
            <div class="flex justify-between items-center mb-3">
                <button onclick="handleLogoTap()" class="text-xl font-bold tracking-tighter">SRP SHOPPING</button>
                <div class="flex items-center gap-3">
                    <div class="bg-white/20 px-3 py-1 rounded-full flex items-center gap-2 text-sm">
                        <i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span>
                    </div>
                </div>
            </div>
            <div class="relative mb-2">
                <input type="text" id="search-input" onkeyup="searchProducts()" placeholder="Search products..." class="w-full py-2 px-4 rounded text-black outline-none">
            </div>
        </header>

        <main class="p-3">
            <section class="banner-gradient rounded-xl p-6 text-white mb-6 shadow-lg flex justify-between items-center">
                <div><h2 class="text-2xl font-black italic">SRP EXCLUSIVE</h2><p class="text-sm">SALE IS LIVE</p></div>
            </section>
            <div id="product-grid" class="grid grid-cols-2 gap-3"></div>
        </main>
    </div>

    <div id="product-detail-view">
        <nav class="p-4 flex items-center gap-4 border-b sticky top-0 bg-white">
            <button onclick="closeDetail()" class="fas fa-arrow-left text-xl"></button>
            <span class="font-bold">Product Details</span>
        </nav>
        <div class="p-4">
            <img id="detail-img-1" class="w-full h-64 object-contain mb-4">
            <h2 id="detail-name" class="text-xl font-bold"></h2>
            <div class="text-2xl font-bold my-4 text-blue-700">₹<span id="detail-price"></span></div>
            <p id="detail-desc" class="text-sm text-gray-500 mb-6"></p>
            <button id="add-to-cart-btn" class="w-full py-4 bg-yellow-400 rounded-xl font-bold uppercase tracking-wider">Add to Cart</button>
        </div>
    </div>

    <div id="cart-view">
        <nav class="p-4 flex items-center justify-between border-b sticky top-0 bg-white">
            <div class="flex items-center gap-4">
                <button onclick="closeCart()" class="fas fa-arrow-left text-xl"></button>
                <span class="font-bold text-lg">My Cart (<span id="cart-title-count">0</span>)</span>
            </div>
        </nav>
        <div id="cart-items" class="p-4 space-y-4">
            </div>
        <div class="p-4 border-t sticky bottom-0 bg-white shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <span class="text-gray-500 font-medium">Grand Total:</span>
                <span class="text-2xl font-black text-blue-700">₹<span id="cart-total">0</span></span>
            </div>
            <button onclick="checkout()" class="w-full py-4 bg-orange-500 text-white rounded-xl font-black uppercase shadow-lg">Proceed to Checkout</button>
        </div>
    </div>

    <nav class="bottom-nav h-16 flex items-center justify-around">
        <button onclick="location.reload()" class="flex flex-col items-center text-blue-700"><i class="fas fa-home"></i><span class="text-[10px] font-bold">Home</span></button>
        <button onclick="openCart()" class="flex flex-col items-center text-gray-400"><i class="fas fa-shopping-cart text-xl"></i><span class="text-[10px]">Cart</span></button>
    </nav>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB2xwVO-c_f4cEn6PjtArta3DU6mqz7yxw", authDomain: "srp-shopping-54bbb.firebaseapp.com", projectId: "srp-shopping-54bbb" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        
        let cart = []; // The global cart array

        // Logic to add to cart
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            cart.push(product);
            updateCartCount();
            alert(`${product.name} added to cart!`);
            closeDetail();
        }

        function updateCartCount() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-title-count').innerText = cart.length;
        }

        function openCart() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            document.getElementById('cart-view').style.display = 'block';
            
            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-gray-400">Your cart is empty</div>`;
                totalEl.innerText = "0";
                return;
            }

            let total = 0;
            container.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `
                <div class="flex items-center gap-4 bg-white p-3 rounded-xl border">
                    <img src="${item.img}" class="w-16 h-16 object-cover rounded-lg">
                    <div class="flex-1">
                        <h4 class="text-sm font-bold truncate w-40">${item.name}</h4>
                        <p class="text-blue-600 font-bold text-sm">₹${item.price}</p>
                    </div>
                    <button onclick="removeFromCart(${index})" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>
                </div>`;
            }).join('');
            totalEl.innerText = total;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartCount();
            openCart(); // refresh UI
        }

        function checkout() {
            if(cart.length === 0) return alert("Cart is empty");
            const total = cart.reduce((acc, curr) => acc + curr.price, 0);
            alert(`Order Placed Successfully for ₹${total}!`);
            cart = [];
            updateCartCount();
            closeCart();
        }

        function closeCart() { document.getElementById('cart-view').style.display = 'none'; }
        function closeDetail() { document.getElementById('product-detail-view').style.display = 'none'; }

        // Existing Product & Auth logic
        const products = Array.from({ length: 20 }, (_, i) => ({
            id: i,
            name: `SRP Premium Product ${i + 1}`,
            cat: i % 2 === 0 ? 'Electronics' : 'Fashion',
            price: 499 + (i * 100),
            img: `https://picsum.photos/400/400?random=${i}`,
            desc: "High quality premium item delivered to your doorstep with SRP guarantee."
        }));

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map(p => `
                <div onclick="openDetail(${p.id})" class="bg-white p-2 rounded shadow-sm border">
                    <img src="${p.img}" class="w-full h-36 object-cover mb-2 rounded">
                    <h3 class="text-xs font-bold truncate">${p.name}</h3>
                    <p class="text-sm font-bold text-blue-600">₹${p.price}</p>
                </div>
            `).join('');
        }

        function openDetail(id) {
            const p = products[id];
            document.getElementById('detail-name').innerText = p.name;
            document.getElementById('detail-price').innerText = p.price;
            document.getElementById('detail-desc').innerText = p.desc;
            document.getElementById('detail-img-1').src = p.img;
            document.getElementById('product-detail-view').style.display = 'block';
            
            // Set the onclick for the add button specifically for this product
            document.getElementById('add-to-cart-btn').onclick = () => addToCart(id);
        }

        // Auth listeners
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-storefront').style.display = 'block';
            }
        });

        document.getElementById('auth-form').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(email, pass).catch(err => alert(err.message));
        };

        renderProducts(products);
    </script>
</body>
</html>
